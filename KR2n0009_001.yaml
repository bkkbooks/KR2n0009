  text: 欽定四庫全書欽定天祿琳琅書目卷一
  hash: sha256:675980d9a73e08fbbbe901c3c72ede7d545b0af2079d0ff4e33d57f25e4efd48
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2n0009_WYG_001-1a, image: WYG0675/WYG0675-0344a.png}
body:
  text: 宋版經部周易一函五册上下經六卷魏王弼注繫辭以下三卷晉韓康伯注周易略例一卷王弼著唐邢璹注俱唐陸德明音義共十卷是書不載刋刻年月而字法圎活刻手精整且於宋光宗以前諱皆缺筆又每卷末詳記經注音義字數宋版多此式其為南宋刋本無疑琴川毛晉藏書類以甲乙為次是書於宋本印記之下復加甲字印乃宋槧之最佳者晉元名鳯苞字子晉蘇州常熟人好古博覽搆汲古閣藏書數萬卷刻十三經十七史古今百家之書手自校讐僮僕皆能抄書著述甚富見蘇州府志闕補卷三一二卷九全卷十全監本纂圗重言重意互注點校毛詩二函十册首毛詩圗譜正文全録漢毛萇傳鄭康成箋附唐陸德眀音義復加重言重意互注三例共二十卷朱彝尊經義考載纂圗互注毛詩二十卷引陸元輔語曰此書不知何人編輯鋟刻甚精首之以毛詩舉要圗二十五次之以毛詩篇目其卷一至終則全録大小序毛傳鄭箋陸氏釋文而采左傳三禮有及於詩者為互注又標詩句之同者為重言詩意之同者為重意蓋唐宋人帖括之書也此本證以所言雖無圖目而體例適符惟書中於篇目相同者為重篇詩句相似者為似句乃元輔所未及蓋因書名未經標出遂不加詳考耳至其字畫流美紙墨亦佳信為鋟本之精者本朝御史季振宜藏書仿毛晉汲古閣例有宋本橢圎印以志善本尚書徐乾學傳是樓收藏書籍甚富此書兩家印記俱備蓋厯經鑒藏家珍祕也振宜字詵兮號滄葦揚州泰興人順治丁亥進士授蘭溪令歷刑户兩曹擢御史乾學字原一號健菴蘇州崑山人康熙庚戌進士第三授編修官至刑部尚書所著有憺園文集東萊家孰讀詩記二函册十六宋吕祖謙著三十二卷第一卷為綱領卷二以下釋大小傳經文博引諸家注成之朱子序巾箱本不載鋟刻年月按陳振孫書録解題云自公劉以後編纂已備條例未竟學者惜之是本公劉首章下識云先兄修是書至此終自公劉次章訖終篇則往歲所纂輯未及刋定今不敢損益姑從其舊則此書乃其弟所校刋也御題此吕氏家孰本也説詩家自毛鄭後同異紛紜鮮所折衷東萊兼綜衆説挈要提綱斷以已意於三百篇之義殆庶幾乎向為檇李項氏家藏卷約字工猶屬閩中舊刻其珍惜之乾隆御識鈐寶二曰幾暇怡情曰乾隆宸翰檇李項元汴藏本有印記元汴字子京好收金石遺文圗繪名迹凡斷幀隻行悉輸其門書法出入智永趙吳興之間兼工山水號墨林居士見董其昌容臺集闕補卷四十九之二十二卷二十五五卷二十七十一卷三十二末行周禮二函册十二漢鄭康成注唐陸德明音義十二卷宋嶽珂相臺書孰刋正九經三傳沿革例云世傳九經自建蜀京杭而下有建余氏本分句讀稱為善本云云此書每卷後或載余仁仲比校或余氏刋於萬卷堂或余仁仲刋於家孰所謂建余氏也句讀處亦與所言相合又卷末各詳記經注音義字數點畫完好紙色極佳張氏古照堂所藏名無考纂圗互注周禮二函册十二前周禮經圗三十有九各系以説次篇目正文全録鄭注及唐陸德明音義復加重言重意互注三例共十二卷按宋陳祥道有周禮纂圗其書已佚此書纂圗不載撰人姓氏而圗説多引祥道禮書之言或本之祥道書故仍其名音義後標重言重意互注與前監本毛詩同當亦唐宋人帖括之書但標名無重言重意四字經文不施句讀版尺寸亦較縮耳又經義考載周禮附音重言重意互注十二卷引繆泳謂元人所輯並無指實且與纂圗互注毛詩出唐宋人之説自相矛盾此本的係宋槧非明尹洪兩廣重刻本也諸卷前後原有印記不知何時割去迹尚可辨闕補經圖一之八卷十二十八春秋經傳集解四函二册三十晉杜預集解三十卷前自序末附五代馮繼先春秋名號歸一圗二卷無名氏春秋年表諸卷末有木記曰相臺嶽氏刻梓家孰或曰相臺嶽氏刻梓荆溪家孰為長方橢圎亞字諸式具大小篆隸文蓋南宋嶽珂乃飛孫本相州湯隂人故以相臺表望南渡後徙常州今宜興有珂父霖墓故家孰以荆溪名珂校刋九經三傳著沿革例讐勘最為精核其辨析此書之言曰春秋名號歸一圗二卷馮繼先撰刋本多訛錯嘗合京杭建蜀本參校有氏名略同實非一人而合為一者有名字若殊本非二人而析為二者有自某國適他國而前後互見者有稱某公與某年而經傳不合者或以傳為經或以注為傳或偏旁疑似而有亥豕之差或行數牽連而無甲乙之别若此類非一今皆訂之經傳勘其訛謬且為分行以見别書若雜出於經傳與注而止稱經或傳注散見於前後數年間而止稱某公某年蓋據始見而書之廖本無年表歸一圗今既刋公穀併補二書以附經傳之後又曰春秋年表三朝藝文志不載作者名今諸本或闕號名或紊年月參之經傳多有舛錯不無刋寫之誤皆以經傳正之史記年表書事今表止書繼立循舊不敢增又曰按館閣書目元豐中楊彥齡撰二卷紹興中環中撰一卷今本一卷與紹興中本及藝文志所載者同珂之考證如此今詳閲卷中凡所臚謬誤之處俱經改正無訛然則此本之善具徵學密匪獨工良也曽入明項篤夀萬卷堂後歸季振宜家其紫玉玄居寶刻不知誰氏之章諸印於各卷中間互錯出蓋諸家􅏻潢分册參差不齊又或祗得其半今裒然全帙洵足寶也篤夀字子長秀水人嘉靖壬戌進士入詞林性好藏書見祕册輒令小胥傳抄儲之舍北萬卷樓見浙江志春秋經傳集解二函册十五晉杜預集解三十卷自序相臺書孰刋正九經三傳沿革例云世所傳九經有建余氏興國于氏二本皆稱其善而廖氏以余氏不免誤舛于氏未為的當合諸本參訂為最精板行之初天下寶之又云廖本春秋無年表歸一圗此書每卷末有木記曰世綵廖氏刻梓家孰為長方橢圎亞字諸式具篆文八分而不載年表歸一圗蓋嶽珂所稱者即為此本考中興藝文志載世綵堂集三卷稱政和中廖剛曽祖母與祖母享年最髙皆及見五世孫剛作堂名世綵以奉之士大夫為作詩又趙均石迹記廖瑩中刻世綵堂帖瑩中名玉號羣玉為賈似道客周密癸辛雜識載賈廖刋書一條云廖羣玉諸書九經本最佳凡以數十種比校百餘人校正而後成以撫州萆抄紙油煙墨印造其􅏻褫至以泥金為籖則其貴重可知矣婁東王世懋藏本世懋字敬美世貞之弟明太常卿又卷中多有徑山居頂菴紅記按徑山為天目東北峰山門事狀云徑山之頂乃天目龍之别居國一大師法欽隱此山頂山志雖不載居頂菴而釋德清凌霄峰記云圎照禪師居峰頂十年古鼎禪師亦居十年梵懷慧公結菴於頂居十三年蓋徑山以峰頂為祖庭主僧講席在焉或旁通儒書曽藏此本此諸僧者未知其何屬也闕補卷十三卷十四卷十七之卷二十二計四册鋟刻亦精但字畫較瘦卷末無世綵廖氏印書中亦無徑山紅記乃用别本補入監本纂圖春秋經傳集解四函八册二十宋蘇軾春秋列國圗經傳全録晉杜預集解附唐陸德明音義復加重言重意似句互注諸例共三十卷前後預自序是書與監本纂圗重言重意互注點校毛詩體例相同字形槧式亦俱吻合意唐宋人帖括之書羣經皆備合之纂圗互注周禮知為當時所並行吳江縣志載張基字德載於書無所不窺尤邃於經術著述甚富崇禎時贈翰林院待詔此即其藏本其謹止齋潯陽山人青芝山房三印無考春秋左氏音義二函八册唐陸德明著五卷後附宋聞人模經傳識異按此即德明經典釋文之一左氏釋文原六卷今合卷五六為一宋嘉定時興國學刋本興國軍隸江南西路亦江西諸郡書版也卷末結銜五人為知軍通判教授判官又有教授聞人模跋載本學補刋春秋更新五經之由蓋當時刻春秋而附以陸氏音義今獨存音義耳按德明釋文本分五經三傳并及孝經論語爾雅莊老各自成編無嫌單行也琴川毛氏崑山徐氏兩家藏本有印記監本附音春秋公羊注疏二函册十六漢何休解詁唐徐彥疏附唐陸德明音義共二十八卷休自序宋景德二年六月中書門下牒文奉敕校讐刋印頒行具載編首牒後結銜工部侍郎參知政事馮兵部侍郎參知政事王兵部侍郎平章事寇吏部侍郎平章事畢考宋史宰輔表景德元年八月畢士安自吏部侍郎參知政事加同中書門下平章事寇準自兵部侍郎加同中書門下平章事二年四月馮拯自工部侍郎除參知政事皆與牒合而二年參知政事有王欽若王旦二人通鑑綱目載欽若以四月罷牒在六月知非欽若也歐陽修文正王公神道碑銘咸平四年以工部侍郎參知政事再遷刑部侍郎景德二年始遷尚書左丞牒文為兵部侍郎微有不合但下牒時旦方參政其遷尚書左丞或在牒後况時閲五年其中遷轉靡常碑文失載未可知也書首有尚友方記不知誰氏而卷中丹筆竄注之處校勘頗為詳密春秋公羊經傳解詁二函十册漢何休學十二卷休自序鐫刻年月不載而字體甚古於宋孝宗以上諱皆闕筆知為南渡後刋書中每間數紙輒有真書木印曰鄂州州學官書曰鄂泮官書帶去準盜考王應麟玉海咸平四年六月詔郡縣有學校聚徒講誦之所賜九經書一部大觀二年六月州學藏書閣賜名稽古則州郡諸學置官書自宋初已行之李心傳朝野雜記載王瞻叔為學官常請摹印諸經疏及經典釋文許郡縣以贍學或省係錢各市一本置之於學是南渡後猶重此舉且有準盜之條官守亦綦嚴矣闕補卷十二末監本附音春秋榖梁注疏二函十册晉范寧集解唐楊士勛疏附唐陸德明音義共二十卷士勛序朝野雜記云監本書籍紹興末年所刋是書於欽宗以上諱皆闕筆而皇瑗瑗字乃孝宗諱全書不闕蓋紹興監本也又云胄監刋六經無禮記今猶存毛詩春秋左氏公羊榖梁傳而無禮記亦可證矣朱謀㙔藩獻記晉莊王鍾鉉憲王之子髙皇帝曽孫也正統七年以榆社王進封王好博古喜法書嘗以絳帖歲久斷脫令世子竒源采舊所藏古今名人墨迹摹刻以傳號寶賢堂集古法帖今世傳名書畫多晉府章即其人也餘諸印無可考或仿漢銅章皆隨手鈐用無關鑒藏也監本附音春秋榖梁注疏二函册十二篇目同前勘對此書與前景德二年中書牒刻公羊注疏板匡字體俱合板心上注每紙大小字數中標名公疏榖疏字亦從俗省筆出於匠手兩本正符蓋景德原刻諸經此其二也明沈周有竹居所藏周字啓南長洲人於書無所不覽文摹左氏詩擬白居易蘇軾陸遊字仿黃庭堅為世所愛重尤工於畫評者謂為明世第一巡撫王恕彭禮咸禮敬之欲留幕下並以母老辭終身不仕明史有傳其羣雅齋吳惟明印康虞父三印大小略等似係一人之章但世里未詳至方外司馬一印亦無考春秋分記四函册四十宋程公説著首例要三則次年表九卷世譜七卷名譜二卷書二十六卷周天王紀二卷內魯及列國世本三十二卷次國小國及四夷十二卷共九十卷前遊似序公説自序又其弟公許序並附公説墓志銘宋淳祐三年程公許守宜春刻是書於郡齋陳振孫書録解題盛稱之此本卷中多有元時鈐用官印且於首尾紙背用紅字條記係大德十年江浙等處行中書省奉中書省取備國子監書籍令儒學副提舉陳公舉校勘申解考元史世祖至元十三年括江西諸郡書板宜春隸江西蓋至元詔取而大德始上此即宋刋元印之本御題分記原通記尊王義寓中年經國為緯外抑內斯崇統萬乃惟一會殊則以同稀珍傳宋槧遣暇可研窮乾隆甲午秋御題鈐寶一曰乾隆御筆五經一函六册易書詩禮記經文春秋左氏經傳不分卷巾箱本行密字展朗若列眉中構字闕筆慎字瑗字不闕乃髙宗時刋上方列字音近錫山秦氏仿宋刻巾箱九經亦同此例闕補禮記六十九七十春秋五十六經圗一函六册宋楊甲撰毛邦翰補大易象數鈎深圗一册尚書軌範撮要圗一册毛詩正變指南圗一册周禮文物大全圗一册禮記制度示掌圗一册春秋筆削發微圗一册不分卷苗昌言序序載陳大夫為撫之期年取六經圗編類為書刋之於學事在乾道元年序後列銜知撫州陳森見西江志職官門次通判學正各一人學録二人經諭六人而邦翰為州學教授實補諸圗此書宋本在明時已為囏致新都吳氏曽購得授梓見顧起元序今重刻本或間有之若此本之古香寶刻誠希珍也御題宋版六經圗八韻太古圗先書後出考書或不考圗非陳刋苗序誠探要物列文彰允造微典備六千年燭照册貽五百載藝馡玩時愒日凛警戒惕夕乾朝守範圍傳授都因著姓氏次銓還以正依韋六經敢曰能窺道一已惟應勵敕幾敬奉禋宗陳爼豆恪遵家法置冠衣帝王學與儒生異罪我由他知我稀乾隆乙未仲春月御筆鈐乾隆雙璽按玉海紹定六年六月甲午緝熙殿成御書二字榜之宋史理宗本紀六年秋九月以緝熙殿榜記宣付史館書中有緝熙殿及內殿文璽御府圗書三則宋時已為善本登之中祕矣又有明文淵閣印更徵纍代寶藏于慎行筆麈載明中葉文淵閣書散佚殆盡蓋已流布人間或吳氏所購得即此本爾其鬻及借人為不孝一印乃是收藏家取唐杜暹語以示其後人考宋周輝清波雜志稱暹每於所藏書末自題云清俸買來手自校子孫讀之知聖道鬻及借人為不孝四書五函七册二十朱子章句集注大學一卷中庸一卷論語十卷孟子十四卷朱子序説讀法咸淳癸酉衢守長沙趙淇刋於郡庠每版中有衢州官書四字中興館閣續録祕書郎莫叔光上言今承平滋久四方之人益以典籍為重凡搢紳家世所藏善本外之監司郡守搜訪得之往往鋟板以為官書其所在各自版行宋時郡守刋書於此可證此本淇為衢守所刻時度宗九年按虞集道園學古録淇乃趙葵次子幼以郊恩補承奉郎舉童子科刻書後六年而入元拜湖南道宣慰使又趙希鵠洞天清録鏤版之地有三吳越閩衢郡屬越由來舊矣琴川毛氏藏本印記最夥其鼎元雙印祕殿珠林內錢選洪崖圗幀首有之上有錢氏印下曰仲雅又見宋版漢書下曰伯雅而此曰季雅似晜弟行好古鑒藏家也餘無考南軒先生張侍講孟子詳説一函六册宋張栻著七卷前癸巳孟子説序講義發題一則按序栻為是書始自戊子成於癸巳故以癸巳名書而講義發題下注戊子紀年寓意序所云蓋將繼此而有考於異日也宋史藝文志載栻孟子詳説十七卷癸巳孟子説七卷文獻通考止載孟子説十七卷此本正癸巳孟子説而刻者誤冠詳説之名耳然其標題自屬宋款密行疏字精槧也景定五年甲子詔歲二月二十日重􅋔於元吉山房卷四末正統十三年戊辰歲夏四月上旬重􅋔於吳庠書舍樂安蔣裕識卷七末右識語二其一記宋理宗景定年號而不書名其一乃明蔣裕蓋司教於吳者也後為崑山徐氏藏本餘無考大廣益會玉篇一函六册梁顧野王撰唐孫強增三十卷前有大中祥符六年都大提舉玉篇所牒及字數野王序啓各一首近吳江張士俊澤存堂重刋宋本玉篇朱彞尊為之序謂顧氏玉篇唐上元末孫強稍增多其字至宋陳彭年吳鋭邱雍輩又重修之於是廣益者衆而玉篇又非顧氏之舊孫氏玉篇去古未逺猶愈於今之所行大廣益本玉篇復上元本而古之小學存焉矣其書較是本獨無牒文二十四卷後新加兩條在三十卷後而闕十八卷後兩條但多附分毫字樣及神珙反紐圗耳彞尊咎彭年等之重修而牒文內明稱彭年等校勘允當其實所謂上元本即此大中祥符本也以復孫氏之舊為辭故去其牒耳且彞尊之意以廣益為非今核兩本字數俱符而澤存堂重刻本須部反多一䇓字又何説也考宋史藝文志但有彭年重修廣韻而無重修玉篇惟文獻通考載重修玉篇三卷非此書書録解題云丁度等既修集韻奏言添字既多與野王玉篇不相參協乞委修韻官别為類篇與集韻並行則與玉篇不相蒙矣是本款式皆宋槧但分卷而不隔流水又一例也闕補九十七欽定天祿琳琅書目卷一

front:
  text: 御製題昭仁殿詩藝帷木榻想貽淳聖日常懸麗柍桭六十一年兹惕息百千萬世永昭仁好書敢謂承先志新德惟期澡我身簷嚮周廬列書室每聞占畢達楓宸皇祖在御時常寢興於此豫不敢居因以貯天祿琳琅
  hash: sha256:3f767a04aaca11fc60c29075961941d68040fbc80c8b51e328c4ff53afc30e07

body:
  text: 諸善本時一徘徊曷勝今昔之思敬成長律丁卯初冬御筆天祿琳琅鑒藏舊版書籍聨句有序藝編藴古香盈羣玉之藏茗榼延韶歡洽重華之賞溯前度籖羅縹碧聨吟美已窺全遞今畨響戛琳琅比例珍宜居上繄此傳稱善本取之而盡拔其尤原夫刻貴初摹數焉而必從其朔蓋自石經乍泐製創成都雕字旋繁文詳廣順範移鐵版存中之舊話堪稽倚向書床邦彥之遺文彌艷况復西廊東庫頒官留胄監之書兼看崇化麻沙入市走巾箱之式考紀年於大定翠琰曽鐫徵掌署於興文白藤競印逮勝國技沿剞氏蘇州樣比杭州更誰家影付鈔胥汲古妙偕述古别梓梨而選粹寧徒邊論單雙驗楮墨而差良奚止畫分粗細嗤耳食鈐題漫信托名則贋鼎都刪任手披摸索非難審體則善刀能品物克聚於所好喜四百部甲乙都排書在佳而不多閲半千年菁華盡備歷宋金元明而完弆護持應藉六丁依經史子集以臚陳整娖真同二酉爰乃拈題舉典因之授簡分曹日是初三中適春朝元旦人仍四七班兼鳯閣鸞坡計祈年尚及經旬招宜徵角顧侍謙才過疇昔樂逮臣鄰詎矜中壘閣藜名沿天祿略仿新吳府玉韻叶青陽矧兹儲以昭仁在豫益凛體仁之義亦曰喻惟求舊願爾無忘由舊之規御製上正三節肇春祥茶宴重華例有常黃閣玉堂胥就列赤文仙藻首成章什研麗則抽中祕箋授臣鄰侍左廂四庫舊曽賡竹素上年茶宴以四庫全書聨句臣舒赫德百城茲又詠琳琅涵書味復融詩味挹茗香頻沁墨香照以青藜卑漢閣臣于敏中積來玄圃陋曹倉府區典籍西都固美埒球玕禹貢梁漫詡鄴侯籖插架臣李侍堯浪吟何氏屋連床乙光偕賦乙未宴甲觀聨披甲子裝書自乾隆甲子重裝以來凡有所得均籖書年月以志鑒藏先後各按部分部系句諸書各系以句臣福隆安御製總臚目舉目歸綱宋版及影宋鈔全入題詠亦如四庫全書例以經史子集為次其元明版則各舉其尤佳者入詠宋金鉛槧元明繼經史精華子集襄續後韋編王弼注周易箋依毛傳鄭公鄉監本毛詩吕詩真鑑屬元汴吕祖謙讀詩記籟項氏天閣藏本周禮精鋟標建陽周禮本宋建纂備闕官逸教補無名氏周禮纂圖互注臣官保解求盲左癖奚忘杜預春秋經傳集解腴詞音辨脣兮齒陸德明左氏音義墨守疵攻膏與肓公羊傳注疏紅印鄂州霑紙濕公羊解詁建即何休注徐彥疏宋本末有鄂州州學官印臣程景伊繆紋晉第帶藝香穀梁傳注疏之首有晉府書畫印中書劄付胥徒掌程公説春秋分記書末有元大德間奉江浙行中省劄付紅印小字巾箱尺寸強五經小字本繢匠六經貽宋殿楊甲六經圖書籍印有宋緝熙殿臣王際華學童四子溯衢庠四書州宋衢庠本詳申鄒邑推張栻張栻孟子詳説廣梓閩中演野王孫強大廣益會玉篇中增顧野王原本宋閩刻迹對聃規嘗紀數六經之名始見莊子天運篇謂吾何以規老聃哉及六經先王之陳迹云云臣蔡新御製類虛班藝匪遺亡漢書藝文志無史類蓋是時諸史未興如楚漢春秋等書今入史類者皆在春秋類非闕遺也惟欣文景能休養漢書亦曰明章號治康後漢書五代即隋尚如鄶隋書兩家改昫並存唐唐書明宋祁歐陽修改劉昫舊唐書監本草一史遂不收昫作論者謂舊書自有勝處武英殿版新舊並存考鈔涑水聊稽異司馬光資治通鑑考異鑑刻廬陵肇間行朱子資治通鑑綱目綱是書初刻溫陵别其為提要此本乃繼刻廬陵者綱目分行間列如春秋經傳例具本末全啓馮谷袁樞通鑑紀事本末紀按樞昉為此體馮琦宋元紀事本末谷應泰明事本末皆襲之臣嵇璜念終始典冠羲黃范祖禹帝學提其要取括繁冗錢端禮諸史提要糾厥繆爰資救匡吳縝新唐書糾繆直筆幾家窺筆削吕夏卿唐書直筆新例臣英廉確評誰某彚評量唐宋名賢歷代確論人不著彚姓氏重儓藍本癡循顧劉向古列女傳愷每傳有圖傳為顧之遺製半壁黃圗僻剩杭祝穆方輿勝覽中時宋偏安餘杭書中不及原郡縣上下歲三千可計歷代史雖未備然已具編年紀事兩體可得經世之全臣阿思哈寓卮説九百相望諸子雖立意不同總不越漆園寓言卮言之旨志皆論也遷仍况荀子子史記禮志即取荀禮論為之蝶或周與紱寫莊南華經人有莊子像明永樂間舍王紱奉敕作贊爭逞儀秦用嬴趙戰國䇿若臣張溎御製特橅耕織更農桑汪綱農桑書軒向曽題刻樓璹耕織圖於多稼兹書乃集陳敷農書秦觀蠶書及樓璹耕織圗詩成之洪懷逸少筆隨記洪邁容齊三筆程演仲舒意寓良程大昌演繁露鐘鼎蟲魚亞爾雅王俅嘯堂集古録形聲點畫匹凡將李錫排韻字類虞初字漸淆羣喙小説始自虞初乃子家之流派摯别沿徐擷衆芳漢志但云某家若干篇集之名始摯虞流别紉佩秋蘭託湘沅楚辭先臣曹秀翻階春草接池塘謝朓集拾遺句配黃金匱杜工部詩史九注函翻敗錦囊九家集注杜詩書是書從之武英殿庫貯殘內檢得淮蔡仆碑壓山斗韓昌黎文集治臣梁國溪潭遊記闢蠻荒栁栁州文集博誇五百狐留腋五百家注韓昌黎集十輯者自誇托拾之富實祗百四八家而已巧遇一雙劍合鋩五百家注栁子厚集乃校武英殿舊貯因新得五百家注韓集取之同為韓醇刋本足稱雙璧思潁手排雜琴局歐陽修六一居士集臣周煌和陶神遇引壺觴蘇軾和陶詩箕弓裘冶兄師教蘇轍欒城集為其曽孫所刋輪輅水氷賔客場六臣注文選了識佚名録枚傅徐陵玉臺新詠傅按文選古詩十九首不著作者姓名其云枚乘毅之詩僅見於玉臺新詠臣王杰御製不收新律韻宫商姚鉉唐文粹體此書祗收古詩而不及律自屬有見遺蘇文選疑難解聖宋文選不內獨無三蘇此可解憶杜正宗慨以慷真德秀文章正宗傳其自序以自昔集録文章者若杜預諸家湮沒弗而行世之昭明文選唐文粹二書未得源流之正云云賦擬青錢蓋小技選青賦箋考憑玉枕祗専長桑世昌蘭亭考以上宋版金源印獨難驂靳吳兢貞觀政要世乃金時版祗此一種為所罕見宋影謄佳擬頡頑藏書家競貴宋槧今有內府所儲影抄各種精好實逺過雕本者聞擴九思通奧窔趙汝梅周易輯聞臣彭元瑞説宗七日契微茫趙彥肅復齊易説贊爻象彖猜圗馬王宗傳童溪易傳數其説主義理以言象徵夏商周愛餼羊聶崇義三禮圗會讀論須淳祐蔡蔡節論語集説臣汪廷璵艷題名訝狀元張張九成孟子傳頡篇約譜物從朔夏竦古文四聲韻內則少儀謙弗遑張時舉小學五書年表自然堪綴范熊方後漢書年表臣董誥長編焉肯遽齊光李燾續資治通鑑長編按司馬光作通鑑先排長編燾紀宋事不敢自謂續通鑑但云續長編而已河山故汴鴈橫塞王存九域志風月清波雀處堂周輝清波雜志魯語餘猶傳孔聖家語肅臣阿御製宋儀精敢企軒皇新儀象法要穹宋蘇頌編當時臺郎所肄精藴皇祖學契圜會通西法欽定數理儀象考成諸書實足為天下後世法全圗庚鼎足冠冕吕大臨考古圖銅輯繪三代秦漢玉古器首載庚鼎雜記金壺頗博詳宋釋適之金壺記屈子志寧在草木吳仁傑離騷草木疏劉郎詞早叶笙簧劉賔客外集友朋􅜁水言都妙王摩詰集昆弟盤洲譽最揚洪適盤州集寫比鈎摹觀太乙以上影宋鈔本椿臣逹刊偏鄭重牒文昌元時書籍並由中書省牒下諸路刋行義原靡盡聖經大真德秀大學衍義音所由生樂記彰陳㿩樂書瑣載續貂補安取李肇國史補傳記肇續之劉餗作國朝臣汪永錫壞談鑄象怪何妨山海經戈矛西蜀乃同室李心傳道命録斧鉞東萊空望洋吕祖謙東萊博議才雋左司宜栁替韋蘇州集綬臣吳詔謀深內相為裴傷陸宣公集大都叢簡搜瑜瑾以上元版入選者共八十餘部今略舉數種以例其餘勝國雕梨汰莠稂內府所藏明版指不勝屈今取其最精者尚得二百五十餘部王侍書饒瘢且垢明版黃伯思東觀餘論精是書內有法帖刋誤一種辨正王著之失頗稱核欽定淳化閣帖釋文考異多採之臣曹文埴御製元才子直走而僵白氏長慶集逮當時元白齊名其實微之不樂天逺甚也輯今弆古非同事天祿文淵故别藏舊藏宋金元明版書籍彚為天祿琳琅至新輯録之四庫全書則特建文淵文源文津三閣分貯之贋製還因重訂正近因重校天祿琳琅舊藏凡偽充宋元槧印者俱詳加别擇改正兼權嚴與判低昂有確係舊刻而時代向未詳者並為核正歸入二坊私版官三舍祝穆云建寧崇化麻沙二坊號圗書之府今所藏有建本麻沙本蓋宋時坊書其監本則官版也諸邸外儲內兩廊中有東宫書府晉府印又內殿緝熙殿諸璽乃東西廊書庫物樞鮮于樞俯趙孟俯璧文貞王世貞昌董其昌晉毛振季振宜跋皆鑑藏諸書人各有題印記臣沈初趙衢守長沙趙淇韓臨卭韓醇陳臨安鞔鼓橋南陳宅書鋪嶽相臺嶽氏家孰廖世綵堂余建安勤有堂汪新安汪綱勤以上七家皆宋時刻書姓氏惟余氏有堂則自宋至元明世守其葉流傳手眼衡殊允諸書中如漢書唐書糾繆久經鑒賞流傳確有可據繪畫鬚眉興欲狂漢書前有趙孟俯王世貞像楚辭前有屈原朱子像少益貴乎多益善有一書而自兩部以至十數部之多者臣紀昀前思作矣後思臧有一書而宋元明各有梓本以後仿前而益工者兼為收録盤螭璽疊登璚府每部用乾隆琳琅御覽之寶及天祿兩璽縈蚪章鮮揭寶房間有舊用文淵閣及內府圗書等章寵賁天顔知有喜內最善本如前漢書資治通鑑綱目九家注杜詩皆命寫御容於卷端臣陸錫熊褒題奎翰訓無疆曽經三十御題者計二種聚珍井井超模笵殿武英聚珍版製極精良簡備如書中明無錫華氏銅活字長慶集亦此法然致用較為不便掃葉紛紛對勘戕諸舊本皆完善精確憑以校對或可少免掃葉之誤聨詠服膺源出水委一御製三閣記並以水言文涵滙萬有源貫以四部為六義乃詩之淵源也臣陸費墀御製蕆編拭目派歸滄所收各種並即繕入四庫全書舊時寢息仰霄漢天祿琳琅之書貯於昭仁殿乃昔時皇祖寢宫也此日書聲逹尚方上書房即對此殿皇子讀書聲每逹於此向曽有詩銘著昭仁深體驗行斯未逮敢無蘉欽定四庫全書史部十四欽定天祿琳琅書目目録類一經籍之屬提要臣等謹按欽定天祿琳琅書目十卷乾隆四十年奉敕撰初乾隆九年命內直諸臣檢閲祕府藏書擇其善本進呈御覽于昭仁殿列架庋置賜名曰天祿琳琅迄今三十餘年祕笈珍函搜羅益富又以詔求遺籍充四庫之藏宛委叢編嫏嬛墜簡咸出應昌期因掇其菁華重加整比並命編為目録以垂示方來冠以丁卯御題昭仁殿詩及乙未重華宫茶宴用天祿琳琅聫句詩其書亦以經史子集為類而每類之中宋金元明刋板及影寫宋本各以時代為次或一書而兩刻皆工緻則兩本並存尤袤遂初堂書目例也一板而兩印皆精好亦兩本並存漢祕書有副例也案事見漢書敘傳每書各有解題詳其鋟梓年月及收藏家題識印記並一一考其時代爵里著授受之源流按張彥逺厯代名畫記自論十六篇其十一記鑒識收藏閲玩十二記自古跋尾押署十三記自古跋私印記自後賞鑒諸家遞相祖述至鐵網珊瑚所載書畫始於是事特詳然藏書著録則未有辨訂及此者即錢曽於也是園書目之外别出讀書敏求記述所藏舊鈔亦粗具梗概不能如是之條析也至於每書之首多有御製詩文題識並恭録於舊跋之前奎藻光華增輝簡册旁稽舊典自古帝王惟唐太宗有賦尚書一篇詠司馬彪續漢志一篇宋徽宗有題南唐舊本金樓子一篇而己未有乙覽如是之博宸章如是之富鑒别如是之詳明品題如是之精確者臣等繕録之下益頌聖學髙深超軼乎三古也乾隆四十六年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀凡例一天祿琳琅彚自乾隆甲子年册府重裝標函列架閲今三十餘載慶惟皇上久道化成文治覃洽欽定四庫全書珍儲三閣美富備臻而古槧之藏於內殿者視舊益加廣焉爰以舊藏續入諸種編輯書目以合於古者祕書分中外之義一書首冠以丁卯御題昭仁殿詩并乙未重華宮茶宴廷臣及內廷翰林等用天祿琳琅聨句詩天文煥朗縹帙生光亦以識弆藏之由與兹觀成之盛事焉一宋元明板書各從其代每代各以經史子集為次金槧僅止一種正如吉光片羽增重書林至明影宋鈔雖非剞氏之舊然工整精確亦猶昔人論法書以唐臨晉帖為貴均從選入一同一書而兩槧均工同一刻而兩印各妙者俱從並收以重在鑒藏不嫌博採也一卷中於每書首舉篇目次詳考證次訂鑒藏次臚闕補至考證於鋟刻加詳與向來志書目者少異則是編體例宜然爾一諸書中有經御製題識者尤為藝林至寶珍逾琬琰敬登鑒藏之首至舊人題跋亦為附録其印記則倣清河書畫舫之例皆用真書摹入以資考據一書名悉依本書首行及板心標目籖題舊未畫一者今悉更正套籖於舊藏者添識乙未重訂續入者則識乾隆乙未重裝用志裒集次第一諸書每册前後皆鈐用御璽二曰乾隆御覽之寶曰天祿琳琅其宋金板及影宋鈔皆函以錦元板以藍色綈明板以褐色綈用示差等乾隆四十年歲次乙未新正上浣臣于敏中臣王際華臣梁國治臣王杰臣彭元瑞臣董誥臣曹文埴臣沈初臣金士松臣陳孝泳奉勑編校

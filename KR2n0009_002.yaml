body:
  text: 宋版史部漢書五函四册四十漢班固撰唐顔師古注帝紀十二卷年表八卷志十卷列傳七十卷共一百卷宋景德二年七月中書門下牒文具載篇首結銜為畢士安寇準王旦馮拯與監本附音春秋榖梁注疏同而彼為景德二年六月此為七月故牒文有顧兹三史繼彼六經之語書尾載淳化五年奉敕刋正至道三年吕端等進書後又有景祐元年余靖奉詔偕王洙赴崇文院讐對嘉祐六年陳譯重校歐陽修看詳雕印熙寧二年書成奏御各銜名據此則淳化至道間校正之本在宋太宗時業經雕印真宗景德年又經重刻仁宗景祐時復命余靖等校正神宗嘉祐熙寧間經歐陽修詳定刋成是北宋時官刻漢書已非一本而熙寧本為最後然詳閲此書首葉牒文中慎字有缺筆係避宋孝宗諱又凡遇完字皆缺筆係欽宗嫌名則明為南宋時重刻之書非熙寧舊本考朱彞尊經義考載宋葉夢得語曰淳化中以史記前後漢書付有司摹印自是書籍刋鏤者益多又載宋李心傳語曰監本書籍者紹興末年所刋也國家艱難以來固未暇及九年九月張彥實待制為尚書郎始請下諸道州學取舊監本書籍鏤版頒行從之然所取者多殘闕故胄監刋六經無禮記正史無漢唐二十一年五月輔臣復以為言上謂秦益公曰監中其他闕書亦令次第鏤版雖重有所費不惜也由是經籍復全云云乃知宋代摹刻漢書始於淳化而此則照熙寧本重付剞劂想即心傳所稱紹興末年所刋之本直至孝宗之時校讐完備始得次第成書耳當時詔勿惜費鄭重其事故書手刻工皆屬上選摹印紙墨亦經加意取材必求精善宜官刻之書無出其右者矣御題內府藏舊刻書甚夥而前後漢書雕鐫紙墨並極精妙實為宋本之冠覽前人跋語知舊為吳興趙孟俯家物展轉流傳一歸之王世貞再歸之錢謙益王錢輩皆精於賞鑒而愛惜珍貴至比之寶玉大弓良非虛語每一翻閲楮墨猶香古今至寶真有神物護持耶乾隆甲子仲秋之月御題鈐寶三曰乾隆宸翰曰幾暇臨池曰稽古右文之璽又御題冠冕琳琅天祿收因刋書目閲從頭吳藏本自趙魏國楚得重歸王弇州久入上方不知故兹編四庫識其由舊杯新斝多佳玉却笑無能大白浮乙未新正下浣御題鈐寶二曰幾暇怡情曰得佳趣中繪御容鈐乾隆雙璽左方鈐寶二曰德日新曰執兩用中牒文前葉有趙孟俯像右方上書趙文敏公小像下書長洲陸師道題於顧汝修藝閣考王世貞弇州續稿載陸師道字子傳長洲人官尚寶少卿汝修無考按明版秦漢印統有黃姬水序稱其書為東川御醫顧公所纂厥嗣汝由光祿汝修鴻臚汝和廷評共成之考松江志顧從禮字汝由顧從義字汝和而不及汝修今卷中有顧從德印以從禮從義證之當即汝修之名但姬水稱其官為鴻臚而世貞跋以光祿稱之似誤以汝由之官屬之汝修固不若姬水序其所著之書為可據也眀王世貞跋余平生所購周易禮經毛詩左傳史記三國志唐書之類過三千餘卷皆宋本精絶最後班范二漢書尤為諸本之冠桑皮紙白潔如玉四旁寬廣字大者如錢絶有歐栁筆法細書絲髮膚緻墨色精純奚潘流瀋蓋自真宗朝刻之祕閣特賜兩府而其人亦自寶惜四百年而手若未觸者前有趙吳興小像當是吳興家入吾郡陸太宰又轉入顧光祿失一莊而得之噫余老矣即以身作蠧魚其間不惜又恐兹書之飽我而損也識其末以示後人琅琊王世貞元美甫重跋次頁繪像旁有小楷書王弇州先生像六字不知何人筆考明史陸太宰名完長洲人正德間官吏部尚書但跋所稱真宗朝刻之祕閣係據書首牒文而言未能審為南宋刋本且於書尾景祐以後重訂始末皆未詳考也王士騏跋此先尚書九友齋中第一寶也近為國稅新舊併急不免歸之質庫中書此志愧明史載士騏世貞子字冏伯舉鄉試第一登萬厯十七年進士終吏部貟外郎亦能文錢謙益跋趙文敏家藏前後漢書為宋槧本之冠前有文敏公小像太倉王司寇得之吳中陸太宰家余以千金從徽人贖出藏弆二十餘年今年鬻之四明謝象三床頭黃金盡生平第一殺風景事也此書去我之日殊難為懷李後主去國聽教坊雜曲揮淚别宫娥一段凄涼景色約略相似癸未中秋日書於半野堂又跋京山李維柱字本石本寧先生之弟也書法橅顔魯公嘗語余若得趙文敏家漢書每日焚香禮拜死則當以殉葬余深愧其言右漢書二跋載在初學集中坦公司馬既得此書屬余重録於此又跋趙吳興家藏宋槧兩漢書王弇州先生鬻一莊得之陸水村太宰家後歸於新安富人余以千二百金從黃尚寶購之崇禎癸未損二百金售諸四明謝氏庚寅之冬吾家藏書盡為六丁下取此書却在人間然其流落不偶殊可念也今年遊武林坦公司馬攜以見視余縱臾勸亟取之司馬家插架萬籖居然為壓庫物矣嗚呼甲申之亂古今書史圗籍一大劫也吾家庚寅之火江左書史圗籍一小劫也今吳中一二藏書家零星據托不足當吾家一毛片羽見者誇詡比於酉陽羽陵書生餓眼但見錢在紙裹中可為捧腹司馬得此十篋乃今時書庫中寶玉大弓當令吳兒見之頭目眩運舌吐而不能收不獨此書得其所歸亦差可為絳雲主人開顔吐氣也劫灰之後歸心空門爾時重見此書佛言昔年竒物經歷年歲忽然復睹記憶宛然皆是藏識變現良非虛語而吕不韋顧以楚弓人得為孔老之云豈為知道者乎司馬精於佛學并以斯言諗之歲在戊戌孟夏二十一日虞山蒙叟錢謙益重跋於武林之報恩院謙益人品不足稱而長於鑒古故於是書三致意跋中所稱謝象三黃尚寶坦公司馬諸人均無考惟李維柱載蘇州府志京山人領鄉薦嘉靖中為常熟教諭又卷中有黃正賔印每用錢謙益印鈐蓋其上正賔當即官尚寶售此書於謙益者收藏諸印中有鼎元伯雅潘允端諸印無考後漢書五函册四十帝后紀十卷列傳八十卷宋范蔚宗撰志三十卷晉司馬彪撰梁劉昭注補共一百二十卷首載乾興元年十一月中書門下牒文係孫奭奏請刋印後漢書并劉昭補志奉敕令國子監依奏施行後列銜名右諌議大夫參知政事魯給事中參知政事吕中書侍郎兼禮部尚書平章事王守司徒兼侍中無姓考宋史乾興元年七月以王曽為中書侍郎同中書門下平章事吕夷簡魯宗道參知政事與牒尾三人列銜吻合是年二月丁謂為司徒兼侍中六月罷按宋史職官志司徒為宰相親王加官而不常置時丁謂適罷故闕其人耳此書於宋諱桓構慎瑗諸字皆缺筆字畫欵式與前漢書相同版心下方刻書人姓名如劉仲王中陳伸等亦與前書相合蓋皆為紹興末年校刋而孝宗時成書者特以劉昭補志合刻始於乾興故仍列舊牒於書首御題范書八志不傳後人雜取東觀漢記等書以補之蓋自宋以前無全本其不全者轉為仍古之舊宋本無八志者民間本也若此書有八志者學官本也乾隆御題鈐寶一曰乾隆宸翰前漢書王世貞錢謙益跋皆合此書而言諸印記亦同隋書六函册六十帝紀五卷列傳五十卷唐魏徵撰志三十卷唐長孫無忌撰共八十五卷是書未載刋刻年月而於宋諱皆缺筆其避廓字乃寧宗嫌名係南宋嘉定間刋本御題此書字迹紙質墨瀋與趙吳興董華亭題跋文選可稱聨璧大內貯宋本書故多視此並遜一籌矣乾隆甲子九秋御筆鈐寶二曰乾隆宸翰曰擕筆流雲藻琴川毛氏泰興季氏藏本有印記又書堂胡氏印無考闕補目録十八十九志二二十六志二十四十三唐書十函册一百本紀十卷志五十卷表十五卷宋歐陽修撰列傳一百五十卷宋宋祁撰共二百二十五卷書首載曽公亮進書表考宋史仁宗嘉祐五年六月歐陽修等上新唐書是書之末前載嘉祐五年六月二十四日進書銜名提舉為曽公亮刋修為歐陽修宋祁編修官為范鎮王疇宋敏求吕夏卿劉羲叟後載是月二十六日準中書劄子奉旨下杭州鏤版頒行富弼韓琦曽公亮董其事校勘官為裴煜陳薦文同校對官為吳申錢藻按宋葉夢得論天下印書有杭州為上蜀本次之福建最下之語意當時新唐書成朝廷重其事故特下杭州鏤版詳閲此本行密字整結構精嚴且於仁宗以上諱及嫌名缺筆甚謹不及英宗以下其即為嘉祐奉敕所刋之本無疑印紙堅緻瑩潔每葉有武侯之裔篆文紅印在紙背者十之九似是造紙家印記其姓為諸葛氏考宣城諸葛筆最著而唐書載宣城紙筆並入土貢唐張彥逺歷代名畫記亦稱好事家宜置宣紙百幅用法蠟之以備摹寫則宣城諸葛氏亦或精於造紙也泰興季氏崑山徐氏藏本又有錢塘梁氏及李安詩梅谷樹德堂諸印無考資治通鑑考異一函三册宋司馬光撰三十卷朝公武郡齋讀書志光既成通鑑又參考異同俾歸一塗别為考異一編則考異本單行胡三省後取以入注耳考書成在元豐七年玉海載元祐七年詔諸路安撫鈐轄司并西京南京各賜通鑑一部是哲宗朝刻本已具今校書內欽宗以下諱俱不闕當是元祐槧也御題是書字體渾穆具顔栁筆意紙質薄如蟬翼而文理堅緻為宋代所製無疑中間十二卷至第十八卷舊闕不知誰氏補抄幾與雕本莫辨皇媧煉石竟成完璧亦兹書之幸也乾隆甲子秋八月御識鈐寶三曰幾暇臨池曰稽古右文之璽曰含味經籍書史會要建炎間劉夫人掌內翰文字及寫宸翰髙宗甚眷之亦善畫畫上用奉華堂印記又見陳善杭州志此本南渡初已入鑒藏更足徵為北宋本又倪淵乃元初人著周易集説易圗説卦説序例諸書黃溍文集有其墓志淵字仲深烏程人承務郎富陽縣尹三山敖繼翁深於三禮而尤喜易公從之遊於節文度數之詳辭變象占之妙靡不博考洞究其史氏一印不載名而玉海有史照通鑑釋文三十卷考尚友録照字子熙眉山人其父清卿蘇氏兄弟以師事之未審是其人否也闕補卷十二之卷十八資治通鑑綱目六函册六十宋朱子撰五十九卷前自序宋陳振孫書録解題載朱子綱目云刻於溫陵别其綱謂之提要今版在監中廬陵所刋則綱目並列不復别也是書大書細注字畫分明即當時廬陵刋本御題涑水創為開義例紫陽述訂益精微直傳一貫天人學兼揭千秋興廢機敬勝治兮怠勝亂念兹是耳釋兹非三編惟此遵綱紀輯覽曽無越範圍鋟出新安留面目弆增天祿有光輝外王內聖斯誠備勿失服膺永敕幾乾隆甲午仲秋月御筆鈐寶二曰乾隆宸翰曰幾暇臨池前繪御容鈐乾隆雙璽卷後間有印記俱經割去不知誰氏所藏而補抄之葉紙潔字工竟無異於刋本則藏是書者必為好古之士書中雖有八册以别本補入紙色印工稍遜而亦皆取之舊刻不相懸絶也闕補卷一全卷九二之十二卷三十二十六十七卷五十四一之三卷五十七十二之十四卷五十九末葉通鑑紀事本末十六函册八十四宋袁樞編四十二卷有楊萬里序宋史袁樞建之建安人試禮部詞賦第一乾道七年除太學録求外補出為嚴州教授嘗以司馬光資治通鑑浩博乃區别其事而貫通之號通鑑紀事本末參知政事龔良茂得其書奏上孝宗讀而嘉歎以賜東宫及分賜江上諸帥玉海載淳熙三年詔取袁樞資治通鑑與陸贄奏議賜皇太子熟讀以求治道與宋史吻合是書初刻於嚴陵淳熙元年楊萬里出守臨漳過嚴陵為序行之理宗寶祐時宗室趙與籌以嚴陵版字小且訛易為大書讐校重刋有與􅊸自序即此本而缺其序御題洓水編年著通鑑建安紀事别成書興亡本末為金鑑條理因依若輔車雖有增前斯數典便稱續後此開初淳熙紙墨香天祿玩味孜孜日警豫乾隆乙未新春御筆鈐乾隆雙璽通鑑紀事本末十四函册八十四篇目同前楊萬里序後有趙與􅊸序按此亦寶祐刋本而刷印稍後每卷首末有禮部官書朱文長印考明史藝文志永樂四年命禮部尚書鄭賜訪購遺書又朱彞尊經義考載明永樂間敕翰院凡南內所儲書各取一部於時修撰陳循督舟十艘載書百櫝送北京又嘗命禮部尚書鄭賜擇知典籍者四出購求遺書不特合宋金元之所遺而滙於一且奉使者復命必納書於庫縹緗之富古未有也鄭賜當時官禮部董其事或所採之書鈐以禮部官印是書似亦曽為所採也闕補卷四八十八卷八六十二卷二十二九十九卷三十八一百卷四十二六七通鑑紀事夲末六函二册四十篇目同前趙楊二序前有元陳良弼序是書亦寶祐舊版據良弼序稱版藏趙與􅊸家束之髙閣四十餘年延祐六年其孫趙明安售於良弼置之嘉禾學宫復為之序良弼號公輔宣城人時為嘉禾郡文學掾出資購版以惠後學蓋亦好古之士也書中雖間有字畫漫漶及補葉處然實為宋槧未可以元印而少之闕補卷一五卷六七十六卷十十五十六卷十一三十三三十四卷十二八十六卷十四十一十二卷十五一十十五六卷十六一百一卷十七五十二卷十九十一十二卷二十五四十六卷二十九七十七七十八卷三十二三四卷三十三一百十九一百二十卷四十一六十七六十八帝學一函四册宋范祖禹編八卷宋史祖禹字淳甫神宗時進士甲科從司馬光編修資治通鑑書成光薦為祕書省正字哲宗元祐初擢右正言尋改著作郎兼侍講在講筵八年蘇軾稱為講官第一嘗進唐鑑十二卷深明唐三百年治亂學者尊之目為唐鑑公是書亦同時所進書後有嘉定辛巳青社齊礪跋載祖禹五世孫擇能宰髙安刋置縣齋未幾散逸户曹玉牒汝洋一日訪得元本俾鋟木以永其傳云云考宋史宗室世系表汝洋為太宗長子漢王元佐八世孫齊礪無考按赤城志有齊碩者青社人以宣教郎知台州則礪當屬其雁行也詳閲是書楮墨精好洵屬嘉定時所重刋者御題此宋學士范祖禹編輯進上乙覽元本也成於元祐戊辰重刋於嘉定辛巳藏弆御府有年每於幾餘展閲不特芬流楮墨足備石渠東觀之遺而自宓羲迄宋凡帝王務學求師之要燦然眉列實為千秋金鑑董子有言強勉學問則聞見博而知益明因題卷首以志自勗云乾隆甲子重九前一日鈐寶二曰稽古右文之章曰乾隆宸翰又御題元祐成書心力殫逮乎嘉定又重刋欣兹祖禹藝編在不異九齡金鑑看務學求師著儀軌修身蒞政示倪端知之行矣吾猶恧綈几寧惟玩古觀乙未新正再題鈐乾隆雙璽明吳寬藏本寬字原博長洲人成化八年會試廷試皆第一授修撰纍官至禮部尚書卒贈太子太保諡文定叢書堂印無考諸史提要二函册十六宋錢端禮撰十五卷前劉孝韙序宋陳振孫書録解題載諸史提要十五卷參政吳越錢端禮撰考宋史端禮於紹興間通判明州有聲髙宗材之纍遷至端明殿學士簽書樞密院事兼權參知政事是書蓋其時所刋故序中有參政錢公之語端禮為吳越王錢鏐八世孫書中自鏐以後諱皆缺筆孝韙自稱門下士未詳其人書後載迪功郎前監潭州嶽廟李龜朋從事郎前平江府吳縣尉主管學事徐似道迪功郎紹興府府學教授胡紘校正李龜朋亦無考明凌迪知萬姓統譜載徐似道天台人少負才名為吳縣尉受知於范成大遷祕書監少監胡紘慶元人幼頴悟好學讀書過目不忘纍官至吏部侍郎出為廣東經略所至有能聲劉孝韙序稱門下士合辭以請則龜朋等校正是書皆出端禮之門墻者也明晉莊王鍾鉉藏本餘印無考新唐書糾謬一函六册宋吳縝撰二十卷前自序後載縝進書表宋吳元美後序宋鼂公武郡齋讀書志曰吳縝字廷珍成都人仕至郡守數新書初修之時其失有八類其舛誤二十門凡四百餘事又宋王明清揮麈後録載嘉祐中詔宋景文歐陽文忠諸公重修唐書時有蜀人吳縝者初登第因范景仁而請於文忠願預官屬之末上書文忠言甚懇切文忠以其年少輕佻拒之縝鞅鞅而去逮夫新書之成乃從其間指摘瑕疵為糾謬一書至元祐中縝遊宦蹉跎老為郡守與五代史纂誤俱刋行之紹興中福唐吳仲實元美為湖州教授復刻於郡庠且作後序以為針膏肓起廢疾杜預實為左氏之忠臣然不知縝著書之本意也吳元美宋史無傳考明凌迪知萬姓統譜載元美福州人紹興中為福建安撫司機宜鄉人鄭瑋告其家亭號潛光有心於黨李堂名商隱無意於事秦秦檜惡之謫容州是書元美作後序時為紹興戊午乃宋髙宗紹興八年序稱直寶文閣宇文時中自蜀來守吳興以郡庠有新唐書五代史版本而吳君此書不可不附見遂令併刻之云云此本密行小字楮墨甚精實宋刋本之佳者宇文時中仕左中奉大夫直祕閣亦見迪知萬姓統譜御題新唐書糾謬宋吳縝所作也觀其離為二十門逐條考證摘舉舛訛洵稱犂然有當夫以宋代文學之臣如歐陽修宋祁者主持館局尚不免紕繆抵牾信史之難亶其然乎是書為元刻舊本幾暇覽觀用志數語於卷首乾隆甲子十月草有八日鈐寶二曰莊敬日強曰內府書畫之寶書後有明文徵明行書一行曰𢎞治丙辰春三月草四日觀於唐子畏書樓文璧記按𢎞治丙辰為明孝宗九年書畫譜載徵明名璧以字行長洲人子畏係唐寅字吳縣人二人皆工書畫擅才名寶貴是書則在前明己難得矣子畏有印記本朝季振宜徐乾學均有收藏圗章新唐書糾謬一函四册篇目同前缺吳元美後序是書密行小字體式與前部同而筆畫較肥亦間有訛字蓋宋代翻刻之本後缺吳縝進表一葉及吳元美後序係本書所有而後經散逸者表末六行墨筆補書而中仍缺一百三十四字注明缺文補書者不知誰氏書中頗有校正訛字之處亦留心考古之士惜所見非全本耳明鴻臚顧汝修藏本詳見後明版秦漢印統考證本朝大學士蔣廷錫編修查慎行俱經收藏廷錫字揚孫江南常熟人康熙癸未進士選庶吉士授編修官至東閣大學士諡文肅慎行字悔餘號初白浙江海寧人康熙癸酉舉順天鄉試以大學士李光地薦入直南書房癸未成進士選庶吉士授編修得樹樓即慎行家樓名其武陵世家顧蒙困學齋諸印無考闕補進表末葉唐書直筆新例一函二册宋吕夏卿撰四卷後附新例須知一卷宋史吕夏卿字縉叔泉州晉江人舉進士為江寧尉編修唐書直祕閣其學長於史貫穿唐事博采傳記雜説數百家折衷整比又通譜學創為世系諸表於新唐書最有功鼂公武郡齋讀書志稱夏卿強記絶人預修唐史此其在書局時所建明歐宋間有取焉此與新唐書糾謬版式相等想同時所鋟蓋是時新書初成文學之唐宋名賢歷代確論二函册二十一百一卷無撰人姓名宋陳振孫書録解題云歷代確論一百一卷不知何人集自三皇五帝以及五代凡有論述者隨世次編次又宋史藝文志載名賢十七史確論一百四卷不知作者卷帙雖少異意即是此書其標題唐宋名賢疑為後人所加然宋志有詹玠唐宋遺史又有無名氏唐宋名賢詩話蓋當時習有此稱按書中事涉宋主皆空格於宋諱均有缺筆且字畫刋印俱極工妙信宋刻佳本也每册首末有緝熙殿文淵閣御府內殿諸璽則南宋明初此書俱登中祕後乃轉入收藏家有長洲文氏玉蘭堂辛夷館印檇李項氏萬卷堂遼西郡諸印夲朝泰興季氏亦有印記古列女傳二函八册漢劉向編八卷每傳有圗晉顧愷之畫宋曽鞏列女傳序文傳凡八篇事具漢書向列傳而隋書及崇文總目皆稱向列女傳十五篇曹大家注以頌義考之蓋大家所注離其七篇為十四與頌義凡十五篇而益以陳嬰母及東漢以來凡十六事非向書本然也蓋向舊書之亡久矣嘉祐中集賢校理蘇頌始以頌義編次復定其書為八篇與十五篇者並藏於館閣而隋書以頌義為劉歆作與向列傳不合今驗頌義之文蓋向之自序又藝文志有向列女頌圗明非歆作也今校讐其八篇及十五篇已定可繕寫云云鼂公武郡齋讀書志曰漢劉向撰凡八篇前有王回序其略曰此書有母儀賢明仁智貞慎節義辨通嬖孽等篇而各頌其義圗其狀總為卒篇傳如太史公記頌如詩之四言而圗為屏風然世所行向書乃分傳每篇上下並頌為十五卷其十二傳無頌三傳同時人五傳其後人通題曰向撰題其頌曰向子歆撰與漢史不合故崇文總目以陳嬰母等十六傳為後人所附豫以頌考之每篇皆十五傳耳則凡無頌者宜皆非向所奏書不特自陳嬰母所斷也頌云畫之屏風而史有頌圗在八篇中莫得而考以向所序書多散亡獨此幸存而完復為他手竄疑於其真而以頌證之刪為八篇號古列女傳餘二十傳其文亦奧雅可喜故又以時次之别為一篇號續列女傳公武按隋經籍志有劉向列女傳十五卷又有劉歆列女傳頌又有項原列女後傳今回刪此書為八篇以合漢史得之矣至於疑頌非歆作蓋因顔籀之言耳則未必然也二十傳豈項原所作耶今合觀曽鞏王回鼂公武所言各有異同其以頌皆為劉向所作也則曽與王同而鼂又據隋經籍志以頌為出於歆手其以八篇為仍劉向之舊也則曽王鼂皆合而曽以陳嬰母以下十六事非向書本然鼂則以凡無頌者皆非向所奏書蓋因其時向之舊書已亡而所流傳者又非一本刪訂者亦非一人皆各就所據而言耳此本為宋寧宗嘉定七年刋行前有武夷蔡驥按語云列女傳頌義大序小序及頌或者皆以為劉向子劉歆作驥謹按隋書崇文總目及本朝曽校書序則非歆作明矣然崇文總目則以續二十傳無頌附入向七篇中分上下為一十四篇并傳頌一篇共成一十五篇今人則以向所撰列女傳七篇並續列女傳二十傳為一篇共計八篇今止依此將頌義大序列於目録前小序七篇散見目録中間頌見各人傳後觀者宜詳察焉蔡驥宋史列傳不載其云依今人所定不知出於誰氏之手書分八卷前七卷以頌附傳後與曽鞏所訂傳七篇頌一篇定為八篇者不合至無頌之二十傳王回所云號續列女傳别為一篇者本在八篇之外此則列為第八卷書中每傳有顧愷之繪圗按曽鞏序中據藝文志有向列女傳頌圗一語並未言及所校讐者有圗與否王回則云史有頌圗在八篇中莫得而考是愷之所繪二人皆未之見此獨燦若列眉宜藝林珍祕目録後刋建安余氏印書中或稱靜菴余氏模刻或稱余氏勤有堂刋即嶽珂九經三傳沿革例所稱建安余氏也御題劉向列女傳宋嘉定間閩中所刋圗書並列殆古遺製大內有顧愷之女史針圗旁書針文即董其昌刻入鴻堂帖者不知蘇子容所見列女傳畫為墨迹耶抑刻本也乾隆甲子秋九月御題鈐寶二曰乾隆宸翰曰擕筆流雲藻錢謙益跋余藏列女傳古本有二一得於吳門老儒錢功甫一則丙戌入燕得於南城廢殿中皆僅免於劫灰此則內殿本也功甫指示余圗畫雖草略尚是顧愷之遺製蘇子容嘗見舊夲於江南人家其畫為古佩服而各題其頌像側今此畫佩服古朴坐皆尚右儒者在百世之下得見古人形容儀法非偶然者吾子其寶重之余心識功甫之言不敢忘近又簡吳中舊刻贊後有贊乃黃魯曽以已作竄入與古文錯忤讀者習而不察久矣秦漢古書多為今世妄庸人駁亂甚矣古本之貴重也壬辰孟冬虞山蒙叟錢謙益題識考錢功甫名允治長洲人錢榖之子黃魯曽字得之吳縣人前明正德丙子科舉人琴川毛氏藏本內府長印未詳時代餘印亦無考闕補目録前三葉卷八末三葉方輿勝覽四函二册三十宋祝穆編七十卷吕午序祝穆自序祝洙跋卷首有引用文集目一卷書首有咸淳二年六月福建轉運使司禁止麻沙書坊翻版榜文祝穆跋為咸淳丁卯季春丁卯係咸淳三年是書當是咸淳二年開雕成於三年因洙重訂是書故禁坊間翻刻舊版洙稱先君子方輿勝覽行於世者三十餘年版老字漫遣工新之重整凡例分為七十卷又云元本拾遺各入本州之下新增五百餘條並標出是此書不盡為祝穆之舊矣編次首浙西訖利州凡十七路每州郡分標事要二十門考穆字和甫嘗從朱子授業以儒學昌其家子洙寶祐中進士景定間為涵江書院山長郡守徐直諒薦其趨向不凡學問有本宋史載吕午字伯可歙縣人嘉定時進士官至中奉大夫孫齊之氏印無考闕補吕序一目録九之十二卷一十九卷三十九二十卷四十三十四卷五八九卷九七卷十五卷二十六七八卷三十八七卷四十五十一卷五十八十宋版子部纂圗互注荀子一函八册周荀况撰三十二篇唐楊倞注分二十卷前載楊序序後有欹器大路龍旗九斿三圗宋陳振孫書録解題曰漢志作孫卿子者避宣帝諱也至楊倞始復改為荀分二十卷而注釋之淳熙中錢佃耕道用元豐監本參校刋之江西漕司其同異著之篇末凡二百二十六條視他本最為完善云云據此則宋時刋刻荀子已非一本是書標為纂圗互注書中於倞注外又加重言重意互注諸例與經部宋本毛詩周禮春秋經傳集解三書正同圗樣字體版式亦復相等蓋當時帖括之書不獨有經也序首董珏生章一印無考闕補卷三一卷十八一卷二十二南華真經二函十册周莊周撰晉郭象注唐陸德明音義十卷宋鼂公武郡齋讀書志曰按漢書志書本五十二篇晉向秀郭象合為三十三篇內篇七外篇十五雜篇十一唐世號為南華真經又宋戴埴曰今之刋印小册謂巾箱本起於南齊衡陽王鈞手寫五經置巾箱中賀玠曰家有墳索何須蠅頭細書答曰檢閲既易且手寫不忘諸王從而效之古未有刋本雖親王亦手自抄録今巾箱刋本無所不備是宋時巾箱本盛行於世此書版髙不及半尺較之經部中五經及東萊家孰讀詩記尺寸尤縮而字畫倍加纎朗紙質墨光亦極瑩緻乃巾箱本之最佳者御書南華真經四字鈐寶一曰乾隆宸翰又御題大內宋鋟南華經傳自永樂間蠅頭細書紙香墨古誠寶迹也古人有巾箱五經便於行役登臨觀覽斯亦其類歟乾隆御題鈐寶二曰乾隆宸翰曰稽古右文之璽明王紱贊云柱下五千漆園萬言無適非道所賦自天後來者上青出於藍萬幾攸暇展兹簡編玉堂祕本金匱竒鐫珍蒙睿覽永矢勿諼中書舍人臣紱奉敕恭贊永樂二十一年歲次癸卯二月六日考明史王紱字孟端無錫人博學工詩能書永樂間以善書供事文淵閣除中書舍人次葉有莊子像上元程京萼書史記莊周傳京萼無考書類明文氏父子畫筆亦秀逸不知誰作華亭董其昌藏本有印記餘印無考闕補卷一一二纂圗互注南華真經二函十册篇目同前首有郭象序次節録莊子大宗師為太極説而繪宋周敦頤太極圗於後并載圗説是書於郭象注陸德明音義外復標互注合之荀子皆一時所刋之書書中有世禎印未知其姓又華善卿氏亦無考按明有華愛字仁卿鄞人正德進士歷桂林守直道忤人被劾落職家居鎮日以詩書自娛精古書法尤工羲獻行草為詩希盛唐風格見凌迪知萬姓統譜善卿氏或其雁行也纂圗互注南華真經一函五册篇目同前闕郭象序及太極圗説此與前一部版式相同惟每葉左方欄線外俱刋篇名卷數葉數於上宋版往往有此琴川毛氏藏本有毛扆印扆字斧季晉季子精於小學最知名見蘇州府志又有莫雲卿印考明史莫如忠子是龍字雲卿後以字行更字廷韓十歲能文長善書皇甫汸王世貞輩亟稱之以貢生終又有華亭王氏王彥淳諸印無考闕補卷六十六卷十十二戰國䇿一函八册宋鮑彪注十卷首宋王信序次彪序并載劉向曽鞏上目録序二首按曽鞏戰國䇿序云劉向所定戰國䇿三十三篇崇文總目稱十一篇者闕臣訪之士大夫家始盡得其書正其誤謬而疑其不可考者然後三十三篇復完所謂三十三篇者東周一西周一秦五齊六楚四趙四魏四韓三燕三宋衛一中山一陳振孫書録解題云尚書郎括蒼鮑彪注以西周正統所在易為卷首其注凡四易藁乃定王信序曰鄉先生鮑公戰國䇿注余得其本刋之會稽郡齋序為紹興辛亥作考宋史王信字誠之處州麗水人紹興進士官至通議大夫嘗以集賢殿修撰知紹興府山隂境有􅀈􅀈湖四環皆田歲苦潦信創啓斗門築十一壩化滙浸為上腴民繪像以祀更其名曰王公湖此書蓋即知紹興時所刋也闕補卷七二十四農蠶書一函一册宋陳敷農書三卷秦觀蠶書一卷附樓璹耕織圗詩按宋史藝文志陳敷農書三卷陳振孫書録解題云農書三卷稱西山隱居全真子陳敷撰未詳何人其書曰田曰牛曰蠶洪慶善為之後序慶善係洪興祖字又云秦少遊蠶書見少遊淮海集第六卷云云此本二書合刻係宋江綱守髙郵時所編其跋農書略云髙沙素稱沃壤每遇豐歲長淮所賴以儲蓄者糴於此以取足焉余曩得農書一帙凡耕桑種植之法纎悉無遺朅來守此視事之初急鋟諸木以為邦人勸孫鏞蠶書跋云髙沙之俗耕而不蠶郡太守汪公取秦淮海蠶書示余曰子謂髙沙不可以蠶此書何為而作乎乃命鋟木與農書並傳焉二跋俱為嘉定甲戌按甲戌為宋寧宗嘉定七年後附樓璹耕織圗詩並録璹孫洪鐫石題識稱嘉定庚午蓋汪綱刻書時見此石刻遂併取之以附於二書之末耳宋史汪綱字仲舉黟縣人淳熙中中銓試調鎮江司户參軍歷知平陽弋陽蘭溪太平諸縣又以選知髙郵軍進直煥章閣知紹興府權户部侍郎致仕綱學有本原多聞博記兵農醫卜隂陽律厯諸書靡不研究所著有恕齋集左帑志漫存録史雖未載此書而記其知髙郵時嘗增修興化堤堰以興水利政績甚多蓋留心經濟宜以勸課農桑為急務也檇李項氏泰興季氏藏本有印記容齋三筆一函四册宋洪邁著十六卷邁自序宋史洪邁字景盧博極載籍雖稗官虞初釋老旁行靡不涉獵有容齋五筆夷堅志行於世陳振孫書録解題云容齋隨筆續筆三筆四筆各十六卷五筆十卷每編皆有小序五筆未成書此三筆自序成於慶元二年凡二百四十八則目録後記臨安府鞔鼓橋南河西岸陳宅書籍鋪印考杭州府志鞔鼓橋屬仁和縣境今橋名尚沿其舊與洪福橋馬家橋相次在杭州府城內西北隅按魏了翁鶴山集書苑菁華序云臨安鬻書人陳思集漢魏以來論書者為一編最為該博又南宋六十家小集亦陳思彚編書尾皆識臨安府棚北大街陳氏書籍鋪刋行方回瀛奎律髓載陳起睦親坊開書肆自稱陳道人起字宗之能詩凡江湖詩人皆與之善嘗刋江湖集以售時又有賣書者號小陳道人據此則當時臨安書肆陳氏多有著名惟陳思在大街陳起在睦親坊即今弼教坊皆非鞔鼓橋之書鋪也御題洪忠宣皓節並蘇典屬國而時會之難有過之其子邁博學淹通夀登耆耋為宋宿儒孫亦世其家聲善人有後矣邁所著容齋隨筆雜志今古以傳其所聞此為隨筆之三真宋鋟也乾隆御識鈐寶三曰稽古右文之璽曰乾隆宸翰曰萬國農桑寤寐中正統十二年崖菴重志十六卷末右識語一崖菴未詳其人此書歷經長洲文徵明檇李項篤夀泰興季振宜崑山徐乾學收藏俱有印記餘無考闕補卷八末葉程氏演蕃露一函一册宋程大昌撰六卷前自序陳應行跋考宋史程大昌字泰之休寧人十歲能屬文登紹興二十一年進士第主吳縣簿擢太平州教授召為太學正試館職為祕書省正字孝宗即位遷著作佐郎選為恭王府贊讀擢國子司業兼權禮部侍郎直學士院繼除浙東提點刑獄徙江西轉運副使尋命權刑部侍郎升侍講兼國子監祭酒給事中纍遷權吏部尚書以行中外更迭之制力請郡遂出知泉州汀州遷知建寧府光宗嗣位徙知明州尋奉祠紹熙五年請老以龍圗閣學士致仕慶元元年卒賜諡文簡大昌篤學於古今事靡不考究有禹貢論易原雍録易老通言考古編演蕃露北邊備對行於世此書有泉州州學教授陳應行跋稱淳熙庚子分教溫陵始得其禹貢圗論繼又得其考古編演蕃露二書亟命繕寫鋟木以傳於淳熙辛丑竣事按辛丑為淳熙八年合之宋史大昌出知泉州當在其時宋陳振孫書録解題載演蕃露十四卷續六卷今書祗六卷乃十四卷已佚而此特其續者應行字季陵建安人文獻通考載其所撰之書有杜詩六帖十八卷明焦竑藏本有印記考明史竑字弱侯江寧人萬厯十七年進士殿試第一官翰林修撰博極羣書自經史至稗官雜説無不淹貫善為古文典麗馴雅集名淡園蓋竑所自號也餘三印俱無考嘯堂集古録一函二册宋王俅撰分上下二卷首宋李邴序後宋曽機跋文獻通考載宋陳振孫語曰王俅子辨撰李邴漢老序之稱故人長孺之子未詳何王氏也皆録古彞器欵識自商迄秦凡數百章以今文釋之疑者闕焉是王俅在振孫時已無可考按宋史李邴任城縣人中徽宗崇寧五年進士第髙宗紹興間纍官資政殿學士卒諡文敏有草堂集一百卷此書邴序稱與俅父同鄉又為同年進士則俅之家聲里閈約略可知俅於邴為後進成書時當在南渡以後書末有跋其署名處闕去考宋版翻刻本乃淳熙丙申廬陵曽機所撰跋中稱是書最為後出竒文名迹自商及秦凡數百章尤為精夥初不曉其前晦而今見因得其鋟版試摘所藏邵康節秦權篆銘較之毫髮不舛益信子辨裒類之不妄敬書於後且掇古人所為觸物存戒之意以拜之云云丙申為宋孝宗淳熙三年去紹興間未逺曽機無考當亦好古博雅之士也書中收藏印記三俱無考卷下載古印章處下方鈐有朱印雜復不倫篆刻亦出俗手非鑒賞家所太學新編排韻字類八函四册六十宋李錫虞韶撰上平聲十五卷下平聲二十三卷上聲十五卷去聲十五卷入聲八卷共七十六卷是書卷首刋昭武李錫建安虞韶編次考之宋史列傳二人俱不載藝文志內亦未列此書然標題之上冠以太學新編二人似曽肄業於太學者按經義考云天下印書福建本幾遍天下錫韶俱閩人當是閩中刋行之書且版髙半尺乃巾箱本亦宋所盛行者字朗紙堅瑩然可寶御題此宋太學本也依韻分編備聲律之用與選青賦箋同屬閩中所刋迹其字古墨香藏之祕府足為縹緗生色乾隆甲子秋日御識鈐寶二曰乾隆宸翰曰幾暇臨池闕補目録上平聲一去聲十三下平聲卷七一上聲卷十二二十二二十三卷十五三十七之三十九去聲卷一一之五卷十五四十一四十二入聲卷一全卷二全欽定天祿琳琅書目卷二

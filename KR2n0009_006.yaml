  text: 欽定四庫全書欽定天祿琳琅書目卷六
  hash: sha256:486bc94466bdec2e82e4dfdd3716476ed24a93bf6b181f3ff171b6133a6b45e5
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2n0009_WYG_006-1a, image: WYG0675/WYG0675-0455c.png}
body:
  text: 元版子部纂圖分門類題注荀子一函十册周荀况撰三十二篇唐楊倞注分二十卷前載楊序并新增麗澤編集荀子事實品題一卷不著纂人姓氏又宋陳傅良輯荀子門類題目一卷此當時帖括之書也其門類題目一卷於標題次行刋永嘉先生陳傅良編所分門類始曰天地終曰五常共四十門末又附拾遺并事要總類二條皆擇書中之可作題目者分類摘句以取便於觀覽卷後别行刋麻沙劉通判宅刻梓于仰高堂十二字卷一之後亦于别行刋關中劉旦校正所謂劉通判者當即是人第書首標題為纂圖分門類題注荀子書前仍當有圖蓋已失之矣至所載荀子事實品題一卷觀其識語稱舊本荀揚圖説不過具文今得麗澤堂編次品題凡卿雲事實顛末歷歷可考云云則是荀揚合刋之書非此本中所應有乃書賈割取荀子事實以冠于書首耳且書中自卷九之卷十三及卷十五共六卷標題祗稱荀子卷十六卷二十兩卷標題又稱監本音注荀子書名既不畫一板式亦復懸殊係以三刻湊成一書其標稱荀子者橅印甚精紙墨俱佳實為宋槧餘則元時所刋逺不相及然宋本流傳者絶少今尚存吉光片羽于元刻之中雖出湊合亦可寶也明文徴明毛晉藏本本朝泰興季氏亦經收藏河南程氏遺書一函八册宋朱子輯二十五卷附録一卷外書十三卷後附文集十二卷又元談善心輯遺文一卷目録後有善心識語并朱子辨誤書末載宋趙師耕麻沙本後序季襲之春陵本後序又元鄒次陳虞槃序二篇談善心字元之臨川人元史無傳其事迹不可考所作識語稱程子遺文遺事一卷善心始慮世傳胡氏本猶未盡善而朱子改本惜不可見貞白虞叔近示以所得吳內翰家藏别本乃與意見吻合用鋟諸梓以與學者共之其朱子與劉共父張南軒辨論所及者悉附注于目録之下且為竊考程氏世系譜于十二卷之首云云世系譜此本已闕鄒次陳序稱遺書外書俱出程門弟子手記朱子家藏世所刋本無不同者獨二先生文集出胡文定公家頗有改削朱子定其所當改者數紙屢以書致劉張二公然承舛習訛卒莫之從談元之因與蜀郡虞槃往復討論以復乎朱子所改之舊焉今觀李襲之舂陵本後序祇言遺書外書而不及文集其趙師耕麻沙本後序則稱二程先生文集憲使楊公已鋟版三山學宫遺書外書則庾司舊有之後俱燬于乙未之火師耕承乏來此亟將故本易以大字與文集為一體刻之後圃明教堂云云按陳振孫書録解題載河南程氏文集十二卷謂為建寧所刻本載在集部不與遺書合録子部之中是振孫所指建寧本似為楊公所刋而以一體合刻則自師耕始也考浙江通志師耕黃巖人登宋寧宗嘉定七年進士第其序猶自署古汴者蓋不忘故土之意李襲之無考元史虞槃字仲常隆州仁夀人集之弟登延祐進士授吉安永豐丞後終嘉魚縣尹西江志鄒次陳字周弼一字悅道宜黃人中博學宏詞科所著有遺安集十八卷史鈔十卷此書校正文集雖足訂别本之訛然橅印草草紙墨皆不求精在元刻中又其次者書中有趙氏子昻龍門子圖書記進士郡李縣令三印考元史孟俯以英宗至治二年六月卒而鄒次陳序作于至治二年七月談善心識語作於至治三年九月是孟俯殁時書尚未經刋行安得其收藏印記進士郡李縣令一印文義亦不可解觀三印篆法俱極粗劣其為書賈偽造無疑故不採録闕補文集卷八全近思録一函四册宋朱子吕祖謙同輯十四卷宋葉采集解前采序並進書表目録後載朱子祖謙識語二篇陳振孫書録解題馬端臨文獻通考皆載近思録十四卷而不及葉采集解明王圻續文獻通考載近思録有何基發揮戴亨補注栁貫廣輯黃績義類諸書亦不載此本考宋史無葉采傳凌迪知萬姓統譜稱采字仲圭成都人初從蔡淵受易學已而往見陳淳淳以其好躐高妙而少循序就實工夫屢折而痛砭之采自是屛斂鋒鋩駸趨著實淳深喜之理宗寶慶初為祕書監嘗論郡守貪刻之害上嘉納之今觀書中進表係淳祐十二年表後結銜為朝奉郎監登聞鼓院兼景獻府教授距作祕書監時已歷二十八載迪知乃未經考及耳集解之作蓋在黜浮崇實之後序中有研思積久踰三十載義稍明備之語用心亦良苦矣此本係仿宋刋而紙質不免粗黝之病闕補卷二三十五卷九十六近思録一函三册篇目同前闕葉采序此本版式較大紙質亦極堅緻勝於前本闕補卷一四卷十十一十二卷十四十一之十三朱子語類八函六册九十宋黎靖德輯一百四十卷前載宋黃幹李性傳蔡抗吳堅黃士毅魏了翁王佖諸序并語録姓氏門目目録後靖德識語二篇考訂九條馬端臨文獻通考載李道傳輯晦庵語録四十六卷其弟性傳又輯續録四十六卷王圻續文獻通考載文公語類一百三十八卷乃黃士毅所序次者今按靖德識語稱李道傳刋語録於池李性傳刋續録蔡抗刋後録皆十饒是為三録黃士毅輯語類刋于蜀王佖作續類又刋于徽是為二類凡五書靖德合而參校之削其復者一千一百五十餘條云云是靖德所見者博而所採者精也凌迪却萬姓統譜載靖德永嘉人為沙縣主簿攝縣事清謹善理繁劇博學能文嘗修沙陽志此書字晝不工紙簏墨黯乃元時坊刻之本檇李項氏藏本本朝黃虞稷亦經收藏按虞稷字俞邰晉江人康熙間以諸生預修明史食七品俸一時以為榮闕補卷三十二六十一二卷三十五二七十卷八十一三十二卷九十四十四十五卷一百十一卷一百二十八十朱子語類四函四册二十篇目同前前有宋王柏序此與前部同出一板橅印之時亦不相逺而此書多王柏序序作于宋咸淳乙丑稱靖德編校成書文公之遺語大備是柏序専為此書而作前部無之當屬闕佚第柏序紙色與全部深淺迥殊似非一時所印或由取資於别本耳道命録一函一册宋李心傳輯元程榮秀釐正分十卷前心傳序宋朱申序榮秀序考宋史李心傳字微之隆州井研人慶元二年薦于鄉既下第絶意不復應舉閉户著書晚因崔與之魏了翁等之薦為史館校勘賜進士出身纍官至工部侍郎以言去奉祠潮州淳祐三年致仕卒載所著成書甚多內有道命録五卷心傳自序係作于理宗嘉熙三年朱申之序乃淳祐十一年知江州時為之刻梓而作其書尚仍五卷之舊榮秀序稱道命録五卷刻梓在江州燬於兵榮秀嘗得而讀之疑為初稿尚欲刪定而未成者齋居之暇略加釐正彚次為十卷重刋於龜山書院而識其後云云書中第十卷末附宋理宗淳祐以後贈恤指揮二篇制詞三篇標為續增又元文宗天歷以後請加封狀并部議二篇贈恤制詞五篇標為新增乃榮秀所補録者當時刻手印工咸出上選紙潔墨瑩幾與宋槧無異誠元刻之佳本也榮秀序闕末數行以明萬厯間丁元薦刋本校之榮秀姓程新安人序作于至順四年結銜為奉直大夫江浙等處儒學提舉惜宋史無榮秀傳新安志亦未載其事迹不可考序末數行今依元薦本補録御題道命録十卷宋嘉熙間編次濂洛關閩五先生進退黜陟之所由而終以諡議贈恤制詔元時重刻于龜山書院則又續增作書後所有事實及元代追崇興册之文也其云道命者蓋言道之行與廢皆命云爾此書猶是元龜山書院初本乾隆甲子秋日御識鈐寶二曰乾隆宸翰曰幾暇臨池朱卧菴吳岫收藏諸叩無考類編標注文公先生經濟文衡一函六册宋馬括輯前集二十五卷後集二十五卷續集二十二卷共七十二卷前宋黃升序括自序馬括宋史無傳宋人諸書目亦不載是書其序作於淳祐辛亥按辛亥為宋理宗淳祐十一年書中蓋取朱子所著論者類而編之加以標注黃升序稱括字曰季機而未詳其爵里升宋史亦無傳著有中興詞選字曰叔㿩號曰玉林又號花菴胡德方為之序稱其早棄科舉吟咏自適秋房樓公以泉石清士目之馬括當時纂輯此書似未刻梓是本前集總目後有時泰定甲子春刋于梅溪書院木記按泰定甲子為元泰定帝御極之元年板式係仿宋巾箱本而未能如宋槧之工也類編標注文公先生經濟文衡一函六册篇目同前此書即前版橅印亦出一時周大訓印無考詳注東萊先生左氏博議一函四册宋吕祖謙著二十五卷前祖謙自序祖謙序以左氏博議為諸生課試而作故當時付刋仿巾箱本之式書中無刻梓年月亦不載作注人姓氏觀其紙黝墨黯乃元橅宋槧而不能工者也元趙孟俯藏本明陳繼儒徐渭亦經收藏孟俯見前考明史繼儒字仲醇號眉公松江華亭人為諸生與董其昌齊名年甫二十九取儒衣冠焚之隱居崑山之陽後築室東余山在門著述工詩善畫年八十二卒徐渭字文長號天池生山隂人為諸生有盛名嘗自言吾書第一詩次之文次之畫又次之胡子知言一函一册宋胡宏著一卷後録一卷前宋張栻序宋史胡宏字仁仲建寧崇安人安國次子初以蔭補右承務郎不調秦檜當國貽書其兄寅問二弟何不通書意欲用之宏書辭甚厲人問之宏曰正恐其召故示之以不可召之端檜死宏被召竟以疾辭著書曰知言張栻謂其言約義精道學之樞要制治之蓍龜也按張栻嘗從宏遊其序作于孝宗乾道四年極推崇之意朱子語録有曰因與諸子論湖湘學者崇尚胡子知言曰知言固有好處然亦大有差矣如論性往往與告子湍水之説生之謂性之意有相似處云云而吕祖謙謂知言勝似正蒙則又過於稱許矣此書兩卷後别行皆刻後學天台吳堅刋於福建漕治考宋史無堅傳浙江通志載堅仙居人登淳祐四年甲辰進士第歷官至端明殿學士此書係元時翻刻雖不能精而宋槧規矩猶存尚屬元版之佳者本朝商邱宋犖藏本有緯蕭草堂印按犖作西陂雜詠詩有緯蕭草堂一篇其子至曽取以名其集困學紀聞一函六册宋王應麟著二十卷前應麟自識元牟應龍袁桷序後陸晉之序考宋史王應麟字伯厚慶元府人九嵗通六經淳祐元年舉進士寶祐四年又中博學宏辭科歷官禮部侍郎尋轉尚書兼給事中左丞相以留夢炎用徐囊黃萬石等遂東歸後二十年卒所著書甚多困學紀聞其一也牟應龍序作于元英宗至治二年袁桷序作于泰定帝泰定二年元史列傳應龍字伯成其先蜀人後徙居吳興應龍幼警敏日記數千言擢咸淳進士第賈似道招之拒不見不得置上第調光州定城尉沿海制置司辟為屬以疾辭不仕而宋亡矣已而起家教授溧陽州晚以上元縣主簿致仕泰定元年卒年七十八袁桷字伯長慶元人以薦為翰林國史院檢閲官屢遷至侍講學士泰定初辭歸四年卒追封陳留郡公諡文清陸晉之吳郡人元史無傳其結銜為慶元路儒學教授序中有鳩工度費給以學儲本學官及岱山長共助以足其用云云按顧炎武日知録引陸深金臺紀聞曰元時州縣皆有學田所入謂之學租以供師生廩餼餘則刻書工大者合數處為之故讐校刻畫頗有精者今證以晉之所言適相吻合第此書橅印不佳耳闕補卷二三十七三十八卷十一十七卷十五十二困學紀聞一函册十一篇目同前前牟應龍序後陸晉之序俱不載此書板較大非陸晉之所校刋者故不載其序應龍序或本有而後失之刻手印工較前部皆髙一籌在元刻中尚為佳本闕補目録三卷二三十五卷三九十七二卷六十八三十一十二三卷七八卷十一六四九十六十卷十四十五卷十五十一十二卷十九二六五卷二十一四三北户録一函二册唐段公路纂龜圖注三卷前唐陸希聲序公路唐書無傳陸希聲序稱為鄒平公之孫考唐書段文昌于唐文宗時以御史大夫進封鄒平郡公則公路乃文昌之孫矣其書皆採嶺南民風土俗飲食衣製歌謡哀樂有異于中夏者録而志之至于草木果蔬蟲魚羽毛之類有瑰形詭狀者亦莫不畢載謂之北户録者蓋取淮南子云南方之極自北户之界至炎風之野赤帝祝融之所司也希聲吳人善屬文由右拾遺歷官至同中書門下平章事唐書有傳龜圖無考書中目録後别行刋臨安府太廟前尹家書籍鋪刋行則知是書先有宋槧此本規仿為之意欲偽充宋刋故猶存尹家之名耳元王元伯藏本本朝泰興季氏虞山錢氏亦經收藏錢曽見前考江南志元伯金壇人四世不異爨家人百餘口無間言日使諸女婦聚一室為女工畢斂貯一庫室無私藏兄宣伯卒以家事付兄子軌軌辭元伯曰若宗子也宗子宜主之相讓既久卒以付軌縉紳之家咸自謂不如至元間旌表其門宋沈括著二十六卷前括自序括序稱豫退處林下思平曰與客言者時紀一事於筆謂之筆談聖謨國政及事近宫省皆不敢私紀至於繫當日士大夫毁譽者雖善亦不欲書所録惟山間木蔭率意談噱不繫人之利害者下至閭巷之言靡所不有云云考宋史括字存中錢塘人擢進士第歷官至龍圗閣待制知審官院出知青州未行改延州以功加龍圖閣學士尋謫均州圑練副使元祐初徙秀州繼以光祿少卿分司居潤八年卒此書當屬居潤時所作故有退處林下之語其書曰故事曰辨證曰樂律曰象數曰人事曰官政曰權智曰藝文曰書畫曰技藝曰器用曰神奇曰異事曰謬誤曰譏謔曰雜志曰藥議共十有七門開雕者雖仿宋槧而橅印不工紙質亦未能堅緻其為元刻無疑明杜堇藏本考馮仙湜圖繪寶鑑續纂杜堇字懼男有柳居古狂青霞亨長之號丹徒人占籍京師舉進士不第遂絶意進取為文奇古兼善繪事安陽開國印記無考又有宋徽宗政和二字寶篆粗俗係書賈偽作不足載入詩苑叢珠一函三册元仇舜臣編曹彥文增輯三十卷前曹輗序輗序作于大德己亥按己亥為元成宗大德三年序後有至正甲辰菊節西園精舍新刋木記按至正甲辰為元順帝至正二十四年距輗作序之時已逾六十六載書分三十六門皆採摘成語取其二三字集成對偶并附詩聫以備初學撏托之用係餖飣之書故不顯于當世歷年既久書賈得之始為開雕宜其刋印草草也舜臣彥文輗俱無考元版集部分類補注李太白詩集一函五册唐李白著元楊齊賢集注蕭士贇補注二十五卷前載唐李陽氷宋樂史宋敏求曽鞏毛漸五序劉全白李君碣記陳振孫書録解題曰唐志有草堂集二十卷李陽氷所録也今按陽氷序文但言十喪其九而無卷數又樂史序文稱李翰林集十卷别收歌詩十卷校勘為二十卷又於館中得賦序書表贊頌等亦為十卷號為别集然則三十卷者樂史所定也家藏本不知何處本前二十卷為詩後十卷為雜著首載陽氷史及魏皓曽鞏四序李華劉全白范傅正裴敬碑志卷末又載新史本傳而姑孰十詠笑矣悲來草書三歌行亦附焉復著東坡辨證之語其本最為完善别有蜀刻大小二本卷數亦同而首卷専載碑序餘二十三卷歌詩而雜著止六卷有宋敏求後序言舊集歌詩七百七十六篇又得王溥及唐魏萬本同裒唐類詩諸編洎石刻所傳廣之無慮千篇以别集雜著附其後曽鞏蓋因宋本而次第之者也以校舊藏本篇數如其言然則蜀本即宋本也耶末又有元豐中毛漸題云以宋公編類之勤曽公考次之詳而晏公又能鏤版以傳於世乃晏知止刻于蘇州者然則蜀本蓋傳蘇本而蘇今不復有云云今觀此本首卷録賦八篇餘二十四卷皆載歌詩並無雜著與振孫所見諸本不惟卷數參差亦且所收反少雖載陽氷諸人之序而皆不仍其舊矣書中有建安余氏勤有堂刋篆書木記目録末葉板心記至大辛亥三月刋按辛亥為元武宗至大四年其時勤有堂之名尚存蓋建安俞氏子孫皆世守其業者也楊齊賢無考蕭士贇字粹可寧都人篤學工詩與吳澄友善所著有氷涯集見西江志陳惟中收藏印記無考闕補卷三三十三唐翰林李太白集一函八册唐李白著二十六卷前唐李陽氷序後宋樂史曽鞏毛漸三序目録後載薛仲雍編白年譜此書不載編纂人姓氏前二十四卷皆載歌詩賦則列于二十五卷其二十六卷専載讃十七篇較前部故多一卷然橅印遜于前部其中錯誤亦多如作序之毛漸並訛為毛述似是坊間自為刋行之本也明安國錢榖黃姬水俱經收藏安國見前按蘇州志錢榖字叔寶吳人少孤貧失學逮壯始知讀書家無典籍遊文待詔門下日取架上書讀之以其餘功點染水墨得沈氏之法黃姬水字淳父長洲人五嶽山人省曽之子生而英敏山人出入必攜之俱命學書千祝京兆遂傳其筆法餘印無考集千家注分類杜工部詩一函十册唐杜甫著宋徐居仁編次黃鶴補注二十五卷前載傳序碑銘一卷注杜詩姓氏一卷年譜一卷陳振孫書録解題曰門類杜詩二十五卷稱東萊徐居仁編次未詳何人云云是門類係居仁所編而集千家注之名則自黃鶴為之書分七十二門所列注詩姓氏始韓愈元稹終以文天祥謝枋得劉會孟共一百五十六家其曰集千家者蓋夸大之詞耳黃鶴字叔似臨川人所著有北窗寓言見西江志書中門類目録後有皇慶壬子鐘式木記勤有堂爐式木記傳序碑銘後有建安余氏勤有堂刋篆書木記詩題目録及卷二十五後皆别行刋皇慶壬子余志安刋于勤有堂按皇慶壬子為元仁宗皇慶元年前余氏所刋李太白集係至大辛亥與此刻僅隔一年蓋欲以李杜詩集並行于時故刻手印工亦復相等也闕補卷二十六卷五十一卷七十七之二十二卷十五三十二十二三卷十九十四七十五二十集千家注分類杜工部詩一函册二十篇目同前後附文集二卷此書即前版惟將傳序碑銘後建安余氏篆書木記鑱去别刋廣勤書堂新刋木記門類目録後鐘式爐式二木記尚存而以皇慶壬子易刋三本書舍勤有堂易刋廣勤堂其詩題目録後别行所刋之皇慶壬子余安安刋于勤有堂十二字雖亦鑱去而卷二十五後所刋者當時竟未檢及失于削補所增附之文集二卷橅印草草較之前二十五卷亦不相類此拙工所為雖欲作偽亦安能自掩耶本朝泰興季氏藏本餘印無考集千家注分類杜工部詩一函六册篇目同前闕傳序碑銘一卷年譜一卷文集二卷此本與前第二部為一時橅印之書其卷二十五後雖亦無皇慶壬子余志安刋于勤有堂一行乃用别紙粘接非由版中鑱去係後之鬻書者知其作偽未周又從而彌縫之耳闕補詩題目録十八卷七十七集千家注分類杜工部詩二函六册二十篇目同前此書乃以前版重加翻刻故將建安余氏前後所列之名盡為削去其廣勤書堂新刋木記亦復不存惟以鐘式木記中三峯書舍四字易刋汪諒重刋而爐式木記中之廣勤堂則仍其舊汪諒無考觀其去廣勤書堂新刋木記則是堂亦非汪諒所有矣書中注字本小一經翻刻筆畫未免較肥然紙質印工實出前二部之上闕補卷十一全卷十五全韋蘇州集一函五册唐韋應物著十卷前宋王欽臣序元沈明逺補撰傳馬端臨文獻通考載韋蘇州集十卷未及作序之人考宋史王欽臣字仲至應天宋城人洙之子用蔭入官文彥博薦試學士院賜進士及第歷集賢殿修撰知和州徙饒州斥提舉太平觀徽宗立復待制知成德軍卒欽臣性嗜古藏書數萬卷手自讐正世稱善本沈明逺元人史無傳考顧瑛玉山名勝集載明逺吳興人精𨽻法玉山草堂春暉樓緑波亭諸額皆其所書又稱其與顧德輝同時按德輝之子元臣於太祖至元之季為水軍副都萬户則明逺為元初人無疑此書當屬欽臣所訂而明逺重刻于元初者故橅印精好與宋槧猶不相逺御題韋應物五言詩高逺間淡世所罕及年至九十餘益造微妙浮屠皎然工詩嘗擬其體應物語之曰人各有能有不能子欲為我且失其故步至今傳為知言白居易繼守蘇州詩云敢有文章替左司其見推重如此惜其文史逸不傳所傳者特詩集耳是集編次雕鋟雅稱善本豫愛讀其詩因書數語于卷首乾隆甲子九秋三日鈐寶二曰乾隆宸翰曰幾暇臨池或謂公詩不琢句不用事不鍊詞不知公之所以為唐大家者或謂此也晴窗點檢遂為三歎辰翁志沈明逺補傳後右識語一作小行書用筆高古考西江志辰翁姓劉名會孟廬陵人補太學生壬戌廷試忤賈似道意而理宗嘉之置丙第以親老請濂溪書院山長江萬里陳宜中薦居史館又除太學博士皆固辭宋亡托方外以歸著須溪集百卷書中有漱石枕流印當為辰翁托方外時所寄意者以此證之是書為元初刋本益信增廣注釋音辨唐栁先生集一函八册唐栁宗元著童宗説音注宋張敦頥音辨潘緯增廣音義正集四十三卷别集二卷外集二卷附録一卷共四十八卷前唐劉禹錫原序宋陸之淵序並編集姓氏陸之淵序作於宋孝宗乾道三年稱豫至灊山郡齋雲間潘廣文攜音訓數帙示豫比於祝充之注昌黎集云云潘緯宋史無傳考凌迪知萬姓統譜載緯字仲寶華亭人紹興中舉進士甲科恬于進取工著述陸之淵無考是書亦係翻刻宋本字畫猶存其概而紙質墨香則不相侔矣明晉莊王鍾鉉藏本鍾鉉見前增廣注釋音辨唐栁先生集一函五册篇目同前闕編集姓氏前書于正集外雖分别集外集附録而目録則同列于正集之首此本以末五卷目録移置别集之首版式雖仿前書而實别為刋梓橅印之工又出其下也明毗陵周氏藏本良金印已見前吳蒙印記無考增廣注釋音辨唐栁先生集一函册十二篇目同前闕别集外集附録目録此本較第二部又遜一籌合觀三書皆非一板何開雕者如是之多而顧草草以從事耶鄭翼明收藏印記無考陸宣公集一函五册唐陸贄著十卷陳振孫書録解題曰陸宣公集二十二卷權德輿為之序稱制誥集十三卷奏草七卷中書奏議七卷今所存者翰苑集十卷榜子集十二卷序文稱别集文賦表狀十五卷今不傳據此則陸贄集乃四十二卷至宋已闕二十卷矣振孫所謂翰苑集即制誥集其榜子集係合奏草奏議為二書馬端臨文獻通考専載奏議十二卷蓋因制誥奏議集名既分原可各自單行不必合二十二卷始為全本此書所載皆制誥之文分以十卷即單行之翰苑集也字明紙瑩洵屬元刋善本歐陽文忠公文集五函五册四十宋歐陽修著居士集五十卷外集二十五卷易童子問三卷外制集三卷內制集八卷表奏書啓四六集七卷奏議集十八卷雜著述十九卷集古録跋尾十卷書簡十卷共一百五十三卷總目後有宋胡柯撰年譜一卷并記書後有附録五卷及編校姓氏宋周必大序胡柯記周必大序皆作于宋寧宗慶元二年必大序稱郡人孫謙益丁朝佐曽三異互加編校起紹熙辛亥之春迄慶元丙辰之夏始成是書云云按陳振孫書録解題曰歐公為一代文宗其集遍行海內而無善本周益公解相印歸用諸本編校定為此本且為之年譜曰居士集外集而下至于書簡凡十名刋之家孰其子綸又以所得歐陽氏傳家本乃公之子棐所編次者屬益公舊客曽三異校正益完善無遺恨矣今以必大序考之三異本預校讐之列書中並無必大子綸重加編次之語且年譜係出胡柯之手而非必大所作豈振孫所見又為别本耶此書字法規仿鷗波深得其妙定屬元時所重刋者觀其橅印之精非好古家不能為此書前應有序文似是書賈欲充宋槧遂妄為割去而不知反掩其善也曽三異宋史無傳凌迪知萬姓統譜載三異字無疑臨江新淦人少有詩名尤尊經學屢從朱子問辨因顔讀書之堂曰仰高部使薦于朝授承務郎端平初以袐閣校勘召力辭年八十一卒孫謙益字彥撝丁朝佐字懷忠胡柯字伯信俱吉州人其事迹無考𢎞治十五年十月二日收入淮東書院一部一百五十三卷附録五卷四十五册留都人獻第四十五册末右識語一作蠅頭楷書而筆法不工乃書院中掌書籍者所識以取便於稽核耳淮東書院無考按明史地理志載淮安揚州二府元時𨽻淮東道宣慰司則書院當在此二府間也明李廷相周良金俱經收藏印記見前東坡集二函册十二宋蘇軾著前集四十卷後集二十卷奏議十五卷內制集十卷外制集三卷和陶詩四卷應詔集十卷共一百二卷無校刋姓氏此書前後俱無序跋密行細書橅印工緻係仿宋巾箱本式欲以之亂真者當屬元初人所為始克有此形似惜紙質鬆脆不能相強耳元邵桂子藏本明邵享真文徵明亦經收藏翠竹齋玉蘭堂諸印見前按鮑楹雪舟詩序青溪邵桂子字德芳太學上舍登咸淳進士任處州府教授宋亡避地雲間贅曹氏居泖湖之蒸溪嘗瀕湖構亭名雪舟著述其間有脞稿十卷脞談二十卷皆以雪舟名之預為生壙號曰元宅著元宅七銘後七銘續七銘别七銘凡二十八事摹周易作忍默恕退四卦又松江志載邵桂子之孫亨貞字復儒博通經史贍千文辭凡隂陽醫卜佛老之學莫不究其奧洪武間為府學訓導尋戍潁州後歸卒年九十三著有蛾術集增刋校正王狀元集注分類東坡先生詩三函册三十宋蘇軾著王十朋集注劉會孟批點二十五卷前十朋序趙夔序并注詩姓氏傅濚撰東坡紀年録一卷毗陵邵長蘅作王注正訛稱王十朋分類蘇詩注三十二卷注中引用故事謬誤實多有極淺陋可為失笑者十朋為南渡名臣著梅溪集行世史稱其天資頴悟廷對萬餘言淹通經史其所注蘇詩何至紕繆乃爾又作注蘇例言稱永嘉王氏注本孤行其失大要有三一曰分門别類失之陋西蜀趙夔舊序自言此書分五十門金華吕氏省為三十二門而王氏因之玩其標目了無意義且就分門之中亦必顛倒次第云云是王氏所分之三十二門已不免後人訾議今觀此書僅二十五卷並非王氏三十二卷之舊而所分門類多至七十有六數且不止于倍之其間篇章之割裂名目之犯復殆有甚焉而乃於標題下署十朋之名抑何妄耶注詩姓氏後有汪氏誠意齋集書堂新刋本記假名妄作必是此人特以其書規仿宋槧橅印清朗尚屬元刻之善者故存之元何九思藏本明項元汴本朝季振宜俱經收藏印記俱見前餘印皆無可考欒城集二函册三十宋蘇轍著前集五十卷後集二十四卷三集十卷應詔集十二卷共成九十六卷無校刋人姓氏是書卷目次第與馬端臨文獻通考所載悉合其版式之工紙墨之善亦與前東坡集相等蓋當時本以二蘇文集合刋橅印係出一手也書中有文徵明梅溪精舍玉蘭堂二印前東坡集中亦有之而元邵氏收藏印記則為此本所無此本之任氏王氏季氏諸印又不見於東坡集中則知此二書惟歸文氏時曽經合璧其前乎此後乎此者皆各自流傳今離而復合同為册府之珍亦是刻之幸矣王氏季氏諸印見前其雲間任氏子先一印按任氏為雲間望族松江志載元末有任暉者字東白其父名子文則子先或即子文之伯仲行也欒城集七函册四十宋蘇轍著前集五十卷後集二十四卷三集十卷共八十四卷前集轍曽孫詡序後集宋鄧光跋按前宋版欒城集後載鄧光并轍曽孫詡四世孫森三跋詡森跋皆其自書用筆猶秉家法此本森跋已失詡跋並非自書且移置簡端以為書序是刋刻者未覩宋槧本又安能橅印精良耶闕補前集卷六三十三卷四十八十三後集卷十六六十七三集卷一二十伊川擊壤集二函十册宋邵雍撰二十卷前雍自序鼂公武郡齋讀書志載邵堯夫擊壤集二十卷稱堯夫隱居洛陽熙寧中與常秩同召力辭不起邃於易數始為學至二十年不施枕而睡其精如此歌詩蓋其餘事亦頗切理盛行于時自為之序云云是宋時擊壤集雍所自刋此本亦仿宋槧之式而標為伊川者蓋據宋史雍葬親伊水上遂為河南人也黃太史精華録一函二册宋黃庭堅著任淵選八卷前淵序後朱承爵跋陳振孫書録解題載黃山谷詩二十卷新津任淵注稱其不獨注事而兼注意惜宋史無任淵傳始末不可考淵既嘗注庭堅詩則是書所録擇焉必精朱承爵跋不記年月觀其跋稱任子淵精華録選豫嘗得其目録蓋宋元祐間刻板而亡其文愚輯其辭而完刻之云云是承爵必非宋人以板式紙質定之當屬元時刋本無疑陳氏收藏諸印無考屛山集二函册十二宋劉子翬著二十卷前宋胡憲序朱子撰遺帖跋墓表後朱子屛山集跋考宋史劉子翬字彥沖建州崇安人贈大師韐之仲子以父任授承務郎辟真定府幕屬韐死靖康之難子翬痛憤幾無以為生服除通判興化軍賊不敢犯旋以羸疾辭歸武夷山不出者凡十七年與胡憲劉勉之友善而期以任重致逺者惟新安朱子而已年四十七卒學者稱屛山先生胡憲字原仲亦崇安人紹興中以鄉貢入太學會伊洛學有禁歸故山力田賣藥以奉其親賢士大夫髙仰之以其行義聞于朝上屢召之憲辭母老乃賜進士出身授左迪功郎添差建州教授後除祕書正字以病請歸紹興三十二年卒年七十七書中憲序作于紹興三十年稱彥沖殁後越十有三年其嗣子玶始編次其遺文得二十卷朱子後跋乃作于乾道九年距子翬作序時又越十有三載稱先生啓手足時玶年甚幼以故平生遺文多所散逸後十餘年始復訪求以補家書之闕然皆傳寫失真同異參錯於是反復讐訂又十餘年始克成書云云是胡憲作序在訪求散逸之後而朱子作跋係讐訂已成之時也至朱子所撰遺帖跋在慶元五年距作集跋時又踰二十六載跋中皆珍惜遺墨之意與是書無關乃刋行者借以取重耳玶宋史無傳凌迪知萬姓統譜載玶字平父仕為從仕郎自號七省翁每與諸名賢唱和有詩集行世雲停印無考象山先生集三函册十八宋陸九淵著正集二十八卷外集五卷共三十三卷前宋楊簡袁燮吳杰三序馬端臨文獻通考載象山文集二十八卷外集四卷并録袁燮序文今觀此書外集係五卷其第五卷乃録孔煒丁端祖所撰諡議二篇然則九淵外集仍止四卷也文獻通考不載楊簡吳杰二序按簡序作於寧宗開禧元年燮序作於寧宗嘉定五年相去已越八年之久吳杰序作於嘉定十三年後燮序又經八載燮序稱為刋於倉司而杰序則云聞建安狀元陳公子孫喜與人同其善敬送上件文集請用刋行仍以二賢諡議次於其後云云是端臨所見者係袁燮刋行之本此本為陳氏所刋諡議亦吳杰補録非復袁本之舊矣外集卷五後有辛巳嵗孟冬月安正書堂重刋木記按嘉定十三年嵗在庚辰則木記所紀辛巳當為嘉定十四年但此書墨暗紙黝決非宋本當屬元時翻刻之書考宋史九淵字子靜撫州金溪人登乾道八年進士第歷官知荆門軍卒諡文安嘗與朱子論辨所學多不合門人楊簡袁燮輩皆傳其學焉楊簡字敬仲慈溪人乾道五年登進士第授富陽主簿會九淵道過遂執弟子之禮歷官至寶謨閣直學士轉朝議大夫慈溪縣男繼以寶謨閣學士大中大夫致仕卒袁燮字和叔鄞縣人入太學登進士第調江隂尉官至寶文閣待制進直學士奉祀以卒初入太學陸九齡為學録以道義相磨切厥後見九齡之弟九淵遂師事焉學者稱之曰潔齋先生吳杰江西南城人事迹無考元趙孟俯藏本明陶宗儀本朝黃虞稷俱經收藏孟俯虞稷見前考明史宗儀字九成黃巖人少試有司一不中即棄去洪武六年命有司舉人才皆及宗儀引疾不赴晚嵗有司聘為教官非其志也所著輟耕録三十卷又葺説郛書史會要四書備遺並行於世金臺集一函二册元乃賢著危素編二卷前歐陽玄李好文黃溍三序後虞集張起巖詩泰不華今改正曰台哈布哈識語貢師泰揭傒斯危素程文揚彞五序危素序稱易之金臺前稿余既序之矣及再至京師又得後稿一卷云云今書有二卷當是前後稿並刋而無危素前序蓋偶佚之書中諸賢序詩識語皆至正間所作當時心折易之匪特文章各盡所長書法亦兼其妙真行篆𨽻無體不具則無體不精而摹刻者又能得其精神不失銖黍選紙選墨印而傳之豈獨為元刻之冠即置之宋槧佳本中又何多讓焉乃賢元史無傳按浙江通志乃賢字易之先世居金山之西元興西北諸部仕中朝者多散處內地故易之稱南陽人隨其兄宦遊江浙卜居于鄞再至京師以能文名尤長歌詩久之歸浙東辟為東湖書院山長以薦授翰林編修官尋卒元史歐陽玄字原功瀏陽人延裕二年賜進士出身由平江州同知官至翰林學士承旨進階光祿大夫年八十五卒追封楚國公諡曰文李好文字惟中東明人登至治元年進士第由大名路濬州判官入為翰林國史院編修歷官至翰林學士承旨階榮祿大夫尋屢引年乞致仕遂拜光祿大夫河南行省平章政事仍以翰林學士承旨一品祿終其身黃溍字晉卿義烏人中延祐二年進士第由台州寧海丞歷官侍講學士同知經筵事年八十一卒追封江夏郡公諡曰文獻虞集字伯生蜀人僑居臨川以薦授大都路儒學教授歷官奎章閣侍書學士年七十七卒贈江西行中書省參知政事護軍封仁夀郡公張起巖字夢臣濟南人年弱冠以察舉為福山縣學教諭中延祐乙卯進士首選除同知登州事特旨改集賢修撰屢遷至翰林承旨進階榮祿大夫泰不華字兼善家於台年十七江浙鄉試第一明年進士及第授集賢修撰纍官至浙東道宣慰使死于方國珍之難追封魏國公諡忠介貢師泰字泰甫宣城人肄業國子學為諸生泰定四年釋褐出身授從仕郎由太和州判官屢遷至户部尚書俾分部閩中未幾召為祕書卿行至杭之海寧得疾而卒揭傒斯字曼碩龍興富州人以薦授翰林國史院編修官遷侍講學士同知經筵事進階中奉大夫卒追封豫章郡公諡曰文安明史危素字太朴金溪人至正元年用大臣薦授經筵檢討歷官參知政事除翰林學士承旨出為嶺北行省左丞言事不報棄官居房山尋起為承旨甫至燕都明師已入素投報恩寺井中僧大梓挽之出洪武間官𢎞文館學士後謫居和州守余闕廟嵗餘卒程文揚彛俱無傳揚彛未詳其人新安志載程文字以間婺源人以薦入直翰林纍拜南臺御史擢禮部員外郎卒收藏諸印無考文選六函一册六十梁昭明太子蕭統撰唐李善注六十卷前蕭統序李善上文選注表唐吕延祚進五臣集注文選表書中每卷標題下於李善注次行刋奉政大夫同知池州路總管府事張伯顔助率重刋張伯顔無考其橅刻此書頗得宋槧模範第書中祗收李善一人之注而又録吕延祚進五臣注表未免自淆其例矣兩漢文鑑二函册二十宋陳鑑編西漢文二十一卷東漢文十九卷共四十卷前鑑自序陳鑑宋史無傳自署為建安人其始末亦無考序作于端平甲午按甲午為宋理宗端平元年稱余作兩漢史節積十餘年而功始竟至若名公巨卿忠言嘉謨何敢一字妄加節略是以别為一編云云考馬端臨文獻通考載陶氏西漢文類二十卷竇氏東漢文類三十卷初未言及此書其史部中亦不録陳鑑史節豈鑑本非知名之士著述不顯于時抑其書未經付刋逮元而始有是刻耶收藏二印無考闕補西漢文卷六十八卷十六七之十東漢文卷十三十八三國志文類二函册二十六十卷無編纂姓氏馬端臨文獻通考載三國文類四十卷引陳振孫語曰不知何人集考宋史藝文志亦稱是書不知集者名氏然所載係六十卷與通考異今觀此本卷數適與藝文志符合則端臨所稱四十卷者尚非全書得此元刋亦足證宋本之誤矣明著莊王鍾鉉藏本印記見前餘無考續文章正宗一函十册宋真德秀撰二十卷後宋倪澄梁椅鄭圭三序前宋版續文章正宗祗載倪澄鄭圭二序不録梁椅序文蓋閲嵗久而佚其一篇也此本出自元刋橅印雖所不及然三序得全亦參考之一助按兩浙名賢録梁椅字子奇麗水人登嘉熙進士第除太常寺丞權禮部郎官晚年慕程朱之學編輯遺論名曰論語翼明徐達藏本有魏國公印嚴嵩亦經收藏有鈐山堂印考明史徐達字天德濠人年二十二從太祖軍所向克捷謀略甲諸將初以平吳功封信國公洪武三年進封魏國公十八年卒年五十四追封中山王諡武寧嚴嵩字惟中分宜人舉𢎞治十八年進士改庶吉士授編修移疾歸讀書鈐山十年還朝進侍講纍官至華蓋殿大學士太子太師竊政二十年天下咸目為姦臣年八十五黜為民寄食墓舍以卒今觀書中本有禮部官書朱文長印俱為嵩鈐山堂諸印所掩考明禮部尚書鄭賜奉詔訪賜遺書係永樂四年之事徐達以洪武十八年先卒則知此書乃先為達所藏而後入于禮部者至嵩以私印鈐蓋官印之上明是嵩入直文淵閣仍掌禮部事時攘取官書以為已有小人貪邪無所不至即一書可見矣劉文耀印無考類編層瀾文選一函四册前集十卷後集十卷續集十卷别集十卷共四十卷無編集姓氏此書前後俱無序跋前集目録前有未記識語稱將舊集所選古文重加增録分為前後續别四集前集類編賦詩雜語雜著以便初學者誦習後續别三集類編記傳等作以便作文者披閲云云其書始自楚騷終于北宋每卷標題下别行刋雲坡家孰鼎新刋行係當時帖括之書書賈刻以謀利者故仿宋巾箱本式取易售耳蕭德源收藏印無考闕補前集目録五六後集卷八五六新編古賦題二函八册前集十卷後集八卷共十八卷不載編集人名氏此與前部同類之書也亦仿巾箱本式標題下别行刋翠巖劉氏家孰新編兩集目録後均有木記識語紀年為天厯己巳庚午係元文宗初年刋行之本其書于經史子集中類纂賦題各疏本末于下蓋為應試者揣摩之用前集仍有未備爰纂後集以補之明毗陵周氏藏本印記見前尚古堂印無考闕補後集卷三一二新編事文類聚翰墨全書十函册八十元劉應季編甲集十三卷乙集九卷丙集五卷丁集五卷戊集五卷已集七卷庚集二十四卷辛集十卷壬集十二卷癸集十一卷後甲集八卷後乙集三卷後丙集六卷後丁集八卷後戊集九卷共一百三十四卷前元熊禾序並全書總目及諸道圖考宋建安祝穆撰事文類聚一書先以羣書要語次以古今事實次以古今文集分綱列目採托頗詳此本雖襲其名而所分門類二十有五皆取便于書問之往來文翰之酬應世俗鄙俚之言無所不載非復祝穆所輯之舊矣劉應李熊禾元史俱無傳凌迪知萬姓統譜載應李字希泌建陽人初名棨登咸淳甲戌進士調建陽主簿入元不仕退與熊禾胡廷芳講道于淇源山後建化龍書院于莒澤聚徒講授學者雲集顧嗣立元詩選載熊鉌字位辛初名禾字去非居建陽之鼇峯志求濂洛之學訪朱子門人輔氏而從遊焉宋度宗咸淳十年登進士第授寧武州司户參軍宋亡遂隱不仕創雲谷書院四方來學者翕然歸之闕補後乙集目録一欽定天祿琳琅書目卷六

body:
  text: 宋版經部周易一函五冊上下經六卷魏王弼注繫辭以下三卷晉韓康伯注周易略例一卷王弼著唐邢璹注俱唐陸徳明音義共十卷是書不載刋刻年月而字法圎活刻手精整且於宋光宗以前諱皆缺筆又毎卷末詳記經注音義字數宋版多此式其為南宋刋本無疑琴川毛晉蔵書類以甲乙為次是書於宋本印記之下復加甲字印乃宋槧之􅆟佳者晉元名鳯苞字子晉蘇州常熟人好古博覽搆汲古閣蔵書數萬卷刻十三經十七史古今百家之書手自校讐僮僕皆能抄書著述甚富見蘇州府志闕補卷三一二卷九全卷十全監本纂圗重言重意互註㸃校毛詩二函十冊首毛詩圗譜正文全録漢毛萇傳鄭康成箋附唐陸徳眀音義復加重言重意互註三例共二十卷朱􅂜尊經義考載纂圗互註毛詩二十卷引陸元輔語曰此書不知何人編輯鋟刻甚精首之以毛詩舉要圗二十五次之以毛詩篇目其卷一至終則全録大小序毛傳鄭箋陸氏釋文而采左傳三禮有及於詩者為互註又標詩句之同者為重言詩意之同者為重意蓋唐宋人帖括之書也此本證以所言雖無圖目而體例適符惟書中於篇目相同者為重篇詩句相似者為似句乃元輔所未及蓋因書名未經標出遂不加詳考耳至其字畫流羙紙墨亦佳信為鋟本之精者本朝御史季振宜蔵書仿毛晉汲古閣例有宋本橢圎印以誌善本尚書徐乾學𫝊是樓收蔵書籍甚富此書兩家印記俱備蓋厯經鑒蔵家珍秘也振宜字詵兮號滄葦揚州泰興人順治丁亥進士授蘭溪令歴刑户兩曹擢御史乾學字原一號健菴蘇州崑山人康熙庚戌進士第三授編􅁱官至刑部尚書所著有憺園文集東萊家塾讀詩記二函冊十六宋吕祖謙著三十二卷第一卷為綱領卷二以下釋大小𫝊經文博引諸家注成之朱子序巾箱本不載鋟刻年月按陳振孫書録解題云自公劉以後編纂已備條例未竟學者惜之是本公劉首章下識云先兄􅁱是書至此終自公劉次章訖終篇則往歲所纂輯未及刋定今不敢損益姑從其舊則此書乃其弟所校刋也御題此吕氏家塾本也說詩家自毛鄭後同異紛紜鮮所折衷東萊兼綜衆說挈要提綱斷以已意於三百篇之義殆庶㡬乎向為檇李項氏家蔵卷約字工猶屬閩中舊刻其珍惜之乾隆御識鈐寳二曰㡬暇怡情曰乾隆宸翰檇李項元汴蔵本有印記元汴字子京好收金石遺文圗繪名蹟凡斷幀隻行悉輸其門書法出入智永趙吳興之間兼工山水號墨林居士見董其昌容臺集闕補卷四十九之二十二卷二十五五卷二十七十一卷三十二末行周禮二函冊十二漢鄭康成注唐陸徳明音義十二卷宋岳珂相臺書塾刋正九經三𫝊沿革例云世𫝊九經自建蜀京杭而下有建余氏本分句讀稱為善本云云此書毎卷後或載余仁仲比校或余氏刋於萬卷堂或余仁仲刋於家塾所謂建余氏也句讀處亦與所言相合又卷末各詳記經注音義字數㸃畫完好紙色極佳張氏古照堂所蔵名無考纂圗互註周禮二函冊十二前周禮經圗三十有九各系以說次篇目正文全録鄭注及唐陸徳明音義復加重言重意互註三例共十二卷按宋陳祥道有周禮纂圗其書已佚此書纂圗不載撰人姓氏而圗說多引祥道禮書之言或本之祥道書故仍其名音義後標重言重意互註與前監本毛詩同當亦唐宋人帖括之書但標名無重言重意四字經文不施句讀版尺寸亦較縮耳又經義考載周禮附音重言重意互注十二巻引繆泳謂元人所輯並無指實且與纂圗互注毛詩出唐宋人之說自相矛盾此本的係宋槧非明尹洪兩廣重刻本也諸卷前後原有印記不知何時割去迹尚可辨闕補經圖一之八卷十二十八春秋經傳集解四函二冊三十晉杜預集解三十卷前自序末附五代馮繼先春秋名號歸一圗二卷無名氏春秋年表諸卷末有木記曰相臺岳氏刻梓家塾或曰相臺岳氏刻梓荆谿家塾為長方橢圎亞字諸式具大小篆隸文蓋南宋岳珂乃飛孫本相州湯隂人故以相臺表望南渡後徙常州今宜興有珂父霖墓故家塾以荆溪名珂校刋九經三𫝊著沿革例讐勘􅆟為精覈其辨析此書之言曰春秋名號歸一圗二卷馮繼先撰刋本多訛錯嘗合京杭建蜀本㕘校有氏名略同實非一人而合為一者有名字若殊本非二人而析為二者有自某國適他國而前後互見者有稱某公與某年而經傳不合者或以傳為經或以注為傳或偏旁疑似而有亥豕之差或行數牽連而無甲乙之别若此類非一今皆訂之經傳勘其譌謬且為分行以見别書若雜出於經傳與注而止稱經或傳注散見於前後數年間而止稱某公某年蓋據始見而書之廖本無年表歸一圗今既刋公穀併補二書以附經傳之後又曰春秋年表三朝藝文志不載作者名今諸本或闕號名或紊年月㕘之經傳多有舛錯不無刋寫之誤皆以經傳正之史記年表書事今表止書繼立循舊不敢増又曰按館閣書目元豐中楊彦齡撰二卷紹興中環中撰一卷今本一卷與紹興中本及藝文志所載者同珂之考證如此今詳閱卷中凡所臚謬誤之處俱經改正無訛然則此本之善具徵學密匪獨工良也曽入明項篤夀萬卷堂後歸季振宜家其紫玉𤣥居寳刻不知誰氏之章諸印於各卷中間互錯出蓋諸家􅏻潢分冊參差不齊又或祗得其半今裒然全帙洵足寳也篤夀字子長秀水人嘉靖壬戌進士入詞林性好蔵書見秘冊輒令小胥𫝊抄儲之舍北萬卷樓見浙江志春秋經傳集解二函冊十五晉杜預集解三十卷自序相臺書塾刋正九經三傳沿革例云世所傳九經有建余氏興國于氏二本皆稱其善而廖氏以余氏不免誤舛于氏未為的當合諸本參訂為􅆟精板行之初天下寳之又云廖本春秋無年表歸一圗此書毎卷末有木記曰世綵廖氏刻梓家塾為長方橢圎亞字諸式具篆文八分而不載年表歸一圗蓋岳珂所稱者即為此本考中興藝文志載世綵堂集三卷稱政和中廖剛曽祖母與祖母享年􅆟髙皆及見五世孫剛作堂名世綵以奉之士大夫為作詩又趙均石蹟記廖瑩中刻世綵堂帖瑩中名玉號羣玉為賈似道客周密癸辛雜識載賈廖刋書一條云廖羣玉諸書九經本􅆟佳凡以數十種比校百餘人校正而後成以撫州萆抄紙油烟墨印造其􅏻褫至以泥金為籖則其貴重可知矣婁東王世懋蔵本世懋字敬羙世貞之弟明太常卿又卷中多有徑山居頂菴紅記按徑山為天目東北峰山門事狀云徑山之頂乃天目龍之别居國一大師法欽𨼆此山頂山志雖不載居頂菴而釋徳清凌霄峰記云圎照禪師居峰頂十年古鼎禪師亦居十年梵懐慧公結菴於頂居十三年盖徑山以峰頂為祖庭主僧講席在焉或旁通儒書曽蔵此本此諸僧者未知其何屬也闕補卷十三卷十四卷十七之卷二十二計四冊鋟刻亦精但字畫較瘦卷末無世綵廖氏印書中亦無徑山紅記乃用别本補入監本纂圖春秋經傳集解四函八冊二十宋蘇軾春秋列國圗經傳全録晉杜預集解附唐陸徳明音義復加重言重意似句互註諸例共三十卷前後預自序是書與監本纂圗重言重意互註㸃校毛詩體例相同字形槧式亦俱脗合意唐宋人帖括之書羣經皆備合之纂圗互註周禮知為當時所並行吳江縣志載張基字徳載於書無所不窺尤邃於經術著述甚富崇禎時贈翰林院待詔此即其蔵本其謹止齋潯陽山人青芝山房三印無考春秋左氏音義二函八冊唐陸徳明著五卷後附宋聞人模經傳識異按此即徳明經典釋文之一左氏釋文原六卷今合卷五六為一宋嘉定時興國學刋本興國軍隸江南西路亦江西諸郡書版也卷末結銜五人為知軍通判教授判官又有教授聞人模跋載本學補刋春秋更新五經之由蓋當時刻春秋而附以陸氏音義今獨存音義耳按徳明釋文本分五經三傳并及孝經論語爾雅莊老各自成編無嫌單行也琴川毛氏崑山徐氏兩家蔵本有印記監本附音春秋公羊註疏二函冊十六漢何休解詁唐徐彦疏附唐陸徳明音義共二十八卷休自序宋景徳二年六月中書門下牒文奉勅校讐刋印頒行具載編首牒後結銜工部侍郎參知政事馮兵部侍郎參知政事王兵部侍郎平章事宼吏部侍郎平章事畢考宋史宰輔表景徳元年八月畢士安自吏部侍郎參知政事加同中書門下平章事宼準自兵部侍郎加同中書門下平章事二年四月馮拯自工部侍郎除參知政事皆與牒合而二年參知政事有王欽若王旦二人通鑑綱目載欽若以四月罷牒在六月知非欽若也歐陽修文正王公神道碑銘咸平四年以工部侍郎參知政事再遷刑部侍郎景徳二年始遷尚書左丞牒文為兵部侍郎微有不合但下牒時旦方參政其遷尚書左丞或在牒後况時閱五年其中遷轉靡常碑文失載未可知也書首有尚友方記不知誰氏而卷中丹筆竄注之處校勘頗為詳密春秋公羊經傳解詁二函十冊漢何休學十二卷休自序鐫刻年月不載而字體甚古於宋孝宗以上諱皆闕筆知為南渡後刋書中毎間數紙輒有真書木印曰鄂州州學官書曰鄂泮官書帶去準盜考王應麟玉海咸平四年六月詔郡縣有學校聚徒講誦之所賜九經書一部大觀二年六月州學蔵書閣賜名稽古則州郡諸學置官書自宋初已行之李心𫝊朝野雜記載王瞻叔為學官常請摹印諸經疏及經典釋文許郡縣以贍學或省係錢各市一本置之於學是南渡後猶重此舉且有準盜之條官守亦綦嚴矣闕補卷十二末監本附音春秋榖梁注疏二函十冊晉范寗集解唐楊士勛疏附唐陸徳明音義共二十卷士勛序朝野雜記云監本書籍紹興末年所刋是書於欽宗以上諱皆闕筆而皇瑗瑗字乃孝宗諱全書不闕蓋紹興監本也又云胄監刋六經無禮記今猶存毛詩春秋左氏公羊榖梁傳而無禮記亦可證矣朱謀㙔藩獻記晉莊王鍾鉉憲王之子髙皇帝曽孫也正統七年以榆社王進封王好博古喜法書嘗以絳帖歲乆斷脫令世子竒源采舊所蔵古今名人墨跡摹刻以𫝊號寳賢堂集古法帖今世傳名書畫多晉府章即其人也餘諸印無可考或仿漢銅章皆隨手鈐用無闗鑒蔵也監本附音春秋榖梁注疏二函冊十二篇目同前勘對此書與前景徳二年中書牒刻公羊注疏板匡字體俱合板心上注毎紙大小字數中標名公疏榖疏字亦從俗省筆出於匠手兩本正符蓋景徳原刻諸經此其二也明沈周有竹居所蔵周字啟南長洲人於書無所不覽文摹左氏詩擬白居易蘇軾陸游字仿黄庭堅為世所愛重尤工於畫評者謂為明世第一巡撫王恕彭禮咸禮敬之欲留幕下並以母老辭終身不仕明史有傳其羣雅齋吳惟明印康虞父三印大小略等似係一人之章但世里未詳至方外司馬一印亦無考春秋分記四函冊四十宋程公說著首例要三則次年表九卷世譜七卷名譜二卷書二十六卷周天王紀二卷内魯及列國世本三十二卷次國小國及四夷十二卷共九十卷前㳺佀序公說自序又其弟公許序並附公說墓誌銘宋淳祐三年程公許守宜春刻是書於郡齋陳振孫書録解題盛稱之此本卷中多有元時鈐用官印且於首尾紙背用紅字條記係大徳十年江浙等處行中書省奉中書省取備國子監書籍令儒學副提舉陳公舉校勘申解考元史世祖至元十三年括江西諸郡書板宜春隸江西蓋至元詔取而大徳始上此即宋刋元印之本御題分記原通記尊王義寓中年經國為緯外抑内斯崇統萬乃惟一㑹殊則以同稀珍𫝊宋槧遣暇可研窮乾隆甲午秋御題鈐寳一曰乾隆御筆五經一函六冊易書詩禮記經文春秋左氏經傳不分卷巾箱本行密字展朗若列眉中構字闕筆慎字瑗字不闕乃髙宗時刋上方列字音近錫山秦氏仿宋刻巾箱九經亦同此例闕補禮記六十九七十春秋五十六經圗一函六冊宋楊甲撰毛邦翰補大易象數鈎深圗一冊尚書軌範撮要圗一冊毛詩正變指南圗一册周禮文物大全圗一冊禮記制度示掌圗一冊春秋筆削發微圗一冊不分卷苗昌言序序載陳大夫為撫之期年取六經圗編類為書刋之於學事在乾道元年序後列銜知撫州陳森見西江志職官門次通判學正各一人學録二人經諭六人而邦翰為州學教授實補諸圗此書宋本在明時已為囏致新都吳氏曽購得授梓見顧起元序今重刻本或間有之若此本之古香寳刻誠希珍也御題宋版六經圗八韻太古圗先書後出考書或不考圗非陳刋苗序誠探要物列文彰允造微典備六千年燭照冊貽五百載芸馡玩時愒日凛儆戒惕夕乾朝守範圍傳授都因著姓氏次銓還以正依韋六經敢曰能窺道一已惟應勵勅幾敬奉禋宗陳爼豆恪遵家法置冠衣帝王學與儒生異罪我由他知我稀乾隆乙未仲春月御筆鈐乾隆雙璽按玉海紹定六年六月甲午緝熙殿成御書二字牓之宋史理宗本紀六年秋九月以緝熙殿牓記宣付史館書中有緝熙殿及内殿文璽御府圗書三則宋時已為善本登之中秘矣又有明文淵閣印更徵累代寳蔵于慎行筆麈載明中葉文淵閣書散佚殆盡蓋已流布人間或吳氏所購得即此本爾其鬻及借人為不孝一印乃是收蔵家取唐杜暹語以示其後人考宋周煇清波雜志稱暹毎於所蔵書末自題云清俸買來手自校子孫讀之知聖道鬻及借人為不孝四書五函七冊二十朱子章句集註大學一卷中庸一卷論語十卷孟子十四卷朱子序說讀法咸淳癸酉衢守長沙趙淇刋於郡庠毎版中有衢州官書四字中興館閣續錄秘書郎莫叔光上言今承平滋久四方之人益以典籍為重凡搢紳家世所蔵善本外之監司郡守搜訪得之往往鋟板以為官書其所在各自版行宋時郡守刋書於此可證此本淇為衢守所刻時度宗九年按虞集道園學古録淇乃趙葵次子幼以郊恩補承奉郎舉童子科刻書後六年而入元拜湖南道宣慰使又趙希鵠洞天清録鏤版之地有三吳越閩衢郡屬越由來舊矣琴川毛氏蔵本印記㝡夥其鼎元雙印秘殿珠林内錢選洪崖圗幀首有之上有錢氏印下曰仲雅又見宋版漢書下曰伯雅而此曰季雅似晜弟行好古鑒蔵家也餘無考南軒先生張侍講孟子詳說一函六冊宋張栻著七卷前癸巳孟子說序講義發題一則按序栻為是書始自戊子成於癸巳故以癸巳名書而講義發題下注戊子紀年寓意序所云蓋將繼此而有考於異日也宋史藝文志載栻孟子詳說十七卷癸巳孟子說七巻文獻通考止載孟子說十七卷此本正癸巳孟子說而刻者誤冠詳說之名耳然其標題自屬宋款密行疎字精槧也景定五年甲子詔歲二月二十日重􅋔於元吉山房卷四末正統十三年戊辰歲夏四月上旬重􅋔於吳庠書舍樂安蒋裕識卷七末右識語二其一記宋理宗景定年號而不書名其一乃明蒋裕蓋司教於吳者也後為崑山徐氏蔵本餘無考大廣益㑹玉篇一函六冊梁顧野王撰唐孫强増三十卷前有大中祥符六年都大提舉玉篇所牒及字數野王序啟各一首近吳江張士俊澤存堂重刋宋本玉篇朱彞尊為之序謂顧氏玉篇唐上元末孫强稍増多其字至宋陳彭年吳銳邱雍輩又重修之於是廣益者衆而玉篇又非顧氏之舊孫氏玉篇去古未逺猶愈於今之所行大廣益本玉篇復上元本而古之小學存焉矣其書較是本獨無牒文二十四卷後新加兩條在三十卷後而闕十八卷後兩條但多附分毫字樣及神珙反紐圗耳彞尊咎彭年等之重脩而牒文内明稱彭年等校勘允當其實所謂上元本即此大中祥符本也以復孫氏之舊為辭故去其牒耳且彞尊之意以廣益為非今核兩本字數俱符而澤存堂重刻本須部反多一䇓字又何說也考宋史藝文志但有彭年重修廣韻而無重修玉篇惟文獻通考載重修玉篇三卷非此書書録解題云丁度等既修集韻奏言添字既多與野王玉篇不相參協乞委修韻官别為類篇與集韻並行則與玉篇不相䝉矣是本款式皆宋槧但分卷而不隔流水又一例也闕補九十七欽定天禄琳琅書目卷一

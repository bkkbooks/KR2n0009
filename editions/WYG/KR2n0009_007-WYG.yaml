body:
  text: 明版經部韓詩外傳一函六册漢韓嬰著十卷前元錢惟善序錢惟善序作於元順帝至正十五年稱海岱劉侯貞來守嘉禾聴政之暇因以所藏諸書悉刋郡庠云云是此書實為元末刋本然觀其紙質與明版諸書相同當屬元刋而明印者考明史惟善字思復錢塘人至正元年以省試羅刹江賦得名官副提舉張士誠據呉遂不仕既殁與楊維楨陸居仁同葬干山人目為三高士墓浙江通志載劉貞於順帝時任嘉興路總管以惟善序證之其時適相脗合也韓詩外傳一函四冊篇目同前闕錢惟善序此書即是前版而橅印則愈後紙色墨光逺遜之矣明文彭藏本按王世貞呉中往哲像賛文彭字夀承號三橋待詔徴明子也少承家學善真行草書尤工篆𨽻咄咄逼其父以秀水訓導擢國子助教於南京清白堂印無考詩經集傳一函十冊宋朱子集傳二十卷此書前後俱無序跋亦不載刋刻年月而板式字體實屬明刋其刻手印工咸出上選惜墨色少差耳闕補卷九九十十二二十六三十七二十卷十一十五十六卷十七二十五二十六詩緝一函十冊宋嚴粲著三十六卷前宋林希逸序粲自序袁甫手帖并條例清濁音圖十五國風地理圖粲自序作於宋理宗淳祐八年稱緝諸家説句析其訓章括其㫖使之瞭然易見命鋟之木云云是宋時此書業經刋行而此本固非宋槧按音圖後别行有趙府刋於居敬堂七字考明史趙王祐採子厚煜嗣封事祖母楊妃以孝聞嘉靖七年璽書褒予厚煜性和厚搆樓讀書文藻曕麗則所刋趙府或即厚煜所自記歟書前載林希逸序袁甫手帖皆極稱粲深得風人之㫖凌迪知萬姓統譜嚴粲字明卿邵武人精毛氏詩閩縣志林希逸字肅翁號鬳齋端平間登進士第歴官學士宋史袁甫字廣微鄞縣人嘉定七年進士第一由祕書省正字累官至吏部尚書卒謚正肅詩緝六函二冊四十篇目同前詩緝五函三冊三十篇目同前林希逸嚴粲二序袁甫手帖俱闕詩緝二函冊十二篇目同前以上三書皆與前部同版橅印並出一時闕補卷十三三周禮一函四冊漢鄭康成注唐陸徳明音義十二卷此書不載刋刻年月而紙色甚舊是明初橅印闕補卷十一二十八儀禮二函冊十四漢鄭康成注十七卷此書係規仿宋槧毎卷末詳記經注字數與前宋版周易之式相同然以彼較之書手刻工皆大相逕庭矣書中有趙氏子昻樞密之章允文三印篆法庸俗皆出一手其為書賈偽造無疑不足載三禮四函四冊四十漢鄭康成注周禮十二卷儀禮十七卷禮記二十卷共四十九卷此書與前周禮儀禮皆無校刻人序跋當是坊間所刻之本葢明永樂中命儒臣纂修五經風聲所及或有以倡之也曲江張氏收藏印記未詳其人三禮考註二函十冊元呉澄撰六十四卷前明羅倫序謝士元跋夏時正求校三禮考註書楊士奇跋後時正跋夏時正跋作於明憲宗成化九年正月稱三禮考註版刻無傳成化庚寅間時正以使命莅南昌按察司副使夏君寅以録本相示係得之翰林編修張君元禎余因建昌守謝君士元以禮樂為教乃許以堂食之餘鍥梓并命録請狀元羅君倫訪善本正字訛闕留謝守所原本還之張君去年冬謝守書來上鍥有日喜無量也用謹書其鍥梓始末云云書前所載求校三禮考註書即時正所致倫者倫故為之序謝士元跋作於成化九年七月葢在刋刻成書之後矣其載楊士奇跋以士奇謂是書經元季兵亂藏於吾邑康氏後為郡中晏璧所得遂掩為已作書中所増義率多混淆豈璧所為云云疑非確論羅倫序中亦深辨之今按朱彞尊經義考稱草廬先生諸經解各有序録余購得周官禮乃先生孫當所補其餘儀禮則有逸經戴記則有纂言今所傳三禮考註以驗對先生之書論議體例多有不合其為晏氏偽託無疑云云是時正當時得見此書過於偏信遂欲開雕而羅倫之校讐亦僅取資於三禮考註别本而未能如彞尊之旁叅互證也考明史夏時正字季爵仁和人正統十年進士除刑部主事成化六年以南京大理少卿巡視江西坐上奏不具齎奏人姓名吏科論其簡恣遂乞休歸羅倫字彞正吉安永豐人成化二年擢進士第一授翰林修撰以上疏論大學士李賢謫福建市舶司副提舉後因商輅薦召復原職改南京居二年引疾歸築室著書年四十八卒嘉靖初追贈左春坊諭徳諡文毅謝士元字仲仁長樂人景泰五年進士授户部主事天順七年擢建昌知府後巡撫四川坐事下獄事白遂致仕夏寅字正夫松江華亭人正統十三年舉進士授南京吏部主事成化間遷江西副使累官至山東布政使張元禎字廷祥南昌人天順四年進士改庶吉士授編修武宗時擢吏部左侍郎兼學士入東閣専典誥勅尋卒天啟初追諡文裕楊士奇名寓以字行泰和人建文初以史才薦召入翰林充編纂官尋命吏部考第史館諸儒擢第一成祖即位改編修屢遷至禮部侍郎兼華葢殿大學士尋以少保兼兵部尚書正統三年進少師九年卒贈太師諡文貞明邵寶藏本有錫山邵氏家藏印寶見前餘印無考大戴禮記一函四冊漢戴徳著十三卷前宋韓元吉序此書係明仿宋刋僅能效其版式而字畫則拘滯矣韓元吉宋史無傳凌迪知萬姓統譜載元吉字無咎潁川人紹興間知建陽縣用廣而賦嗇乃貿遷鹽鹺以佐其費遷守建川以軍興調發功轉朝奉大夫赴召去民甚懐之後官至吏部尚書明李應昇藏本考明史應昇字仲達江隂人萬厯四十四年進士由南康府推官擢福建道監察御史以劾魏忠賢崔呈秀等人為閹黨曹欽程誣諭削籍歸復以李實劾周起元疏入應昇名逮下詔獄酷掠斃之崇禎時贈太僕卿福王時追諡忠毅其所著有落落齋集見常州府志大學衍義二函冊二十宋真徳秀撰四十三卷前明世宗序後楊一清序此世宗特命司禮監重刋之本也寛行大書筆法在顔栁之間不減宋槧楊一清實董其事故作後序考明史一清字應寧巴陵人少能文以奇童薦為翰林秀才年十四舉鄉試登成化八年進士授中書舍人累官至户部尚書嘉靖間轉吏部尋加特進左柱國華葢殿大學士繼以張璁等搆朱繼宗獄坐一清受張容金錢遂落職疽發背卒後數年復故官久之贈太保諡文襄書中欽文之璽鈐世宗序後所記年月之上又廣運之寶皆鈐毎卷上方當即為世宗寶也大學衍義四函冊二十篇目同前前録真徳秀原序并進表申狀尚書省剳子此書即前版而闕明世宗及楊一清兩序毎卷首葉皆鈐廣運之寶亦是當時内府所藏後流傳於外失去序文得是書者不知為嘉靖時所刋遂依宋本抄録原序進表等篇以為補原書之闕而原書所闕則固不在此也大學衍義三函冊十五篇目同前闕明世宗楊一清二序此書版式字體亦與前同而無内府所鈐諸璽其橅印亦逺不相及當屬坊間翻刻之本大學衍義四函冊四十明邱濬撰一百六十一巻前明神宗序濬自序并進書表周洪謨進書表丘濬進表作於憲宗成化二十三年考明史孝宗本紀以成化二十三年嗣位其明年為𢎞治元年周洪謨進表係是年作稱邱濬所進大學衍義補原書副本俱已裝潢成冊中間字樣亦各校正無差合無順付公差人員齎去福建布政司轉發建寧府著落書坊照樣謄寫務要字畫端楷就將原書比對校正停當翻刻完日仍將印過書籍並發去原本送部查考云云是孝宗命所司刋行是書鄭重周詳已可概見此本為萬厯二十三年所刋神宗復為之序亦極褒揚是書之善乃刋印草草不求精良觀洪謨進表中有謹撰表文一通之句其時竟將謹撰二字截㫁分為兩篇編校者俱未之見抑何漫不經心耶丘濬字仲深瓊山人景泰五年成進士改庶吉士授編修官至禮部侍郎孝宗嗣位表上是書特進禮部尚書尋命兼文淵閣大學士加少保卒贈太傅諡文莊周洪謨字堯弼長寧人正統十年進士及第授編修官至禮部尚書𢎞治三年卒諡文安明史俱有傳監本附音春秋穀梁傳注疏一函六冊晉范甯集解唐楊士勛疏陸徳明音義二十巻前范甯序按前宋版亦有此書標題稱監本附音春秋穀梁注疏此書標題於穀梁下刋入傳字其非宋本無疑觀毎卷之版長短不齊其長者規仿宋槧猶有似處短者則逺遜之葢係書賈偶得舊印不全之本翻刻者半補刋者半耳紙墨亦俱不佳非善本也泰興季氏藏本春秋經傳集解三函册三十晉杜預集解三十卷前預序後預後序此書寛行大字橅刻極精書賈得之遂偽作咸平辛丑刋五字補印於板心上方以當宋槧不知墨色濃淡一望可知且其中有不能容五字者其咸字已印出邊䦨之外而刋字復縮其結體用墨筆補填於下心勞日拙此之謂也明内府藏本有文淵閣印吕雄印見前餘印無考春秋經傳集解二函冊十二篇目同前此與前書同出一版惟閲嵗既久版之徑圍稍縮書之橅印亦差其版心上方並無咸平辛丑刋五字益足證前書之偽矣明焦竑藏本有澹園印見前國語二函冊十二吳韋昭解宋宋庠補音明張一鯤輯二十一卷前一鯤序昭庠二序書首標題次行刋明侍御史蜀張一鯤楚李時成閲虞部郎豫章郭子章選部郎東粤周光鎬校一鯤序稱先是同年李惟中刻内傳於督學署中不佞與郭相奎敢外傳各分四國􅀈之註仍韋氏益以宋氏補音條註其下字畫剞劂一放内傳庶幾稱左氏完書云云一鯤等四人明史俱無傳朱彞尊明詩綜載郭子章字相奎泰和人隆慶辛未進士歴官都御史巡撫貴州進兵部尚書周光鎬字國雍潮陽人隆慶辛未進士除寧波推官陞南京户部主事改吏部厯郎中出知順慶府屢遷至僉都御史撫寧夏入為大理寺卿一鯤時成二人亦未載考明太學進士題名碑此四人者皆登隆慶辛未進士序所稱李惟中者即時成之字其刋刻是書葢合四同年而互相讐校者也碑載張一鯤四川重慶府合州定逺縣人李時成湖廣黄州府蘄水縣人國語一函四冊篇目同前此書紙墨之色皆遜前部葢版同而後印也書中有震宫育徳弱侯楊爵之印斛山金壇王氏書畫珍藏二酉藏書鐵笛道人東樓書畫印記香爐式印九印篆法既不能佳其印色亦復相等且兼以油污糢糊幾不可辨係書賈偽造一時所鈐不足採錄其餘四印亦俱無考國語一函八冊吳韋昭解二十一卷前昭序此書専載韋解橅刻精良其版在一鯤所刋上如定窩中人收藏印記未知誰氏國語二函冊十六呉韋昭解二十一卷前昭序宋宋庠補音序并注解諸家名氏諸國世系説諸國世系説後有明許宗魯識語則此書當為宗魯所刋第書首空載宋庠序文而其補音並未採録體例不孚未為盡善也凌迪知萬姓統譜載宗魯字伯誠長安人正徳丁丑進士嘉靖初任湖廣提學僉事剛明峻潔不為權勢所屈博學能詩文所取皆知名士擢山東副使屢遷至僉都御史尋免歸十三經注疏二十二函冊一百二十周易九卷上下經魏王弼注繫辭晉韓康伯注唐孔穎達疏前穎達序後附唐陸徳明音義王弼畧例尚書二十卷漢孔安國傳唐孔穎達疏陸徳明音義前穎達序次安國序毛詩二十卷漢鄭康成箋唐孔穎達疏陸徳明音義前穎達序次詩譜序春秋左傳六十卷晉杜預注唐孔穎達疏陸徳明音義前穎達序次預序後預後序春秋公羊傳二十八卷漢何休學疏不者名或云徐彦撰陸徳明音義前載宋景徳二年校刋牒文次休序春秋穀梁傳二十卷晉范甯集解唐楊士勛疏陸徳明音義前甯序周禮四十二卷漢鄭康成注唐賈公彦疏前公彦序次序周禮廢興儀禮十七卷漢鄭康成注唐賈公彦疏前公彦序禮記六十三卷漢鄭康成注唐孔穎達疏前穎達序孝經九卷唐元宗注宋邢昺校前昺序次宋傳注序唐元宗御製序論語二十卷魏何晏集解宋邢昺疏唐陸徳明音義前晏上集解序孟子十四卷漢趙岐注宋孫奭疏前奭序次奭題辭解爾雅十一卷晉郭璞注宋邢昺疏唐陸徳明音義前昺序此明北監本也其板心皆記刋刻之年係創始於萬厯十四年逮二十一年而工畢計閲八載之久每卷標題次行分别校刋及重修者各列其祭酒司業銜名其校刋之祭酒經八人司業經七人而重修之祭酒司業則祇二人始終其事葢校刋者係合計八載中歴任是官之人故其數多而所謂重修者不過於書成之後讐勘一通其功易竣其日無多也第是當時奉勅刋行宜加鄭重乃所載陸徳明音義於周易則别為一卷附於書後其尚書毛詩三傳以及論語爾雅忽散列於書中而三禮之音義又不採録去取混淆漫無體例抑獨何耶明内府藏本有欽文之璽鈐葢上方九經釋音一函五冊宋趙孟至撰不分卷前孟至自序孟至序稱暇日取陸氏釋文質以韻書採其可音者音之不可則以四聲紀之又不可則著翻切於其下云云孟至宋史無傳朱彞尊經義考引鄭元慶曰孟至宋燕懿王後祖希懌自青田徙湖州父與􅊸嘉定中登第孟至咸淳乙丑進士官運判彞尊又稱未見此書則知流傳於世者少此本規仿宋槧橅刻頗精惜字體不能如宋人書之流麗耳明内府藏本有東宫書府印張璁亦經收藏有賜名孚敬印考明史張璁字秉用永嘉人登正徳十六年進士第世宗初踐阼議追崇所生父興獻王廷臣持之議三上三却璁時在部觀政上疏曲排廷議世宗大喜擢璁南京刑部主事尋召赴都授翰林學士繼由兵部侍郎屢遷至華葢殿大學士進少師璁以名嫌御諱請更乃賜名孚敬字茂恭御書四大字賜焉繼引疾歸卒贈太師諡文忠李先開明史無傳考太學萬厯己未進士題名碑先開係直𨽻河間府景州人七經圖一函八冊易書詩周禮禮記春秋六經圖宋楊甲撰儀禮圖宋楊復撰明呉繼仕編校不分卷前明焦竑序繼仕自序儀禮圖前繼仕又序前宋版經部中有六經圖其儀禮圖則元版中有之而橅印不及六經圖之善此本為繼仕合刋一規宋槧製極精良焦竑序云新安呉君見宋刻六經圖而奇之手自摹畫考校授之梓人與好學者共焉又念儀禮為朱子所定其徒楊復篇為之圖幷加編纂合為七經圖以傳學者得而讀之可謂粲然明備無復遺憾云云今以此書觀之竑之所許良不誣也繼仕始末未詳六經圖一函六冊宋楊甲撰不分卷前明顧起元序次載校刋姓氏宋苗昌言原序顧起元序稱新都呉氏購得宋本始授梓人計部大夫汝南方公覽而善之謀於同寮諸大夫出帑羨復刻而存於署云云是此書之刻在呉氏刋六經圖甫成之後其時儀禮圖尚未付諸剞劂遂不獲摹入耳應明時為南京戸部郎中掌戸部者係南京吏部尚書衞承芳兼攝其事故首列之其餘司曹同寮計三十四人皆備載姓氏起元曽官南京國子司業故為之序其作序時則官右庶子也顧起元字太初江寧人萬厯二十六年賜進士第三除翰林編修累官至吏部侍郎兼翰林學士卒諡文莊見江南通志方應明汝寧府光州人登萬厯三十二年進士見太學題名碑其歴官事蹟無考明史列傳衞承芳字君大達州人隆慶二年進士萬厯中官温州知府公㢘善橅字屢遷至南京吏部尚書卒於官贈太子太保諡清敏六經圖一函六冊篇目同前顧起元序及校刋姓氏俱闕此書即前版書賈見其橅刻精良遂割去序文并校刋姓氏以希偽充宋槧也明檇李項氏藏本孫克𢎞亦經收藏有漢陽太守印按松江志孫克𢎞字允執號雪居文簡公承㤙子也以䕃為應天府治中擢漢陽知府精於六法山水花鳥無不臻妙餘印無考六經圖一函六冊篇目同前顧起元序及校刋姓氏俱闕六經圖一函六冊篇目同前顧起元序及校刋姓氏俱闕以上二書與前第二部皆曽經書賈之手作偽伎倆如出一轍然是書之善摹宋槧亦可概見矣五經圖一函二冊明盧謙輯不分卷前明李維楨章達二序經圖目録後别行刋章達盧謙同輯今閲達序稱盧公自永豐令歸攜信州學五經圖石本以授余且曰公幸割俸鐫之余亟命工刋石樹之學宫又念石本摹搨之艱更損為卷帙刻於金陵云云是章達係校刋之人而輯是圖者則盧謙也考明史盧謙字吉甫廬江人萬厯三十三年進士授永豐知縣擢御史出為江西右叅政引疾歸崇禎八年流賊犯廬江城陷謙服命服罵賊死贈光禄卿章達楚人事蹟無考刻是書時以無為州知州攝廬江縣事是書所載各圖亦採宋人六經圖中所列者小變其前後之序詳畧之文而以周禮禮記合為一經遂名之曰五經圖殊失古製之舊也李維楨字本寧京山人隆慶二年進士由庶吉士授編修官至南京禮部尚書此書係刻於金陵故有其序六經正誤一函五冊宋毛居正撰六巻前宋魏了翁序陳振孫書録解題稱柯山毛居正誼甫校監本經籍之誤所欲刋正者魏鶴山為之序而刻傳之云云是六經正誤一書為了翁所付刋者方為宋槧此本每卷前俱刋江都郝梁子高重校刋九字郝梁為何如人雖無可考以書中字體紙質校之係明時坊刻之本亦非其至者也居正毛晃子考衢州志晃字叔明江山人紹興中免解進士嘗増注禮部韻學者稱為鐵研先生子居正亦第進士有名於時收藏諸印無考闕補卷一四五卷三二十十四二十五二四巻四四十六二二卷五九七十卷六十四三二十一四二十二四二十八十九十五十八五經四書性理大全十二函十冊一百二明永樂間奉勅輯首載胡廣等進書表易宋程願傳朱子本義二十四卷前總目次凡例程頥序朱子上下篇義圖説五贊筮儀易説綱領書宋蔡沈集傳十卷前凡例書圖沈集傳序書説綱領漢孔安國序後書序詩朱子集傳二十卷前凡例詩圖朱子序詩傳綱領後大小序辨説春秋宋胡安國傳三十七卷前凡例序論年表諸國興廢説東坡圖説禮記宋陳澔集説三十卷前凡例總論澔序大學朱子章句前讀大學法或問朱子序凡例中庸朱子章句前或問朱子序讀中庸法論語朱子集註二十卷前讀論語孟子法朱子序説孟子朱子集註十四卷前朱子序説性理七十巻前明成祖序次先儒姓氏此書中五經大全皆攘前人成書以為已有顧炎武朱彞尊嘗譏之已載前元版經部中矣其輯性理大全附於書後者葢以先儒議論格言足以輔翼五經四書也成祖序諸臣進表皆作於永樂十三年書前所列編纂儒臣銜名共四十有二而胡廣楊榮金幼孜實董其成刋印之善亦足稱焉考明史胡廣字光大吉水人洪武三年以文學選為御史成祖即位偕解縉迎附擢侍講遷學士兼左春坊進文淵閣大學士卒贈禮部尚書諡文穆楊榮字勉仁建安人建文三年進士授編修成祖入京以請先謁陵受知屢遷其官仁宗初由謹身殿大學士進工部尚書正統間進少師卒諡文敏金幼孜名善以字行新淦人建文二年進士授戸科給事中成祖即位改翰林檢討官至禮部尚書兼武英殿大學士卒諡文靖五經四書十函六冊五十明正統間奉勅刋首載英宗諭㫖易宋程頥傳朱子本義十卷前頥序次易圖易説綱領後上下篇義五贊筮儀書宋蔡沈集傳六卷前沈序次書圖書説綱領漢孔安國序後書序詩朱子集傳二十卷前朱子序詩圖詩説綱領大小序辨説春秋宋胡安國傳三十卷前安國序春秋圖春秋興廢説春秋總例禮記宋陳澔集説十六卷前澔序集説凡例大學朱子章句前朱子序後大學或問中庸朱子章句前朱子序後中庸或問論語朱子集註十卷前朱子序説孟子朱子集註十四卷前朱子序説後讀論語孟子法英宗諭㫖以五經四書經註書坊刋本譌誤者多令司禮監謄寫重刋以取便於觀覽其版寛行大字橅印頗精嘉恵藝林亦盛典也詩經内有枕流漱石君則氏二印係先割去舊有之印鈐於補紙上者其君則氏印本小乃平列二方與枕流漱石配合明屬書賈偽為又四書内有尚寶寺卿袁忠徹家藏書畫印考明史職官志有尚寶司而無尚寶寺之名其列傳内載袁忠徹字靜思鄞人従父珙謁燕王王厚遇之及即位召授鴻臚序班賜賚甚厚遷尚寶司丞尋進少卿今印記中以司為寺以袁為表謬誤尤甚均不足存真賞齋荆溪邵氏收藏二印亦無考五經八函八冊三十明正統間奉勅刋篇目同前四書闕是書之首不載英宗諭㫖葢因四書已佚書賈従而汰之然橅印精潔與前部相埒且五經具存未可以闕四書而棄之也樂律全書六函六冊三十明朱載堉著律吕精義内篇十卷外篇十巻律學新説四卷樂學新説一卷算學新説一卷聖夀萬年歴二卷萬年厯備考三卷律厯融通四巻附録一卷操縵古樂譜一巻旋宫合樂譜一卷鄉飲詩樂譜六卷六代小舞譜一卷小舞鄉樂譜並二佾綴兆圖一卷靈星小舞譜一卷共四十七卷首載堉書成進表其餘各書進表序文并勅諭題跋俱散見各卷萬厯三十四年載堉進書表稱臣檢閲書笥除厯書已進外其律書内有數目字樣及樂舞圖恐謄寫舛誤就令畫圖刋板是以延遲十載今始成書為此具本謹以所撰律吕精義一部計六冊律學新説一部計六冊樂舞全譜一部計八冊裝潢成帙専差右長史李徳齎捧進獻云云是載堉此書非由一時進御故各自為卷可分可合也考明史鄭恭王厚烷以言時政獲罪降為庶人錮之鳯陽子載堉篤學有至性痛父見繫築土宫室門外蓆藁獨處者十九年厚烷還邸始入宫上厯算嵗差法及所著樂律書考辨詳確識者稱之卒諡端清朱彞尊經義考謂河間獻王之後言禮樂者莫有過焉良不誣也明内府藏本有廣運之寶寶見前樂舞全譜二函八冊明朱載堉著首操縵古樂譜次旋宫合樂譜次鄉飲詩樂譜次六代小舞譜次小舞鄉樂譜并二佾綴兆次靈星小舞譜觀前書載堉進表稱樂舞全譜一部計八冊是此書原可單行今所分冊數與表所云適合且係初印本紙墨並出前部之上爾雅一函一冊三卷晉郭璞注前璞序坊間刋行之本橅印亦不能工明内府藏本有廣運之寶其醉茗齋書畫印無考埤雅一函四冊宋陸佃著二十卷前佃子宰序宰序稱其父作埤雅言為爾雅之輔按馬端臨文獻通考載陸佃曽撰爾雅新義其曽孫子遹刻於嚴州為二十卷是佃撰此書在爾雅新義既成之後陳振孫書録解題曽並載之此本與前爾雅板式字畫如出一手葢書賈鋟木祗謂埤雅為爾雅之輔遂將郭璞所注並刋而不知佃自有爾雅新義一書宰序所指非璞注也考宋史佃字農師山隂人熈寧中擢甲科官至尚書左丞㑹稽志宰字元鈞佃子官朝請大夫收藏二印與前爾雅同埤雅一函四冊篇目同前此書與前部同版而橅印在先遂覺明朗紙墨亦俱過之埤雅一函十冊篇目同前此仿宋巾箱本式而不能作蠅頭細書且字法端楷有餘流麗不足去宋刋逺矣劉杏収藏印記無考重刋許氏説文解字五音韻譜一函冊十二宋徐鍇編輯十二卷前漢許氏説文序慎子冲序鍇兄鉉進表雍熈三年中書門下牒文規仿宋刋頗殊俗本而篆法撫刻未精亦形筆弱葉氏収藏印記未詳其人許氏説文解字五音韻譜二函冊十二篇目同前此書標題雖無重刋二字而篆法遜於後一部葢欲偽充宋槧而不能上者也文彭錢謙益俱經収藏印記見前其漁陽子郊無考又有趙子昻印篆刻甚庸劣其為偽作可知重刋許氏説文解字五音韻譜二函冊十二篇目同前此本篆法亦劣以書中印記證之乃建本也太山趙氏收藏未詳其人重刋許氏説文解字五音韻譜二函冊十二篇目同前此書橅印稍後亦前版也閔聲収藏印記無考重刋許氏説文解字五音韻譜一函四冊篇目同前紙墨在前二部之下雖出一版實逺遜之𨽻釋二函冊十四宋洪适著二十七卷前适自序宋中興藝文志稱适取古今石刻法其字為之韻辨其文為之釋以辨𨽻書曰𨽻釋陳振孫亦稱年來北方舊刻不可復得覽此猶可慨想此本雖非宋槧橅印不精而其書則固足重也歴代鐘鼎彞器款識法帖一函二冊明萬岳山人校刋二十卷前山人自序萬岳山人不知何許人序後有宣公後裔之印則為陸氏可知惜未詳其名始末無考其序作於萬厯十六年稱蘇人貨古物者有博古圖録予厚價而得之每自稱快又數年得鐘鼎款識一集與博古圖相為表裏然有鈔本無刻本意欲梓焉謀之數年因艱於摹寫之手遂不果邇年偶得松石姜君能兼諸家書又工篆𨽻遂以是集付之不半月而就於是遂得而梓焉云云是此書非山人所撰而序中亦未及作者之名考宋人諸書目祇載鐘鼎篆韻七卷亦無此書葢亦以未有刋本罕傳於時也書中篆法古雅竟似従鐘鼎彞器中摹搨而出其橅印以朱不以墨亦别饒古色明版之傑出者矣六書精藴六函冊三十明魏校著六卷前校自序後附校門人徐官音釋舉要一卷明史魏校字子才崑山人𢎞治十八年成進士歴南京刑部郎中累遷至太常卿尋致仕所著有大學指歸六書精藴卒諡恭簡書中字法或以古篆翻楷或以小篆翻楷弗混於俗深得先民之遺刻手亦能傳其筆意足稱良工徐官因字有難識者為音俗字於書端并附舉要於書末以便披覽官吳人登正徳十二年進士第見太學題名碑韻補一函五冊宋吳棫著五卷前宋徐蕆序書目後有棫識語吳棫作此書自易詩書而下以及歐蘇撰著所採凡五十種其用韻有與時不同者皆載之凡字有一義或二義三義必有所證陳振孫書録解題備詳其説吳棫宋史無傳凌迪知萬姓統諸棫字才老建安人時號通儒朱子評近代考訂訓釋之學亦亟稱之姑蘇志徐蕆字子禮工漢𨽻由進士知饒州後改浙東提舉常平知秀州此本係明時坊刻其板式猶規宋槧而字畫紙墨迥乎不係矣吳岫収藏邱記見前餘印無考改併五音類聚四聲篇二函十冊金韓道昭著十五卷前明憲宗序次昭兄道昇序并重編雜部一篇五音改併増添明頭號樣一篇目録後附重編併部依三十六母再顯之圖書後附金竇慶補背篇列部之字一篇道昭字伯暉松水人其書成於金章宗泰和八年係取玉篇類篇等書之字改併部次别以五音系以三十六字母葢宗婆羅聲音之學者此本為明成化十年所刋憲宗序稱其上下縦横律度精密有益學者特命工繡梓以廣其傳故橅印精良迥殊坊本改併五音集韻二函十冊金韓道昭著十五卷前昭兄道昇序前書以字母分排此書以聲韻分排而每韻中亦各以字母分紐皆因其父孝彦未成之編續加修定者道昇序作於金崇慶元年則道昭此書係後前書五年而成是本橅印頗佳似従金時原版翻刻者也改併五音集韻一函十冊篇目同前此書即前板橅印之時亦不相逺惟紙墨稍差耳書中有楊􅀈印記未詳其人重刋改併五音集韻二函冊二十金韓道昭編十五卷前載金崇慶元年原序次唐郭知元孫愐唐韻舊序二篇後附明沙門真空貫珠集八卷劉序又真空直指玉鑰匙門法一卷夏元序五音集韻目録前標題稱至元庚寅重刋目録後標題又稱成化庚寅重刋而各卷首標題則稱正徳乙亥亦有稱正徳丙子者其第十五卷之末行總標正徳乙亥春日重刋至丙子孟秋完頗疑目録所記年月前後何以懸殊且成化庚寅距正徳乙亥已閲四十六年之久亦覺相去太逺及觀書中版心下方往往載出貲刋書姓氏大半皆御馬監中之官員太監目録與各卷所載畧同則所標至元或係沿元時刋本之舊其標成化者或係爾時集貲未足僅刋目録而止至正徳間始獲成書遂以舊存目録凑合其仍為一版可知且姓氏上有稱信官者其為沙門集貲刋版又可知矣劉聰作貫珠集序時雖稱𢎞治戊午而夏元之序作於正徳癸酉越二年即為乙亥則貫珠集之與五音集韵同刋不更彰彰乎真空自號訥菴始末無考劉聰稱其於經史子集之外凡荒徼重徼如象胥天竺諸域元言梵典如雲笈楞嚴諸經悉搜剔纂採族分類合又為歌訣詞法以概諸首夏元亦稱其於舊本芟繁就簡取易去難意不深刻聲不聱牙一覩之餘即得止宿則訥菴於聲韻之學深契其理矣劉聰江西宜春人登成化十四年進士第見太學題名碑夏元未詳其人作序時官湖廣京山縣令詩韻釋要一函六冊明潘雲杰著五卷附古韻釋要一卷并切韻要法前明王穉登序潘雲􅇐雲間人其始末不可考按松江志有潘雲㑹者為刑部尚書潘恩之子登萬厯四十七年進士第雲􅇐或其雁行此書注釋聲韻㕘訂頗詳王穉登序極稱之橅印精善似非坊刻所能為者穉登字伯穀長洲人四嵗能屬對六嵗善擘窠大字十嵗能詩長益駿發有盛名以布衣終明史有傳明陳龍光藏本龍光雲南石屛州人萬厯三十二年進士見太學題名碑來鴻軒親義禮堂二印未知即龍光所鈐否也童䝉訓一函一冊宋吕本中著上下二卷前宋樓昉序昉序作於宋寧宗嘉定八年稱金華太守邱公長雋出錢五萬鐫刻於吕氏祠堂此本書末别行刋紹定己丑郡守眉山李􅐉得此本於詳刑使東萊吕公祖烈因鋟木於玉山堂以恵後學按紹定己丑為理宗紹定二年去嘉定八年已閲十有四載則吕祖烈所藏即邱長雋所刋以置吕氏祠堂者李􅐉特取而翻刻其版耳此本又從李版翻出橅刻再三故字畫不能圓勁紙亦不佳係坊間所印行者也考宋史吕本中字居仁夀州人公著之曾孫好問之子宣和六年由大名府帥司幹官除樞密院編修遷職方員外郎紹興六年特賜進士出身擢起居舎人官至侍講兼權直學士院不附秦檜為御史蕭振所劾罷提舉太平觀卒諡文清樓昉宋史無傳凌迪知萬姓統譜昉鄞縣人少従吕祖謙學號迂齋紹熈中登進士第養正圖解一函四冊明焦竑撰不分卷前祝世禄序竑自序明史焦竑傳稱皇長子出閣竑為講官竭誠啟迪嘗採古儲君事可為法戒者為養正圖説擬進之同官郭正域輩惡其不相聞目為賈譽竑遂止是當時此書以猜阻未經進奉故無官刻之本此本祝世禄序稱繪圖為丁雲鵬書解為呉繼序捐貲鐫之為呉懐讓按雲鵬繼序名重一時書畫皆臻其妙懐讓欲刻是書先以作圖書解屬斯二人亦不苟於剞劂者矣祝世禄饒州徳興縣人登萬厯十七年進士見太學題名碑作序時官南京吏科給事中養正圖解一函二冊篇目同前橅印與前部並出一時紙質墨光故無軒輊欽定天禄琳琅書目卷七

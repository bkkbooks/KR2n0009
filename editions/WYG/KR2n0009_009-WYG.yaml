body:
  text: 明版子部標題句解孔子家語一函三冊明何孟春補註三巻前漢孔衍魏王肅二序孟春自序林俊序前影宋鈔中載王肅所注孔子家語係為十巻較此三卷詳備逺甚葢孟春未見肅注序中已自言之矣考明史孟春字子元彬州人登𢎞治六年進士由兵部主事歴官吏部左侍郎世宗時以議大禮屢疏力爭出為南京工部左侍郎引疾歸及明倫大典成削其籍卒於家隆慶初贈禮部尚書諡文簡林俊明史無傳按朱彛尊明詩綜小傳俊字待用莆田人成化戊戌進士由刑部主事累官至刑部尚書加太子太保諡貞肅荀子一函十冊周荀況撰唐楊倞註二十卷前倞序是書版心上方標世徳堂刋四字按世徳堂原版係以老子莊子列子荀子楊子文中子合刻行世者而此本則其分部單行之本版式印手俱工明桑氏収蔵諸印一稱黎陽郡叢桂堂考黎陽即桑氏族望一稱栢臺世澤考明代桑氏官御史稱忠直者惟嘉靖間江都桑喬為最著此或其後人耳其文峯主人子純氏本樸氏諸印當即一人之私印也荀子二函冊十四篇目同前此亦前版分部單行之書五臣音注揚子法言一函四冊漢揚雄著晉李軌唐栁宗元宋宋咸吴秘司馬光五家注十卷前咸序次咸進書表次光序次篇目次渾天儀圖説二篇考馬端臨文獻通考載揚子法言十三卷引晁公武讀書志云晉祠部郎中李軌注宋史藝文志載柳宗元注揚子法言十三卷宋咸補注又載司馬光集注四家揚子法言十三卷文獻通考亦載温公集注法言十三卷引讀書志云温公集晉李軌唐柳宗元國朝宋咸呉秘注温公自言李祠部注本及音義最為精詳宋呉亦皆據李本而文多異同今參以漢書取其通者以為定本先審其音乃解其義云云據諸書所稱軌及宗元秘所注者俱止名為注咸注者謂之補注光集者謂之集注明以前未嘗稱音注亦無五臣之目且著於録者皆十三巻不止十卷是本亦世徳堂所刋六子中之一葢仿文選注名而稱為五臣因其兼及審音而稱為音註又改併卷㠸省為十卷則皆非宋刻之舊乃書中所載咸進表亦稱十卷豈改竄其原文耶咸字貫之建陽人天聖二年進士官至都官郎中秘甌寧人官提㸃京東路刑獄並見凌迪知萬姓統譜桑氏收蔵印記見前五臣音註揚子法言一函四冊篇目同前五臣音註揚子法言一函八冊篇目同前以上二書皆與前部同版而紙墨則以第二部為勝也劉向新序一函四冊漢劉向著十卷目録後有宋曽鞏序此葢明翻宋槧之本而紙質則嫌麄厚橅印亦未能工劉向説苑一函八冊漢劉向著二十卷首宋曽鞏序目録後載向原序此與新序同時並刋之本徐幹中論一函二冊漢徐幹著上下二卷前無名氏序次宋曽鞏序後宋石邦哲元陸友識語二篇考中論一書陳振孫書録解題謂唐志六巻今本二十篇有序而無名氏葢同時人所作晁氏讀書志馬氏通考所載俱稱二十篇分上下二卷與今本篇目無異按石邦哲識語稱紹興二十八年假朱丞本校於博古堂陸友識語稱邦哲字照明再世蔵書至治二年得之錢塘仇逺氏是此書乃初校於宋再刻於元而今本則又為明時翻刻者版小而字畫精潔不減宋梓邦哲紹興時官大理評事友字友仁博雅好古工漢𨽻八分嘗著硯史墨史印記並見凌迪知萬姓統譜仇逺字仁近自號近村又號山村見兩浙名賢錄文中子一函四冊隋王通著宋阮逸注十卷前逸序是書亦世徳堂刋本橅印並工桑氏收蔵諸印記並見前惟中増瀛洲仙客一印皇極經世書四函冊三十宋邵雍著十卷此書前後俱無序跋考晁氏讀書志陳氏書録解題馬氏文獻通考俱作十二卷雍子伯温為之序系其畧云其一之二則總元㑹運世之數三之四以㑹經運五之六以運經世七之十則以隂陽剛柔之數窮律吕聲音之數以律吕聲音之數窮動植飛潛之數十一之十二則論皇極經世之所以為書葢原書十二卷前十巻為書謂之皇極經世書末二卷為篇謂之觀物篇又别見觀物内篇二卷單行之本陳振孫謂即經世書之第十一第十二卷也内篇之外又有觀物外篇六卷晁公武謂雍門人所記張載謂外篇亦雍所作門人第編集之引雍詩若無揚子天人學安有莊周内外篇之句為證近世刋行之本僅止觀物内外篇而前十卷之書不可多覯此書雖闕二卷而前十卷獨全洵收蔵家希有之珍也心經附註一函四冊宋真徳秀心經明程敏政附註前敏政序次徳秀心經總目并賛次宋顔若愚跋次宋程復心心學圖并説後敏政後序明汪祚識語末李滉心經論按敏政是書以真西山心經為綱採摭程朱以下大儒之言互有發明者附之於後故名附註第考明史藝文志僅載敏政道一編五卷而附註一書不見著録今按敏政自序汪祚識語同作於𢎞治五年而李滉論乃作於嘉靖四十五年相距又七十五載其論極言敏政道一編以朱子晚年悔悟與陸氏合之説為牽合附㑹而獨取此書遵朱子之意賛西山之經為有益學者故為此論以發明之據此則為敏政未刋之書而滉所梓行者因明末儒林宗尚良知故道一編多所流傳此書雖刻而仍未盛行史家遂獨見遺也考凌迪知萬姓統譜程復心婺源人仕元為徽州路教授嘗著四書章圖總要明史文苑𫝊程敏政字克勤休寧人成化進士累官禮部侍郎贈禮部尚書歙縣志汪祚字承之著有寳經堂稿崇孝編顔若愚李滉爵里俱未詳天原發微二函十冊元鮑雲龍著明鮑寧辨正五卷前雲龍自序次元方回二序次總目次辨正凡例次圖一卷次篇目名義一卷次問答節要一卷後元曹涇跋戴表元後序考鮑寧辨正一書見明史藝文志此本載方回二序一述鮑雲龍著書之意一叙鄭昭祖刻梓之由雲龍著書時嘗與回辨析其義所云問答葢往來手札中語也寧之辨正以小字分註本文之下又刪問答之繁複者名為節要是此書初刻出於昭祖今本則寧作辨正後所刋也篇目名義亦寧所作後一部有寧序此本闕之回之二序一作於至元辛卯一作於元貞丙申曹涇跋亦作於丙申戴表元序作於大徳己亥皆昭祖原刻中所有而寧仍其舊者考歙縣人物志鮑雲龍字景翔鮑寧字廷謐方回字萬里一字囦甫號虛谷宋時知建徳府入元累遷通議大夫曹涇字清甫號宏齋至元中授紫陽書院山長著服膺録讀書記諸書鄭昭祖字孔昭元初以薦除廣南西道儒學提舉不赴元史戴表元字帥初奉化人咸淳中進士乙科大徳八年拜信州教授調婺州以疾辭天原發微一函四冊篇目同前前有明鮑寧序其鮑雲龍自序方回後序辨正凡例曹涇跋戴表元序俱闕此與前書同版而橅印在後故紙墨不及闕補圖十二卷一二十八卷二下十一十二卷三下七卷四三十五卷五上二卷五下五十二聖學心法一函四冊明成祖御撰四卷前成祖序成祖序稱嘗見唐文皇帝作帝範十二篇以訓其子雖未底於精一執中之藴要皆切實著明可以為治故於㡬務之暇采古聖賢嘉言編輯為書云云其書四卷皆言君道而以父道子道臣道附於第四卷之後此本橅印不佳似是坊間售本非内府印蔵之書也五倫書四函二冊三十明宣宗御撰六十二卷前明英宗序考明史藝文志載五倫書六十二卷宣宗採經傳子史嘉言善行有闗於五倫之道者編輯成帙正統中英宗製序刋行此書橅刻極精並是當時初印之本明内府蔵本有廣運之寳五倫書六函冊六十篇目同前此與前書同時橅印而紙質之緻膩過之明内府蔵本鈐寳同前五倫書四函二冊六十篇目同前此本印工較前二部更為精潔闕補卷五十四全五倫書六函二册六十篇目同前此本橅印在前三部之後書中雖鈐内府之寳而亦有收蔵家私印者未必非因紙墨稍差散入民間也韓氏仲氏印記未詳其人五倫書四函冊六十篇目同前此書墨香紙色與第一部同亦橅印之佳本也明内府鈐寳並同格物通二函冊二十明湛若水著一百卷前若水自序次進書表次謝恩進書疏疏後載明世宗諭㫖次若水纂要録一巻後明周相吕柟二序髙簡跋按若水此書以大學明徳之事莫先于格物格之為功在于誠意正心修身遂可以齊家治國平天下故自誠意以下類其物之繁簡列以目之多寡或綴經史格言或闡祖宗大訓明史稱其仿大學衍義補而作者是也書成百卷進于嘉靖七年世宗極為嘉賞周相吕柟髙簡各序跋皆作于嘉靖十二年三人皆出若水門同刻是書者也若水字元明増城人𢎞治十八年進士歴官南京國子監祭酒南京吏禮兵三部尚書吕柟字仲木髙陵人正徳戊辰進士第一累官南京禮部侍郎贈尚書諡文簡見明史儒林𫝊周相呉江人髙簡綿州人俱嘉靖己丑進士見太學題名碑相作序時官四川道監察御史明内府蔵本有廣運之寳潯陽陶氏印記未詳其人闕補卷六五六卷七九古今攷一函四冊二十宋魏了翁著元方回續三十八卷前了翁序序後有回識語按此書雖名為了翁所撰而經其手定者止二十則餘皆回所續成每條之首俱標某某曰以為别引史傳語則稱某紀某傳故于了翁所自著者燦若列眉矣毎卷首第二行悉標上海後學王圻校刋其三十八卷之末附刋元人周文英詩一章并其子南序序題至正二十年稱此書未能版行姑與同志者抄寫數十本云云是此書在宋元間並無刋本至王圻始為付梓也文英父子爵里俱無考了翁回並見前闕補卷一二十老子道徳經一函二冊周李耳撰二卷河上公章句前三國葛元序此亦従世徳堂刋本中分出單行者其橅印與前荀揚諸子並出一時南華真經副墨一函六冊周莊周著明陸西星注八卷前明程涓序次西星自序次篇目次讀南華真經雜説次批㸃法次論音叶次論字畫後明孫大綬序按西星自序稱南華為道徳經之註疏妙竅同元並通大乗之祕故為是註以匡昔賢之不逮云云葢合二家之説而參訂一書也其以副墨為名者即取莊子副墨之子聞諸洛頌之孫句考郭象注副墨即文字之謂西星序作于萬厯戊寅涓與大綬二序俱作于萬厯乙酉涓字巨源新安人大綬字伯符各見本序西星爵里無考是書紙墨雅潔可稱明版佳本沖虚至徳真經一函四冊周列禦宼著晉張湛注唐殷敬順釋文八卷前湛序目録後載漢劉向原序考馬端臨文獻通考載張湛注列子八巻又載列子釋文二卷是知宋時傳本注與釋文分刻此則合刋亦世徳堂梓行六子之一也其以沖虚至徳真經為名者唐天寳初奉冊列禦宼為沖虚真人改題其書為沖虚真經逮宋景徳四年勅加至徳之號又稱沖虚至徳真經晁公武讀書志所載已同此名矣桑氏收蔵印記見前沖虚至徳真經一函六冊篇目同前亦世徳堂刋本紙墨與前部同戰國䇿一函八冊宋鮑彪注十卷前彪序次載漢劉向宋曽鞏上目録序二篇卷十後有彪識語前宋版戰國䇿有王信序自記其梓刻之由此本無之惟卷末有嘉定五年夏月世綵堂刋本記其左右邉䦨墨線俱就版中分行線痕凑成本記之式其為偽造固已顯然況字畫亦逺不相及乎徐摭收蔵印記無考次一印青字下一字糢糊不可辨識吕氏春秋一函四冊秦吕不韋著漢髙誘訓解二十六卷前誘序目錄後有鏡湖遺老識語明張登雲跋考是書卷目各家著錄互異唐宋藝文志及晁氏讀書志並作二十六卷惟馬氏文獻通考作二十卷陳氏書錄解題又作三十六卷與此本亦異按鏡湖遺老識語稱餘杭鏤本亾三十篇又有脱字漏句凡本得於東牟王氏四明使君於元豐初奉詔修書於資善堂取太清樓藏本為之校定元祐壬申余喜得此書校讐始就為一客挾去後三年見歸因募筆工錄之云云據此則鏡湖遺老為宋人其時所校定者原未嘗刋刻此本有陳世寳訂正朱東光補㕘張登雲繙校諸名目刊列于標題之下是其書為登雲所手刻而遵用鏡湖遺老校定舊本概可見也陳世寳朱東光爵里俱無考張登雲山東兖州府寧陽縣人登隆慶辛未進士見太學題名碑明鄭曉蔵本有淡泉大司宼章二印曉字窒甫號淡泉海鹽人嘉靖元年舉鄉試第一明年成進士由職方主事歴官刑部尚書以忤嚴嵩之故坐事落職隆慶初贈太子少保諡端簡明史有傳論衡二函冊十二漢王充著三十卷後有宋楊文昌後序文昌爵里無考其序作於慶厯五年稱先得俗本七率二十七卷其一程氏西齋所貯又得史館本各三十卷於是互質疑謬沿造本源又為改正塗注凡一萬一千二百五十九字募工刋印云云今考􅄯公武陳振孫馬端臨諸家著録卷目悉符則文昌校刋之本為可據矣此本版心下方有通津草堂四字紙質墨光係為明製葢取文昌定本而重加校刻者農書一函五冊元王禎著農桑通訣五卷農桑圖譜二十卷穀譜十卷共三十五卷前禎自序後山東巡撫准刋文移此書巻末有大明萬厯二載甲戌濟南府章邱縣刋行木記而卷首則載嘉靖九年山東巡撫邵准布政司顧應祥申請文移一通内稱元豐城縣尹王禎所著農書三部久無刻本應再加校正命工翻刻分發所屬附州縣掌印治農等官云云是此書初刻於嘉靖九年而章邱縣署又翻刻於萬厯二年故橅印字畫俱不能工整然實為重農務本之書固自可寳考泰安府志稱王禎字伯善東平人官旌徳令再調永豐不言其為豐城尹按永豐豐城二邑皆𨽻江西名復相近其中所載或各有訛誤也禎為山左人其書自盛傳於故土官山左者因為刻梓以表章之苐惜木記中未載章邱縣尹之名遂不可考其人固勤於民事者矣顧應祥字惟賢長興人𢎞治乙丑進士累官南京刑部尚書贈太子少保著有崇雅堂集見浙江通志六子全書一函八冊老子二卷河上公章句前三國葛元序次老氏聖紀圖荘子十卷晉郭象注唐陸徳明音義前象序次太極圖説列子八卷晉張湛註唐殷敬順釋文前湛序荀子二十卷唐楊倞註前倞序次圖揚子十卷晉李軌唐柳宗元宋宋咸呉祕司馬光註前咸序并進書表次光序次圖文中子十卷宋阮逸註前逸序書首載宋龔士卨總序前宋版中有荀子一部南華真經一部其版皆與此書之荀子荘子相同觀揚子序後木記云將監本四子精加校正謄作大字刋行是宋時初刻止有四子也龔士卨序于老莊荀揚之外兼論文中而不及列子則士卨増刋亦止五子今書有六子者葢明人翻刻時始増列子無疑也且書中通體字畫俱不圓整而序文之字用筆牽連處并多紕謬尤為翻刻之明證苐所載揚子亦止十卷據木記所云豈宋時監本已改併十三卷為十卷耶明毛晉王時敏俱經收蔵按朱彛尊明詩綜小傳時敏字遜之號烟客太倉州人太傅錫爵孫承祖䕃官尚寳司丞𢎞載家蔵印無考闕補莊子卷五二十八卷七三十一三十揚子卷十一六子全書二函冊十四篇目同前不載圖此書版心上方俱標世徳堂刋乃為六子合印全本也版式刻工逺勝前部然書首仍載龔士卨序則于序中之止言五子並未加考且標為老子道徳經序益見其疎畧實甚矣收蔵印記無考六子全書二函册十四篇目同前此即世徳堂刋本而鑱去版心之字惟於老子上卷第五葉標桐隂書屋校葢其版為書賈所得遂鑱去世徳堂偽充宋槧又故作校正之名補刋上方以掩人耳目也闕補荀子卷十二十三六子全書二函冊十四篇目同前此亦鑱去世徳堂後印本然墨色精瑩印工之良也明張宏志蔵本宏志河南開封府項城縣人登崇禎丁丑進士第見太學題名碑其仍稱曲江者葢九齡之裔耳六子全書八函冊四十篇目同前此本亦標桐隂書屋校而橅印在前二部之後紙墨俱遜六子全書六函冊四十此本並將桐隂書屋校五字俱為割去而補痕顯然又作偽之拙者矣蕭蓼亭收蔵印未知誰氏闕補老子卷上十六列子巻八十荀子巻十九十八文中子巻三八卷五十四五子全書一函三冊鬻子一卷唐逢行珪註前行珪序並進書表子華子二巻前漢劉向序鶡冠子三卷前宋陸佃序唐韓愈讀鶡冠子文尹文子一卷前魏仲長氏序公孫龍子一卷無序書首有明歐陽清總序按此書巻數與宋時諸家所著録者互有盈縮􅄯氏讀書志陳氏書録解題馬氏文獻通考所載子華子皆作十卷而此本止二卷􅄯氏陳氏所載尹文子並作三卷馬氏作二卷宋史藝文志又作一卷而此本則亦作一卷與宋史同陳氏馬氏所載公孫龍子皆三卷而此本又止一卷惟鬻子鶡冠子與諸書所載皆合此篇目異同之概也鬻子為行珪所註考凌迪知萬姓統譜稱行珪為隋時人而􅄯陳諸家皆謂行珪官華州鄭縣尉其書進于永徽四年則已在唐髙宗時矣至諸家所載尹文子皆稱為仲長氏所定馬氏述李獻臣之言謂仲長氏統也又言傳稱統卒於獻帝避位之年而此云黄初末到京師豈史之誤乎云云葢以序中稱黄初疑為非統而陳振孫又云仲長即統未知孰是書首歐陽清序作于嘉靖五年清上饒人官浙江按察司副使其序稱五子向有刻本久未及校始為改誤補正云云則是宋元以降雖有舊刋之版而此本乃清所别刻者矣荆川稗編六函冊六十明唐順之著一百二十卷前明茅坤序次順之自序次茅一相序并例義按順之此書博採經史諸子百家之説凡農圃醫卜方技一切小道無不備載其書為順之門人毘陵左烝所刋後茅坤姪一相以其不載原書批㸃為之鑱入其實仍為左氏原版觀書中每卷標題之下仍各載考校門人姓氏而左烝之名列於卷首是可證也考明史順之字應徳武進人嘉靖己丑進士累官僉都御史巡撫淮揚天啟中追諡襄文茅坤字順甫歸安人嘉靖戊戌進士累官廣西按察司副使補齋印記無考梁谿漫志一函五冊宋費衮著十卷前衮自序次國史院抄録梁谿漫志牒文次宋樓鑰序施濟跋語考宋史藝文志載是書入小説家止稱一巻以此本證之則史臣之誤也費衮始末無考按常州志梁谿源出恵山南流入太湖古溪狹小梁大同中重浚故名梁谿則衮為常州人可知矣其自序作于紹熙三年施濟識語作于嘉泰元年稱衮以書屬濟濟于為邑之暇命工刻梓云云是此書初刻係出施濟之手然書前所載樓鑰序文乃作于嘉定元年則距施濟刻梓之時已逾七載施之刋本不應有之或鑰所作序者又别為一本此則明代所刻因合前人所有序與識語而并載之耳何氏語林一函六冊明何良俊著三十卷是書刋刻精良橅印清朗為明版最佳之本前後不載序跋惟第一巻後有清森閣雕梓木記考朱彛尊明詩綜小傳良俊字元朗松江華亭人由嵗貢生授南京翰林院孔目有清森閣集則此書乃其所自刋也書分三十六門取歴代史鑑中事實依類引据止于元代自為之註野客叢書一函十冊宋王楙著三十卷前楙自序并識語後宋郭紹彭撰楙壙銘陳造跋按紹彭所作楙壙銘述此書考證經史百氏下至騷人墨客佚事細大不捐士大夫爭先謄寫欲鋟木以傳先生辭之據此則是書在宋時本未刋行故文獻通考諸書及宋史藝文志均未著録直逮明時始有刋本而王圻續通考仍未採入則固收蔵希有之書也王楙郭紹彭宋史俱無傳陳造字唐卿髙郵人淳熙進士累官朝散郎淮南安撫司參議見髙郵州志書中有趙氏子昻印記篆法不工又三呉世家一印字體並多譌謬書賈偽造不足存也重廣補註黄帝内經素問一函十冊二十四卷唐王冰註宋林億孫奇高保衡校正孫兆改誤前億等進書序次冰原序按􅄯公武讀書志陳振孫書録解題俱稱王冰自號啓元子陳氏又稱其為寶應中人官太僕令而王冰之名載于讀書志及文獻通考者並作砯惟宋史藝文志仍作冰字與此書同按集韻韻㑹諸書砯並音砰為水擊出巖聲與冰字音義迥别據此書作冰則知􅄯馬二家之誤也又按宋史藝文志及􅄯陳諸家著録皆第稱黄帝内經素問二十四卷而無重廣補註之名則此本定為明人翻刻時所加名目且書録解題但稱林億高保衡承詔校定並無孫奇之名亦不言有孫兆改誤之事今本増入孫奇孫兆二人則重廣補註之名當即為此二人所加矣書中凡遇宋諸廟諱皆従缺筆葢偽充宋槧之所為然橅刻特精固翻版之絶佳者林億于宋嘉祐中官光禄卿見至元嘉禾志孫奇諸人無考嘯月眠雲及丈夫意氣相許二印未詳重廣補註黄帝内經素問二函冊十四篇目同前橅印在前部之後墨色少差而實為一版也重修政和經史證類備用本草二函四冊二十宋唐慎微編輯三十卷後宋嘉祐間掌禹錫等補注本草奏勅并圖經本草奏勅次政和間校刋證類本草各官銜名次宋宇文虚中元劉祁書後二篇此書卷首有金泰和甲子刋書木記别無序文其自嘉祐以前所有本草諸序皆載于卷一中名為序例而嘉祐間禹錫等進書奏勅又列于書末不入卷中其體例殊不畫一葢因宋金元明輾轉重刋互有改易故也按馬端臨文獻通考載證類本草三十二卷述􅄯公武讀書志云慎微合兩本草為一書且集書傳所記單方附之於本條之下所謂兩本草者一名補註神農本草一名圖經本草皆掌禹錫等先後奉勅所編補註進于嘉祐之初圖經進於嘉祐之末此書猶載兩次奏勅于後則慎微藍本于此可見第考慎微此書前後稱名亦復不一陳氏書録解題載大觀本草三十一卷稱為唐慎微撰义稱仁和縣尉艾晟作序名曰經史證類本草是合大觀本草與證類本草為一也馬端臨文獻通考則載大觀本草三十一卷于前又載證類本草三十二卷于後而于大觀本下即引陳振孫所稱艾晟作序名曰證類之言則名雖分列而實復混同惟宋史藝文志直載大觀經史證類備急本草三十二卷兩名始併為一名矣然諸書但及大觀之名而總無政和之號且皆稱三十二卷或稱三十一卷而此本獨三十卷并以重修政和標題又備用之稱與宋史備急之名互異以卷首金泰和甲子刋書木記證之是明時别據泰和刋本重刻行世不以宋槧為準故卷數標題各有盈縮異同也况宇文虚中所作書後明言慎微字審元成都華陽人治病百不失一不取一錢但以名方秘録為請以此士人喜之得一藥名一方論必録以告云云而文獻通考所引書録解題乃云慎微不知何人考宋史虚中字叔通成都華陽人大觀三年進士建炎二年應詔為祈請使使金不歸受官至翰林學士知制誥兼太常卿封河内郡開國公金人號為國師據此則虚中本與慎微同鄉故能詳其始末又知其書復經政和間奉勅校刋在大觀時者尚非定本故又題為政和而分卷則三十耳虚中使金與宋隔絶所作書後金人刻之而宋人初未之見故謂慎微不知何人也此書與後一部篇目雖同而板刻較工者按後一部為明萬厯間蜀府承奉正陳瑛刋本其所載序文有成化間山東巡撫原傑刋本序又有嘉靖間山東臬使周珫刋本序則是書在明時固有三刻此或為成化嘉靖間所刋而闕其序文也考宋史掌禹錫字唐卿郾城人登進士第累官尚書工部侍郎劉祁無考明内府藏本有廣運之寶重修政和經史證類備用本草二函冊十二篇目同前前有明周俶王積項廷吉馬三才商輅序五篇按商輅序為原傑刋本作王積項廷吉馬三才三序為周珫刋本作周俶序則萬厯五年為蜀府承奉正陳瑛校梓此書而作也慎微本蜀人蜀府為刻其書足稱盛事獨惜橅印不精較之前部相去不啻倍蓰矣原傑字子英陽城人正統十年進士歴官山東湖廣巡撫贈太子太保周珫應城人累官右僉都御史巡撫蘇松俱見明史本傳周俶字初卿成都人嘉靖辛丑進士歴應天府尹見凌迪知萬姓統譜馬三才徳清人嘉靖丁丑進士見太學題名碑商輅見前陳瑛王積項廷吉俱未詳考明史諸王表太祖子椿於洪武十一年封蜀王二十三年就藩成都其承奉正官名史中所載王府官屬并無此稱或係當時所暫置者圖繪寶鑑一函四冊元夏文彦著五卷補遺一卷前元楊維楨序文彦自序考栗祁湖州志云夏文彦呉興人後居雲間精圖畫著有圖繪寶鑑五卷行世但稱五卷不云有補遺一卷今按文彦自序作于至正乙巳自謂彚而成編分為五卷其補遺後别行又標至正丙午新刋則補遺之作在文彦自序中且未之及故栗祁作志亦従其畧不知乙巳丙午僅越一年自是一時並刋非為後出栗志之疎固不足辨又按楊維楨序中稱雲間義門夏氏士良又稱士良名文彦云云栗志僅詳其名而不及其字則其未經深考可知也士良本至明時版已漫漶正徳中有錦衣衞都指揮苗増字益之取家藏本繕冩重刋又彚次當代善畫者續編為六卷刻於正徳己夘司經局洗馬滕霄為序是本仍止五卷及補遺并無重刋序跋係欲偽充原槧者然選紙堅緻古香黟然亦佳本也楊維楨字亷夫浙江㑹稽人元泰定中進士宣和書譜一函二冊宋徽宗御撰二十卷按晁氏陳氏馬氏諸書目皆不載是書則在宋時僅為内府秘籍並未流行見之者少當時有書畫兩譜刻梓者似應合版而此獨單行猶之米芾書畫史二卷載於書録解題者即為分列且宋史藝文志止存畫史而不及書史可知古人書畫分載之書原可析卷單行也此本橅印雖清而字畫不能工整其為明代坊間所刻無疑收藏印記無考東觀餘論一函二冊宋黄伯思著二卷前總目後有伯思自序後宋樓鑰序此書在宋嘉定間樓鑰刻之建安漕司此明時項篤夀翻刻樓本故存其序總目及上下卷標題下皆刋篤夀名而嘉禾項氏萬卷堂梓方圓木記凡四見於書中第以出自翻板橅印不能工整考宋史伯思字長睿邵武人元符三年進士累官祕書郎自號雲林子别字霄賔樓鑰項篤夀見前御題米已闢王黄斥米従来聚訟每紛如千年下議千年上幾事實當幾事虛筆正明言在心正古書垂法示今書重摹淳化加詳訂也覺斯之未信予乙未新正中澣御筆鈐乾隆雙璽潄玉亭諸印未詳其人東觀餘論一函六冊篇目同前後有宋黄䚮序此本雖多黄䚮一序而實為項氏刋版書中所有篤夀名及刋印之木記俱為書賈割去意在欲充宋槧而補紙之痕終不能掩也泰興季氏藏本内有宋本小印亦季氏所鈐盖因未見項氏完書遂為所惑今有前部可證此印不復採入餘印無考古今法書苑三函冊十八明王世貞著七十六卷前世貞二序次王乾昌序乾昌序稱公家藏有古今法書苑七十六卷晚年欲刋行未果友人宋賓之氏得其副墨攜示重與吾鄉勝流開士搜討是正積有嵗年云云是世貞撰成此書未經付梓乾昌實始刻之世貞二序一為孫孟芳書一為陸萬里書考松江志萬里字君羽華亭人工書於時莫雲卿早逝而董文敏後起故萬里稱獨步焉乾昌孟芳亦皆自題雲間人與陸氏同鄉里孟芳所作𨽻書古雅有法疑皆為乾昌所屬其稱吾鄉勝流者殆謂此也王世貞見前本朝大學士髙陽李霨藏本霨字景霱直𨽻髙陽人順治三年進士改庶吉士授編修累官至保和殿大學士加太子太師諡文勤初學記五函冊三十唐徐堅著三十卷前宋劉本序劉本序作於紹興四年不述刋刻始末此本上方有九洲書屋四字觀其版式字體葢出明人所刋橅印頗為清朗考新唐書徐堅字元固湖州長城人舉秀才及第累官祕書監左散騎常侍集賢院學士贈太子少保諡曰文劉本無考收藏二印未詳其人初學記二函四冊二十篇目同前清朗不及前部橅印在其後也收藏二印未詳其人闕補卷二十六卷二十六卷九十二卷十三二十一卷二十八三十卷三十十初學記三圅一冊三十篇目同前此書版心上方標安桂坡館每卷標題之下又稱錫山安國校刋安國見前其人所刋書籍甚夥流傳亦廣而善本則不多得此書版式字體與前二部相同葢取九洲書屋之本而翻刻之者明焦竑藏本有澹園印記竑見前又有范大澈印按後藝文類聚中亦有其收藏印記稱四明范生當屬范欽後人亦天一閣所蔵書也闕補卷二十二一卷二十三六三十卷二十九二十二初學記一圅冊十二篇目同前亦安氏翻刻之版橅印并出一時闕補序四白孔六帖十函册五十唐白居易纂宋孔𫝊續編共成一百卷宋韓駒序此書橅印精良紙墨亦出上選係明版之最佳者孔𫝊宋史無傳凌迪知萬姓統譜載傳字世文兖州人孔子五十世孫精於易學建炎初與孔端友南渡寓居衢州率族人拜疏於闕下叙家門故事歴知邠州陜州撫州改知建昌進續白氏六帖文樞要覽詔送秘書省所著有東家雜記杉溪集官至中散大夫宋史韓駒字子蒼仙井監人政和中賜進士出身累官中書舍人兼權直學士院贈中奉大夫考唐書藝文志作白氏經史事類一名六帖程大昌演繁露謂開元課試之法裁紙為帖白書為制科特設故以帖為名其載於宋史藝文志者則稱白氏六帖三十卷前後六帖三十卷注云前白居易撰後宋孔𫝊撰所云前後六帖三十卷者葢謂前後皆三十卷共六十卷也故陳氏書録解題及馬氏文獻通考皆先列六帖三十卷後列後六帖三十卷合之皆止六十巻今本分為百卷乃明人所更與宋槧卷目異焉白孔六帖四函二册三十篇目同前白孔六帖十函二册一百篇目同前以上二書皆與前部同時橅印之本收藏二印未詳其人百川學海二函册十六宋左圭纂分甲乙丙丁戊己庚辛壬癸十集前圭自序左圭宋史無傳其自序有夀諸梓以溥其傳之語則圭固嘗自刋而此本字畫㕘錯係出翻版闕補學齋佔畢卷一七八卷四七六九十十五蔡邕獨㫁卷下十一十二九經補韻五九六古今注卷下五六釋常談卷下五六燕翼貽謀録卷三三四卷四五六卷五一九春明退朝録卷上一卷中八卷下五三十玉堂雜記卷中二八揮麈録卷下七八厚徳録卷一五六卷三三四文正王公遺事九十龍城録卷上五六卷下一二前定録序二一􅄯氏客語三十一道山清話三十五晝簾緒論一十二二十九祛疑説十五二十十九二二十宋景文筆記卷上五鼠璞十十五三五十十六三六善誘文序九一螢雪叢説卷上十一十卷下九十西疇常言十一十二東谷所見三一四十二十趙元素雞肋全四六話卷上十四六談麈序文房四友除授集四一十騷畧卷一五六七獻醜集一二選詩句圖六十七之十二之十四二四二十六石林詩話卷中三四東萊詩話一珊瑚鈎詩話卷三十貢父詩話四後山詩話五許彦周詩話一六十五十庚溪詩話卷下九三十十四十竹坡詩話三之五十六十五法帖釋文卷七三卷九五海岳名言四書㫁三續書譜四六歙州硯譜五六刀劍録七八香譜五六茶經卷下九煎茶水記五茶録四筍譜五十二十一二二蠏譜九茘支譜三菊譜十一海棠譜巻上五巻下一二禽經十羣書考索十二函一百册宋章如愚輯前集六十六卷後集六十五卷續集五十六卷别集二十五卷共二百十二卷考金華先民傳稱如愚字俊卿金華人慶元中登進士第累官國子博士改知貴州開禧中被召上疏極諫時政因忤韓侂胄罷歸講學論道逺近咸師尊之稱曰山堂先生所著有羣書考索六十六卷云云葢作傳者僅見其前集而不知其尚有後續别三集也今坊間所行刋本亦止有前後續三集而别集往往無之此書方為全本橅印頗精亦明版之佳者事類賦二函册十六宋呉淑著三十卷前宋邊惇徳序次淑進注事類賦狀考宋史呉淑字正儀丹陽人預修太平御覽太平廣記文苑英華作事類賦百篇以獻詔令注釋淑分注成三十卷上之官至職方員外郎卒於咸平五年此書卷三十後刋宋紹興丙寅右迪功郎特差監潭州南嶽廟邊惇徳左儒林郎紹興府觀察推官主管文字陳綬右従政郎充浙東提舉茶鹽司幹辦公事李端民校梓觀此則淑書成于咸平以前上于太宗之朝初無刋本直至紹興末年浙東官屬方為付梓而書中于每卷標題之下呉淑銜名之次標都事錫山華麟祥校刋麟祥雖未詳其人而版心上方刋崇正書院四字考常州府志宋寶祐中無錫令袁従為祠以祀楊時陸九淵張栻楊簡袁燮袁甫喻樗尤袤蔣重珍曰九先生祠元教授虞薦發去陸九淵張栻楊簡袁燮袁甫益以李祥名五先生祠嘉靖八年邑人華雲益以李綱邵寶為七賢祠而榜曰崇正書院夫崇正之名始於嘉靖八年則此書版行葢出於嘉靖以後也邊惇徳字公辨楚邱人才思敏給以能詩名見凌迪知萬姓統譜李端民字平叔見洪邁容齋五筆陳綬無考南康白鹿書院藏本有印記魯國世家印無考事類賦二函册十六篇目同前此書係従前版翻刻其版心之崇正書院改刋寧夀堂其呉淑華麟祥標名處改刋三呉徐守銘警卿校梓長洲杜大中子庸同梓卷末亦鑱去邊惇徳等銜名葢故為變其面目以圖鬻市之本刻手拙劣逺遜前部所稱徐守銘杜大中未必非書賈借名也明焦竑藏本有澹園焦氏印竑見前餘印無考其卷三卷十二并有字畫糢糊之印不可辨識也事類賦一函冊十四篇目同前此書于毎卷呉淑銜名之後留空一行葢本欲列校梓者之名而未經刋入其卷三十後所載邊惇徳等銜名雖與前第一部同而版式各異橅刻特精實出錫山華本之上明仇英藏本有十洲印按王穉登丹青志載英字實父號十洲太倉人移家郡城畫師周臣而格力不逮工于臨摹往往亂真紀纂淵海四函二册三十宋潘自牧著一百卷前明陳文燧胡維新二序次編校姓氏考金華府志自牧金華人官福州教授其書不載于宋史及文獻通考諸書今觀陳文燧序稱予先世求之閩蜀得其前編周流呉越復購後編寶玩葢幾百年矣云云是自牧此書其初原有前後兩編亦無刋行定本故文燧既云求得又云復購也文燧序又稱余戊寅冬承乏畿南公暇謬為補注剥落太甚者屬别駕蔡公司理顧公學博呉公采輯諸書補缺序次示諸太守越峯王公邑令呉君皆願捐俸梓之梓成分為門若干條若干卷若干云云據此則是書不但為文燧所刋其卷目門類亦更定于文燧之手書中所分一百卷并分為五十八部者未必與自牧原書一一符合也考明太學題名碑文燧臨川人嘉靖壬戌進士其序作于萬厯己卯時為河南按察副使胡維新與文燧同官故為之序維新餘姚人嘉靖己未進士亦見太學題名碑闕補卷十二十六卷十六十二卷二十四三卷四十三十七卷五十七二十六卷六十五十一卷七十四十一卷七十五二十六三十一卷八十二十四卷八十五二十二二十三卷八十六二十二古今合璧事類備要十二函十册一百二前集六十九卷後集八十一卷續集五十六卷宋謝維新編别集九十四卷外集六十六卷宋虞載編前集首載維新自序宋黄似道跋此書毎集卷首標題之下皆稱三衢夏相重摹宋版校刋則知此書非宋槧矣第宋時既經刋行而文獻通考宋史藝文志均未著録則此書在明以前流傳固少也謝維新虞載皆建安人維新字去咎載字子厚並見書中黄似道夏相無考古今合璧事類備要八函八册三十篇目同前闕黄似道跋此書各集卷首皆割去夏相校刻一行補以别紙其清朗迥出前部之上葢同出一版而選紙選墨橅印獨工書賈以其精好遂思作偽耳明邵寶藏本印記見前書中又有端本印端字俱作山旁亦係書賈偽作不足采入闕補别集卷八五羣書集事淵海六函二册三十不著撰人姓氏四十七卷前明劉健序後明李東陽謝遷二序按明高儒百川書志以此書為𢎞治間人所撰今考李東陽序則稱國初人輯不著姓名謝遷序則稱此書所采自春秋戰國迄于前元而不著名氏豈元末之際窮居避世而托志于文字以終其身者如虞卿之徒歟一稱國初一稱元末俱不屬之𢎞治則是百川書志所載祗以東陽與遷健三序皆作于𢎞治乙丑遂誤以刻書之日為撰書之年耳健序稱内官監左少監賈公性近于貨書家得書四十七卷若類聚合璧之比題曰羣書集事淵海甚便觀覽公愛而重之因校正舛訛重新諸梓云云則此書刻自明季中官資饒而工審宜其橅印獨精矣考明史劉健字希賢洛陽人天順四年庚辰進士累官少師吏部尚書華葢殿大學士贈太師諡文靖謝遷字于喬餘姚人成化十一年乙未進士第一官少傅戸部尚書謹身殿大學士諡文正東陽見前錦繡萬花谷二函册十六不著纂人姓氏八十卷前自序考陳振孫書録解題載錦繡萬花谷四十卷續四十卷謂序稱淳熙十五年作而不著名氏門類無倫理序文亦拙今此書所列巻數相同其序亦載于書首則猶存宋槧之舊而橅刻不佳係翻版之故也藝文類聚四函四册四十唐歐陽詢著一百卷前詢自序按唐書藝文志此書係詢與令狐徳棻趙宏智等同修則詢固總其成者陳振孫書録解題謂其所載詩文賦頌之屬多今世所無之文集故宋人咸重其書諸家簿録無不載之此本橅印頗精而不誌刋刻年月以版式紙質較之係為明槧歐陽詢字信本臨湘人􅍓官太子率更令𢎞文館學士封渤海男新唐書有傳明四明范大澈藏本所鈐諸印大半見前其稱句章灌園叟者考後漢書郡國志㑹稽郡縣餘姚句章又郭璞注山海經稱句餘之山在餘姚南句章北故二縣因以為名云以地理考之句章即今鄞縣地也又有卧雲印考朱彛尊明詩綜小傳云陳宗虞字于韶閬中人嘉靖庚戌進士官按察副使有卧雲樓稿據此則卧雲當為宗虞私印其餘典客待従之臣并典屬國冏菴寳墨齋開承堂金義玉几諸印未知誰氏所鈐新編古今事文類聚十三函十册一百三前集六十卷後集五十卷續集二十八卷别集三十二卷宋祝穆編新集三十六卷外集十五卷富大用編書首有穆自序按祝穆自序作于淳祐丙午六年而宋史藝文志不載此書似是穆雖撰成自為作序而其書仍未刋行是以宋史不為著録又按書中新集外集皆為富大用所編因其于職官一門獨畧特為増輯大用為何代人雖不可考然新集别集卷首次行俱標南江富大用時可編則一創一因犂然可見且全部標題特用新編二字自與穆書原本有别其非舊刻無疑乃近時坊間通行别本俱削去大用之名竟以全書盡屬之祝穆誤矣考凌迪知萬姓統譜祝穆字和甫其先由江陵遷歙穆従朱子受業以儒學昌其家所著有事文類聚方輿勝覽諸書闕補續集巻十三十六新集卷十九十二唐詩紀事六函八册四十宋計有功著八十一卷前有功自序宋王禧序目録後載明張子立識語計有功宋史無傳按凌迪知萬姓統譜但稱有功居魏公幕府紹興中遣詣行在奏對獻所著晉鑑云云而未詳其里居今觀其書中自序識為臨卭則知有功乃蜀人也王禧序作于嘉定甲申嵗稱慶元辛酉始得是書立命數十吏傳録繙閲累年手自讐校十是正其七八乃鋟之於懐安郡齋是此書初刻係出於王禧之手而張子立又為重校覆刋因作識語于其後也又考朱彞尊明詩綜小傳張子立字原禮黄縣人中嘉靖丙戌科進士官至右僉都御史巡撫延綏梁澍收藏印記無考闕補卷五十一五欽定天禄琳琅書目卷九

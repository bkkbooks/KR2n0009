body:
  text: 宋版集部楚辭一函四冊周屈平撰附宋玉景差賈誼莊忌劉安擬騷諸篇共八卷宋朱子集注目録後載朱子序前有宋羅荷向文龍二序汨羅山水圗屈平朱子二像宋陳振孫書録解題謂朱子以王逸洪興祖注或迂滯而逺於事情或迫切而害於義理遂别為之注其訓詁文義之外有當考者則見於辯證所以袪前注之蔽陋而發明屈子之㣲意於千載之下其於九歌九章尤為明白痛快公為此注在慶元退居之時蓋有感而託其篇第視舊本益賈誼二賦而去諌歎懐思屈子所著二十五篇為離騷而宋玉以下則曰續離騷考宋史寧宗慶元二年朱子草封事數萬言陳姦邪蔽主明丞相趙汝愚之寃力辭職名詔仍充秘閣修撰時臺諫皆韓侂胄所引有胡紘者未逹時謁朱子於建安待以脫粟飯紘不悅語人曰此非人情隻雞尊酒山中未為乏也及是乃銳然以搏擊為任以疏草授御史沈繼祖奏之誣論十罪詔落職罷祠振孫所謂有感而託者蓋以此也是書刻於咸淳丁夘係宋度宗三年所繪汨羅山水圗中有清烈公廟及墓考宋史秘書監何志同言諸州祠廟多有封爵未正之處如屈原廟在歸州者封清烈公在潭州者封忠潔侯之類宜加稽考取一髙爵為定悉改正之云云蓋宋祀典封爵初封侯再封公當時既經改正潭州之廟宜亦稱清烈公又按汨羅在湘隂縣北宋為潭州所屬施南向文龍序稱學製湘隂汨羅𨽻焉欲索楚辭集注善本與邑之賢士大夫共讀之則未之有乃輟俸刻梓於縣齋廬陵羅荷者時為文學掾故亦為序之其刻是書蓋欲求為善本宜其雕槧精良也御題信是身清志猶烈允宜朱註向為刋害公有疾託蕭艾正道無妨擬蕙蘭論古恒明論今闇責人則易責躬難睪然惕若披芸處敢作尋芳潄潤觀乾隆乙未仲春御筆鈐乾隆雙璽衡山文璧蔵卷八末右明文徵明自識蔵本其子文彭亦有印記後入檇李項氏泰興季氏二家收蔵謝宣城詩集一函二冊齊謝朓著五卷宋樓炤序序後有宋洪伋識宋史樓炤字仲暉婺州永康人登政和五年進士第歴官至僉書樞密院事兼權叅知政事為李文㑹詹大方所劾與祠久之除知宣州此書序中稱至郡視事之暇鋟版𫝊之云云蓋即知宣州時所定考其年月係宋髙宗紹興二十八年陳振孫書録解題云集本十卷樓炤知宣州止以上五卷賦與詩刋之下五卷皆當時應用之文襄世之事可采者已見本傳及文選餘視詩劣焉無傳可也所言皆本於炤序序後有嘉定庚辰鄱陽洪伋識庚辰為宋寧宗嘉定十三年故伋稱樞宻樓公鋟木距今六十四年字畫漫毁㡬不可讀用再刻於郡齋又考宋周必大洪文恵公神道碑銘載适孫十人伋奉議郎荆湖南路提舉茶鹽司幹辦公事未載其知宣州蓋必大為其祖适作碑銘時尚在伋守郡前耳御題李杜稱詩久樓洪鋟版行芸香資望古藻繢足怡情詎祗摛辭麗頗多契理精欲嗤劉刺史何據五言城乾隆乙未春御筆鈐乾隆雙璽泰興季振宜滄葦氏珍蔵卷五末九家集注杜詩四函四冊二十唐杜甫著宋郭知逹集九家注三十六巻前知逹序宋曽噩序宋鼂公武郡齋讀書志謂自王洙源叔以後學者喜觀甫詩有趙次公者以古律詩雜次第之且為之注按趙次公字彦材蜀人所註杜詩名曰正誤此書為成都郭知逹所輯知逹宋史未載其人而家於成都係與彦材同鄉里故所輯之注首王文公而終之以彦材蓋以彦材之注為盡善也按序中所載九人其一為趙彦材餘八人王文公名安石臨川人宋景文名祁蜀人豫章先生即黄庭堅寧州人王源叔名洙太原人薛夢符河東人杜時可名田南城人鮑文虎縉雲人師民瞻名尹蜀人知逹序稱屬二三士友各隨是非而去取之如假託名氏撰造事實皆刪削不載據此則亦博採而取其至精者矣其書刻於宋孝宗淳熙八年至理宗寳慶元年曽噩為廣南東路轉運判官重為校刋序稱蜀士趙次公為少陵忠臣蜀本引趙注㝡詳所恨紙惡字缺不滿人意兹摹蜀本刋於南海漕臺㑹士友以正其脫誤云云書後有承議郎通判韶州軍州事劉鎔潮州州學賔辛安中進士陳大信同校勘銜名列於噩銜之右考明凌迪知萬姓統譜載噩字噩甫閩縣人學問淹貫文章簡古慶元間尉上髙有聲後遷廣東漕使鎔安中大信俱無考噩之刻是書也集諸僚友精其校讐固非苟焉付剞劂者故字畫端整一秉唐人而刻手印工皆為上選御題平生結習㝡於詩老杜真堪作我師書出曽鋟實郭集本仍寳慶及淳熙九家正注宜存耳餘氏支辭概去之適以遺編搜四庫乃斯古刻見漕司希珍際遇殊驚晚尤物闇章固有時重以琳琅續天禄㡬閒萬遍讀何辭乾隆甲午仲夏月中澣御筆鈐乾隆雙璽又御題兌氏之戈和氏弓續増天禄吉光中浣花眉列新全帙金粟身存舊卷筒尤物寧論顯與晦逢時亦有塞兮通武英棄置今方出絜矩人材黙惕衷乙未仲春月御筆鈐寳二曰乾隆宸翰曰㡬暇臨池中繪御容鈐乾隆雙璽明秀水項篤夀平湖陸啓浤收蔵俱有印記考檇李詩繫載啓浤字叔度平湖人後更名遯弱冠博極經史倜儻負竒類河朔壯士詩法全宗少陵有賁趾山房集史氏及篤夀見前餘無考闕補卷二二十八十六十六五卷二十末葉黄氏補千家註杜工部詩史一函冊十三唐杜甫著宋黄希黄鶴補註三十六卷前載宋吳元集録傳序碑銘詩記鶴自訂甫年譜辨疑並集註杜詩姓氏有董居誼吳文序考黄希字夢得臨川人宋孝宗乾道二年進士官終永新令楊萬里曰夢得之學奄有古今晚年作詩慕少陵句法有補註杜詩搜剔㣲𨼆皆前人所未發未成而卒子鶴續成之重定年譜名曰黄氏補註杜詩是當日此書之成已為名流所推重其於詩之有闗時事者皆於題下註明故謂之詩史所引前人註皆各標名而出於希鶴父子之手者亦書名别之董居誼字仁夫臨川人孝宗淳熙間進士充賀金國生辰使悉得其國中事宜以歸遷四川制置使吳文吳元無考松陽氏蔵本未詳其人内有紅筆校正處頗為精核新刋詁訓唐昌黎先生文集六函二册三十唐韓愈著宋韓醇詁訓正集四十卷外集十卷遺文一卷共五十一卷前載唐李漢序是書惟卷一下標臨卭韓醇四字前後俱無序跋考之宋史不載醇𫝊按宋刋五百家詁訓昌黎文集列諸儒名氏載醇字仲韶又詁訓栁宗元集亦出醇手書後有醇記作於宋孝宗淳熙丁酉稱世所傳昌黎文公文雖屢經名儒手余昔校以家集其舛誤尚多有之用為之訓詁云云則醇為愈之裔可知其家在臨卭當即為蜀中所刋宋葉夢得以蜀本在建本之上觀此書字精紙潔刻印俱佳夢得所言洵不誣也御題宋刋昌黎集五十一卷卷首有乾學徐健菴諸印想未收入御府之先為舊臣徐氏蔵書字畫精好紙墨細潤非坊賈貌為舊刻者可比天禄琳琅所貯韓集當以是本為第一乾隆御題鈐寳三曰乾隆宸翰曰㡬暇臨池曰幾暇鑒賞之璽又御題載道惟文語不磨齊昌黎者更伊何唐家制度𫝊垂露宋氏槧鉛存擘窠真是起衰空八代弗慙濟溺息千波言宜長短因氣盛玩味多年受益多乙未新正再題鈐乾隆雙璽明李廷相蔵本凌迪知萬姓統譜載廷相字夢弼濮州人巡撫順天提督紫荆闗李瓚之子𢎞治壬戌進士第三歴官禮部尚書諡文敏本朝尚書徐乾學亦曽收蔵俱有印記餘印無考書中卷二十二之卷二十七凡三冊每葉有模字紅印乃出俗刻斜印紙上雜出不倫故不採録闕補卷三十八卷八二卷十二一卷二十六六卷三十四一新刋詁訓唐栁先生文集六函六冊六十唐栁宗元著宋韓醇詁訓正集四十五卷外集上下二卷新編外集一卷共四十八卷前載唐劉禹錫序宋王咨序後醇自記并附録宋穆修後序是書與前韓愈文集體例版式相同後有醇記王咨為之序稱本朝古文始自河南穆修伯長實宗韓栁韓之文定於諸鉅公之手而栁集亦經伯長是正胥山沈晦復相讐正比伯長加詳然其機杼源委要未呈露仲韶先注釋韓集學者争𫝊其書而斯文加宻非仲韶發之孰窺其秘云云是醇注愈集既就已先版行後又注宗元集付刋悉仿愈集之式以二書合而並𫝊故宗元集後有記而愈集後無記也穆修鄆州人真宗東封詔舉齊魯經行之士賜進士出身歴潁州文學叅軍沈晦字光用錢塘人宣和間進士第一累官徽猷閣直學士王咨字夢得蜀人著有雪齋文集雲間莫氏城南精舍蔵書後序末右識語一係莫是龍書此本歴經明文徵明王世懋顧從禮莫是龍至本朝季振宜徐乾學收蔵俱有印記考顧從禮明嘉靖間中書舎人徵明諸人竝已見前餘印無闕補卷三十二之五卷四十四全新刋五百家註音辨昌黎先生文集四函二冊三十唐韓愈著正集四十卷外集十卷宋魏仲舉集註前載引用書目一卷評論詁訓音釋諸儒名氏一卷韓文類譜七巻宋史藝文志及宋馬端臨文獻通考皆不載是書書中亦無纂集人名氏惟正集目録後有木記曰慶元六禩孟春建安魏仲舉刻梓於家塾應即為仲舉集註當時係韓栁竝刋栁集引用書目中載仲舉名懐忠按宋人刻梓家塾之書多有欵識如宋版春秋經傳集解二部一曰相臺岳氏刻梓家塾一曰世綵廖氏刻梓家塾皆有木記亦此例也韓栁二集其所引書係合為一目標曰韓栁先生文集引用書目有後一部可證此本挖去韓栁二字改為昌黎乃書賈未得栁集因而偽為至後一部韓集書前有昌黎先生序記碑銘一卷㸔韓文綱目一卷後有昌黎别集一卷論語筆解十卷文集後序五篇皆此本所無此本書前載吕大防著韓吏部文公年譜一卷程俱著韓文公歴官記一卷洪興祖著韓子年譜五卷統名之曰韓文類譜而後一部逸之蓋流傳既久互有散佚耳其所收諸儒評論詁訓音釋有名氏者一百四十八家新添逸姓氏者二百三十家合計為三百七十八家而曰五百家者未免夸大其詞然採録亦可謂之博贍矣御題子厚退之昔竝傳論文可擬以詩詮韓如杜也栁如李此則聖而彼則仙注五百家孰窺奥垂千萬代獨鈎元學焉有志知難到難到猶然勵勉旃乾隆甲午仲秋御筆鈐乾隆雙璽琴川毛氏蔵本有印記餘無考闕補卷九之卷十四全按卷九之卷十一後一部亦係抄補而此本所抄之注較少且此本卷十二之卷十四所抄與後部刋本亦異則此係從他本採録非得於原書也新刋五百家注音辨昌黎先生文集四函冊二十正集四十卷外集十卷前載昌黎先生序傳碑記一卷㸔韓文綱目一卷引用書目一卷評論詁訓音釋諸儒名氏一卷後有别集一卷論語筆解十卷許渤序昌黎文集後序五篇此本與前部版同紙色墨光亦復相似皆一時摹印之書唐五竇聨珠集載竇牟為東都判官陪韓以下闕劉師不遇分韻賦詩都官員外郎韓愈得以下闕客何以下闕此地深還隨躡鳬騎來訪馭以下闕霞入松髙老鸐尋猶疑𨼆形坐敢起竊桃心今以下闕載近者莆田方崧卿考證訪賾甚至猶取聨珠以下闕登岳陽樓一大篇顧獨遺此何也右洪容齋邁隨筆所紀余因録於此考以下闕聊以備遺失耳歲辛酉至治元年以下闕書於雙瑞堂時七十五歲卷四末右識語一書法宗宋蘇軾深得其妙當為元英宗時好古有得之人惜歲久紙損不知誰氏所書考宋洪邁容齋四筆中韓文公逸詩一則云唐五竇聫珠集載竇牟為東都判官陪韓院長韋河南同尋劉師不遇分韻賦詩都官員外郎韓愈得尋字其詩云秦客何年駐仙源此地深還隨躡鳬騎來訪馭雲襟院閉青霞入松髙老鶴尋猶疑𨼆形坐敢起竊桃心今諸本韓集皆不載近者莆田方菘卿考證訪賾甚至猶取聨珠中竇庠酬退之登岳陽樓一大篇顧獨遺此何也墨字所書即邁此語因附録以補其闕明文伯仁蔵本按馮仙湜圗繪寳鑑續纂文伯仁字徳承號五峰善畫山水為文徵明從子徵明有玉蘭堂此書有雙玉蘭堂印蓋伯仁仿徵明為之者朱彛尊曝書亭集有五百家昌黎集注跋稱是書向蔵長洲文伯仁家歸吾鄉李太僕君實蓋宋槧之􅆟精者惜中間闕三卷後人補抄云云今書中有伯仁印而補抄之卷數亦適相符彛尊所指即是書也餘印無考闕補卷九之卷十一全卷十二二十一卷三十二二卷四十十六新刋五百家註音辯唐栁先生文集二函冊十二唐栁宗元著宋魏仲舉集註正集二十一卷附録二卷外集二卷新編外集一卷龍城録二卷前載㸔栁文綱目一卷宋文安禮栁先生年譜一卷評論詁訓諸儒名氏一卷後附栁先生序傳碑記紀一卷文集後序五篇宗元正集四十五卷此書自廿二卷以下皆闕書賈將目録終三字移補廿一卷後故無魏仲舉木記然版式字體與韓集同實為宋本且正集尚存其半而外集諸種卷帙完好亦足珍也御題五百家註昌黎集實宋槧之佳者栁子厚集雖亦五百家註版式行款標題竝同而紙色墨香遜韓集逺甚且正集廿二巻以下至末皆闕又改目録終以彌縫之更非完善苐栁集註刋本今鮮存者亦覺片羽可珍惟當居韓之次耳附識題韓集詩之後並書冠此集卷端乾隆甲午秋御筆鈐乾隆雙璽闕補卷十二四居士集八函四冊六十宋歐陽修著九十九卷後附祭修文及行狀諡議墓誌銘一卷共一百卷前宋祝庇民序祝庇民列銜為迪功郎士曹掾兼户曹及管左推勘公事序後又列朝散大夫知軍州兼管内勸農事借紫金魚袋方時可朝請郎通判軍州兼管内勸農事賜緋魚袋周詵從事郎司儀曹事監方薦可諸銜名卷五十後載吉州公使庫開到六一居士集計五十卷宣和四年九月記又列迪功郎司士曹事郭嗣明迪功郎司兵曹事監秦尹迪功郎刑曹掾監洪知柔諸銜名庇民序稱太守陳公嘗以公帑之餘刻居士集五十卷觀者猶恨未為全本今太守方公惜之俾嗣其事云云其書中所列之人宋史俱無傳考吉安府志載宋徽宗宣和三年至五年知州事者為陳城六年繼其任者為方時可則序中所稱太守陳公即為陳城序後所列銜名蓋時可同官卷五十後所列銜名蓋城同官也城與時可世系里居志亦未載而核其官稽其時實兩相脗合則是書之為北宋刋本信而有徵矣收蔵諸印無考東坡先生和陶淵明詩一函四冊宋蘇軾著四卷前蘇轍詩引文獻通考載蘇東坡前集四十卷後集二十卷奏議十五卷内制十卷外制三卷和陶集四巻應詔集十卷又載陳振孫語曰杭蜀本同但杭夲無應詔集是軾和陶集宋時杭蜀刋本皆有之其在全集中係别為四卷原可单行此本無校刋人名氏似即從全集中抽出且紙緻墨潤實為宋印之佳者本朝崑山徐乾學蔵本有印記餘無考欒城集三函冊十六宋蘇轍著前集五十卷後集二十四卷三集十卷共八十四卷前載淳熙三年禮部定諡議後有宋鄧光轍曽孫詡四世孫森三跋轍曽孫詡跋云欒城公集刋行於時者如建安本頗多缺謬其在麻沙者尤甚蜀本舛亦不免今以家蔵舊本竝第三集合為八十四卷皆曽祖自編類者謹與同官及小兒輩校讐數過鋟版於筠之公帑紀年為淳熙己亥按己亥為宋孝宗淳熙六年後列校勘官銜名為文林郎筠州軍事判官倪思從政郎充筠州州學教授鄧光奉議郎知筠州髙安縣閭丘泳光泳俱無考宋史載倪思字正甫湖州歸安人孝宗乾道三年進士中博學宏詞科累官寳文閣學士中間出知紹興府太平府泉州建寧府鎮江府福州而未及筠州軍事判官以其時考之當即是人乃史傳中偶失載耳轍四世孫森跋云先文定公欒城集先君吏部淳熙己亥守筠陽日以遺藁校定命工刋之森無所肖似濫承人乏到官之初重念先人所刋家集其版以歲久漫滅今撙節浮費乃一新之紀年為開禧丁夘按丁夘為宋寧宗開禧三年距詡鋟版之時歴二十九載父校於前子新於後宜其毫髪無遺為宋刋欒城集之冠且祖孫五世三治筠陽俾版刻常新此中亦有天幸觀詡森書跋之字家法猶存亦可稱象賢矣明文徵明蔵本有玉蘭堂梅溪精舎辛夷館諸印本朝泰興季振宜亦經收蔵有印記六臣註文選二函冊二十梁昭明太子蕭統撰六十卷唐李善吕延濟劉良張銑吕向李周翰註前蕭統序吕延祚進五臣集註文選表李善上文選註表是書不載刋刻年月而大小字皆有顔平原法按明董其昌跋顔真卿書送劉太冲序後有宋四家書派皆宗魯公之語則知北宋人學書競習顔體故摹刻者亦以此相尚其鐫手於整齊之中寓流動之致洵能不負佳書至於紙質如玉墨光如漆無不各臻其妙在北宋刋印中亦為上品御題此書董其昌所稱與漢書杜詩鼎足海内者也在元趙孟頫在明王世貞董其昌王穉登周天球張鳯翼汪應婁王醇曹子念竝東南之秀俱有題識又有國初李楷跋紙潤如玉南唐澄心堂法也字跡精妙北宋人筆意漢書現在大内與為連璧不知杜詩落何處矣天禄琳琅中若此者亦不多得乾隆御識鈐寳二曰乾隆宸翰曰稽古右文之璽元趙孟頫跋霜月如雪夜讀阮嗣宗詠懐詩九咽皆作清泠氣而是書玉楮銀鈎若與燈月相映助我清吟之興不淺至正二年仲冬三日夜子昂識卷二十三後孟頫此跋作小行楷書曲盡二王之妙其愛是書也至足以助吟興則宋本之佳者在元時已不可多得矣明王世貞跋余所見宋本文選亡慮數種此本繕刻極精紙用澄心堂墨用奚氏舊為趙承㫖所寳往見於同年生朱太史家云得之徐太宰所㡬欲奪之義不可而止太史物故有客持以見售余自聞道日束身團焦五體外俱長物前所得漢書已授兒輩不復置几頭寧更購此因題而歸之吾師得無謂余猶有嗜心耶壬午春日世貞書於曇陽觀大叅同齋中卷五後朱太史名無考所云徐少宰者按朱彛尊明詩綜載徐縉字子容吳縣人𢎞治乙丑進士歴官吏部左侍郎諡文敏王穉登跋宋本文選往往見於蔵書及好事之家欲其精善完好若此本者絶少此本紙墨鋟摹竝出良工之手政與瑯琊長公所蔵漢書絶相類漢書有趙魏公小像此書有公手書二書皆公鄴架中本也流傳至今僅三百年而卷帙宛然既免螙魚之腹又不落雌黄之手豈靈籖秘笈神物呵䕶之耶今歸朱司成象𤣥家出示諦賞因漫題此此本視漢書亦猶蜀得其龍吳得其虎耳矣萬厯甲戌人日王穉登書卷二十五後考穉登字百榖一字伯固長洲人太學生有晉陵金昌燕市荆溪松檀諸集周天球跋余少時嘗見是書于崦西公家後有文敏跋語數十字當是松雪齋中物今五十餘年復見於仲嘉處紙墨如新良可寳也癸巳秋八十老人周天球記卷五十後考天球字公瑕號幼海長洲諸生善畫蘭仲嘉姓汪名道㑹歙人著小山樓藁卷中有印記崦西公未知誰氏張鳯翼跋予嘗見此書於徐文敏嗣君架上云是文敏所鍾愛以貽其後之人者其紙墨精好神采煥發令人不忍去手且其間有趙文敏手識數語則知此書嘗入松雪齋中夫先後相去二百年而遥而去一文敏復歸一文敏豈文選之為文也固自有夙縁耶予穉歲購得一部為黄勉之先生家物與此同出一梓而刷印在後後有景石子題字其紙墨不及此逺甚今已為好事者易去不復得與相較然大都不相及也夫一梓印出且相懸如此矧後之翻版耶近留意選學將纂輯諸註則聞此書已歸雲間因倩人借留案頭校對匝月遂識歲月歸之亦俾好事儒者知所珍重云萬厯丁丑仲秋望長洲張鳯翼卷三十二後考鳯翼字伯起嘉靖甲子舉人有處實堂集黄勉之名省曽吳縣人嘉靖辛夘舉人有五岳山人集汪應婁跋嘉賔拉予過清逺閣出所蔵種種珍玩古色照人真令目眩神馳應接不暇復翻其架上宋版文選又所罕覯者紙精墨妙居然完璧末有趙文敏公手書數行是為松雪齋寳蔵者後傳之吾宗仲嘉有王元羙周公瑕張伯起王百榖諸君跋古雅如仲嘉經其收蔵當為増價後傳之海陽好事家嘉賔親往而厚值廼今貯之閣中吾知嘉賔願讀盡天下好書者而文選尤詞林嚆矢宜其焚香披閱更助清吟之興不淺矣珍而蔵之可為家寳則清逺主人之架勝𤣥晏先生之架云社弟汪應婁書卷十七後應婁無考其稱吾宗仲嘉當亦為新安人按徽州府志載明汪應蛟婺源人官尚書又汪應元歙人官御史未知應婁為誰之雁行也嘉賔湯賔尹字宣城人萬厯乙未進士第二授翰林編修累官至南國子監祭酒以時考之跋中所稱嘉賔當即為賔尹然後李楷跋乃作於諸跋之後而曰吳君珍重似嘉賔又係吳姓抑或從賔尹家再歸於吳亦未可知附著於此以俟叅考王醇跋余知仲嘉有宋版文選心揺揺十餘年矣及造其廬未遑索㸔後逢嘉賔於托山小有園出陶隱居及唐宋墨蹟示之皆人間所未見者業已奪人精魄且許以此書出觀以暝色不能歸去役我魂夢越數日始得一覯紙墨之光射目字楷而有致竟日披覽得未曽有時松風㺯絃逺山横黛是生平第一樂事己未小雪日太原王醇識卷二十八後考王醇揚州人太原其望也曹子念跋日子於萬卷樓見弇州公所得兩漢書以為宋版第一後復有持文選至者楮色瑩膩似覺更佳從臾公購之以為合璧而公以奉道屏去一切翫好猶為題數語令客持去念之常以為恨今秋復覯於仲嘉寓舎披閱甫畢已負之入黄山矣念再見無期因識其末簡萬厯癸巳中秋日曹子念書卷四十七後考子念字昌先太倉州人李楷跋蔵書讀書皆有非常之福其精神又足以相久故非易事而得觀古人之賞鑒手蹟益不敢不什伯讚歎趙文敏往矣弇州𤣥宰諸君子今安在滄田之嗟亦復如是吳君珍重此歴劫不壊之金剛寳也文字㸃畫刻手能存其書法即有圭瑑不可易矣己丑清秋八月八日河濵岸翁李楷跋卷二十六後李楷無考按董其昌卒於崇禎九年歲在丙子今跋中有弇州𤣥宰諸君子今安在之語則此跋之作於己丑蓋國朝順治六年也歙汪氏春草閣蔵吕延祚表後卷六十右識語下有洪度橢圎印一于鼎小長方印一考歙縣志載本朝文苑汪洪度字于鼎松山里人工文詞著有息廬集弟洋度字文治詩有逸致書法仿晉人竝有才名卷中亦有印記又有汪道昆印道昆字伯玉亦歙人明嘉靖進士與王世貞同年世貞稱其文簡而有法名大起晚年官兵部侍郎世貞亦嘗貳兵部天下稱兩司馬云餘印無考六臣註文選二函冊十六篇目同前此書與前部係出一版而紙墨之色摹印之工亦無軒輊洵堪同寳惟書首僅有吕延祚表其蕭統序及李善進表皆闕蓋歴年既久流傳散佚固往往有之而篇目尚全亦無損其為完書也新安汪洪度蔵本有印記又清暉館印考歙縣志載吳孔嘉字元會明天啟乙丑進士官編修有清暉館集餘印無考六臣註文選二函册十六篇目同前此書亦前版而摹印竝出一時古色古香竟成鼎峙觀前部張鳯翼跋云穉歲購得一部與此同出一梓而刷印在後紙墨不及逺甚則是前明鑒蔵家求初印本已不可多得乃經三百載後而登冊府者兼有其三縹緗之富古未之有也朱氏明仲家塾卷六十末右識語一明仲未詳其人此書為宋趙孟堅蔵本有子固印考金賚畫史㑹要載孟堅字子固號彛齋居海鹽廣陳鎮寳慶二年進士修雅博識人比米南宫官至朝散大夫知嚴州府又明文徵明文伯仁項篤夀王寵及本朝季振宜俱經收蔵按王世貞吳中往哲像贊王寵字履仁後字履吉别號雅宜山人吳縣人為邑諸生貢入太學詩好建安三謝書摹永興大令為時所趨徵明諸人見前餘印無考六臣註文選六函册三十篇目同前此書亦前版而摹印在後墨光少遜書中有寳慶寳應州印及官書不許借出木記按文獻通考輿地考載宋理宗寳慶間以逆全之亂降淮隂郡為淮安軍又以寳應縣為寳應州是寳應州之名自理宗時始建故官印於州名之上冠以紀年此本係北宋時刻版印於南宋而稱為官書則知為北宋官刻宜其雕槧精良甲於他版也明文徵明蔵本有玉蘭堂印又王寵項篤夀及本朝季振宜俱經收蔵餘印無考闕補卷六四十二卷十九十八六家文選六函一冊六十篇目同前此書與前四部别為一版亦未載刋刻年月惟昭明序後有此集精加校正絶無舛誤見在廣都縣北門裴宅印賣木記考一統志四川統部表載益州蜀郡東晉分成都置懐寧始康二郡又分廣都縣置寧蜀郡是廣都縣之稱得名􅆟古宋時鏤版蜀􅆟稱善此本字體結搆精嚴鐫刻工整洵蜀刋之佳者木記應是當時裴姓書肆所標亦廖氏世綵堂之例也袁氏昌安堂珍蔵卷六十後右識一語袁氏未詳其人琴川毛氏蔵本有印記餘無考玉臺新詠一函二册陳徐陵撰十卷前陵序後宋陳玉父序永嘉陳玉父後序稱玉臺新詠集十卷幼時至外家李氏於廢書中得之舊京本也版有刓者欲求他本是正多不獲嘉定乙亥始從人借得豫章刻本纔五卷又聞有石氏所蔵録本復求觀之以補亡校脫於是其書復全云云考乙亥為宋寧宗嘉定八年所云舊京本當為北宋時所遺而此乃重刋於南宋者陳玉父無考按宋永嘉陳埴陳宜中諸人或以道學稱或以風節著則知永嘉陳氏係宋望族玉父之刻是書讐校周詳摹刻精好亦可謂深於好古不隕家聲者矣錢謙益蔵本海翁印未詳其人玉臺新詠一函四冊篇目同前此書與前部係出一版宻行細字仿巾箱本式而尺寸加盈製極精雅其摹印亦屬良工故清朗照人可為合璧明王鏊蔵本有濟之印考明史鏊字濟之吳縣人成化乙未進士第三授編修累官至大學士卒贈太𫝊諡文恪鏊在相位時劉司馬大夏楊相一清皆劉瑾所忌將甘心焉鏊為委曲諭解人以此多之王禹聲印未詳或即鏊羣從也唐文粹四函冊四十宋姚鉉撰一百卷後宋施昌言序鼂公武郡齋讀書志曰鉉廬州人太平興國中進士文辭敏麗善書札蔵書至多頗有異本累遷兩浙漕課吏寫書采唐世文章分門編類初為五十卷後復増廣之坐事斥連州卒其子以其書上獻詔蔵内府命以一官又馬端臨文獻通考載麈史云鉉謫居連州嘗冩所著文粹一百卷好事者於縣建樓貯之官屬多遣吏寫録吏以為苦以鹽水噀之冀其速壊後以火焚其樓據此則鉉成是書時在朝在野皆欲得之而未有為刋布者此乃臨安孟琪所刋為文粹一書初刻本宋仁宗寳元二年吳興施昌言後序稱卷帙浩繁人欲𫝊録未易為力臨安進士孟琪代襲儒素家富文史爰事摹印以廣流布觀其校之是寫之工鏤之善勤亦至矣若夫述作之㫖悉於前序云云前序蓋鉉自述今已闕亦無目録而相其紙墨實為北宋初印昌言宋史無傳按凌迪知萬姓統譜載昌言静海人舉進士知太平州上政論三十篇入為殿中侍御史御題唐文粹一百卷五代姚右史鉉所纂昔人稱其用意精博世甚重之乃翻刻既繁流傳互異是本字畫工楷墨色如漆猶見臨安孟琪原雕面目予選唐宋文醇依儲欣例於唐韓栁外増李翺孫樵兩家讀書稽古者以文醇為専家定本而叅之文粹以博其趣庶㡬可乎乾隆御識鈐寳二曰乾隆宸翰曰㡬暇臨池蘭陵蕭氏敷教堂所蔵無考闕補卷十三一卷三十下之卷三十一下全卷三十三卷三十四全卷五十二六之十卷五十三全卷六十六三卷一百九十聖宋文選二函冊十二三十二卷無撰人姓氏是書選集宋人文章自歐陽修以下凡十四家而三蘇之文槩置不録按宋徽宗崇寧二年詔毁三蘇文集而孝宗御極降敕褒揚至為蘇軾文集作序撰是書者或因三蘇本集宇内争傳故不復編纂亦猶王安石選唐詩不録李白杜甫之意也書中未載刋刻年月觀其小楷書筆法森嚴宻行中自見清朗蓋亦巾箱本之􅆟佳者收蔵諸印無考内如一元印元當係緇流如一菴乃其棲禪之所按元詩中有僧名元字宗海或即其人也文章正宗四函二冊三十宋真徳秀撰二十四卷前徳秀自序陳振孫書録解題曰真徳秀撰文章正宗其目凡四曰辭命曰議論曰叙事曰詩賦去取甚嚴按徳秀自序作於紹定執徐之歲乃宋理宗紹定五年序稱梁昭明文選姚鉉文粹果皆得源流之正乎今所輯以體本乎古指近乎經者然後取焉云云此振孫所以謂其去取甚嚴也是書寛行大字用筆整肅刻手印工亦皆精好前後無他人序似即徳秀纂輯成書時自為校刋之本書史之記一印無考續文章正宗二函冊十八真徳秀撰二十卷前宋倪澄鄭圭序咸淳丙寅倪澄序云西山文忠公晚歲所續澄倚席括山窮日夜力繙校鄭君亦分其勞凡三月而藁具又四月而工畢釐為二十卷僅有其目者則虚寘於末一代之文燦然略備又鄭圭序云圭分教括山偕聨事倪君鋟諸梓以夀其傳先生心周程張朱之學觀正宗筆削可以槩見惜未脫藁天弗慭遺然大綱則備矣按丙寅為宋度宗咸淳二年澄圭二人宋史俱無傳考浙江通志澄金華人宋理宗寳祐四年丙辰進士知處州軍圭黄巖人理宗景定三年壬戌進士括山在處州時二人同官因有是刻觀兩序所云乃徳秀未完之書而澄與圭按前集四門之例因其所録而分𨽻之其有目無文者則置於二十卷以存其闕所録之文自歐陽修以下凡十四家版之尺寸與前集同而大字徑圍較小註字筆畫稍肥係仿前集而為之非合刻之本也書中亦有書史之記一印蓋蔵是書者取之以成合璧亦可為有心人矣選青賦箋一函四册十卷無撰人姓氏宋史藝文志及文獻通考經籍考皆不載是書卷中所録盡當時省試之作目録後有建安王懋甫刻梓於桂堂木記乃書賈所輯以頒行者如陳振孫書目解題謂指南賦箋五十五卷指南賦經八卷皆書坊編集即係此類小版細書作巾箱本其製甚精亦宋時佳槧足供秘玩者也御題此宋人省試諸賦選本即唐人試帖及今館課之類蓋一時坊刻也特筆法精鑱為宋本中絶佳者卷首末俱有文氏停雲印良可珍秘乾隆甲子秋分日御識鈐寳二曰乾隆宸翰曰稽古右文之璽明文徵明停雲館蔵本闕補卷十五蘭亭考一函四冊宋桑世昌輯髙似孫刪定十二卷附羣公帖跋一卷前宋髙文虎並似孫序後齊碩序陳振孫書録解題載蘭亭博議十五卷淮海桑世昌澤卿撰世昌居天台放翁陸氏諸甥博雅能詩又載蘭亭考十二卷云即前書浙東庾司所刻視初本頗有刪改初十五篇今存十三篇去其集字附見二篇其書始成本名博議髙内翰文虎炳如為之序及其刋也其子似孫重為刪改去此二篇固當而其他務從省文多失事實或戾本意其􅆟甚者序文本亦條逹可觀亦竄改無完篇首末闕漏文理斷續於其父猶然深可怪也考宋史文虎四明人登髙宗三十年庚辰進士第聞見博洽多識典故歴官至華文閣學士知建寧府丐祠提舉太平興國宫其為世昌作蘭亭博議序正在其時考浙江通志載世昌髙郵人號莫葊有文集三十卷此書乃浙江漕使齊碩屬似孫訂正之本按赤城志碩青社人宋寧宗嘉定十四年以宣教郎知台州似孫序作於嘉定十七年則為碩知台州時付梓與振孫所云脗合似孫字續古淳熙十一年登進士第嘗著經略史略子略集略緯略諸書其詩有踈寮集三卷振孫稱其少有俊聲不自愛重為館職上韓侂胄生日詩九首皆暗用錫字為清議所不齒其讀書以隠僻為博作文以怪澁為竒就中詩猶可觀云云然馬端臨文獻通考經籍考中多引似孫子史諸略之言其博贍自可概見碩刻是書字法皆本歐體鋟印兼出良工蓋亦鄭重而為之者南嶽貞居記卷三末右識語一未詳何人按元顧瑛玉山草堂雅集載張雨一名天雨號貞居子明朱存理鐡網珊瑚載倪瓚云貞居真人詩文字畫皆為本朝道品第一髙啟云貞居字畫清遒有唐人風格觀前五字用筆瘦勁似即張雨所書明文徵明停雲館蔵本本朝秀水朱彛尊亦經收蔵俱有印記餘無考金版史部貞觀政要一函六冊唐呉兢撰十卷前金唐公弼序兢上貞觀政要表鼂公武郡齋讀書志曰兢以唐之極治貞觀為最故采時政之可備勸戒者上之於朝凡四十篇考唐書兢汴州浚儀人少厲志貫知經史當路薦其才堪論譔詔直史館修國史此書當即其時所進書前有大定己丑八月進士唐公弼序稱南京路都轉運使梁公出公府之貲命工鏤版按大定為金世宗年號己丑為世宗九年在南宋為孝宗乾道五年公弼無考所稱梁公未詳何人考金史梁肅奉聖州人天眷二年擢進士第大定初為中都轉運副使繼除河北東路遷中都都轉運使是肅生平屢任是官又適在大定之時似即其人但史未載其為南京都轉運使或肅曽􅆒歴未久於任而史略之耳此本字宗顔體刻印精良與宋版之佳者無異蔵書家知崇宋本而金版多未之及蓋縁流傳實尠耳目罕經似此吉光片羽真為希世之寳也御題好名曽昔議文皇三代下名好亦臧言不以人廢如是書原同帝範之蘉吳兢采輯質文備梁肅鋟行勸誡詳㡬度披芸欽古鑒寧徒玩紙墨精良乾隆乙未初夏御筆鈐乾隆雙璽本朝徐乾學蔵本欽定天禄琳琅書目卷三

  text: 欽定四庫全書欽定天祿琳琅書目卷五
  hash: sha256:2a4bc121e55b849cbbaa4ff13357fac8fa4f272053ba57351f1dcf1b8ed32a56
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2n0009_WYG_005-1a, image: WYG0675/WYG0675-0425a.png}
body:
  text: 元版經部周易本義啓䝉翼傳一函八冊元胡一桂撰四卷前一桂自序元史胡一桂字廷芳徽州婺源人精於易初饒州德興沈貴寶受易於董夢程夢程受朱子之易於黃幹而一桂之父方平及從貴寶夢程學嘗著易學啓䝉通釋一桂之學出於方平得朱子源委之正宋景定甲子一桂年十八遂領鄉薦試禮部不第退而講學逺近師之號雙湖先生所著有周易本義附録纂疏本義啓䝉翼傳諸書並行於世按景定甲子為宋理宗景定五年書中一桂自序作於皇慶癸丑係元仁宗皇慶二年距景定甲子已五十有二載其時一桂年已七十矣序稱先君子懼愚不敏既為啓䝉通釋以誨之愚不量淺陋復為本義附録纂疏以承先志今重加增纂又成翼傳四篇云云是一桂之究心周易克承家學亦非一朝夕之故也是書字體版式規仿宋槧亦元刻之佳者尚書注疏一函四冊漢孔安國傳唐孔穎達正義二十卷前穎達序唐書孔穎達字仲達冀州衡水人八嵗就學誦記日千餘言隋大業初舉明經高第授河內郡博士補太學助教唐太宗平洛授文學館學士屢遷至太子右庶子兼司業卒贈太常卿諡曰憲鼂公武郡齊讀書志曰尚書正義二十卷穎達因梁費甝疏廣之唐儒學𫝊稱穎達與顔師古司馬才章王恭王琰撰五經義訓百餘篇號義贊詔改為正義云雖包貫異家為詳博然其中不能無謬冗馬嘉運駁正其失永徽中于志寧張行成高季輔就加增損始布天下藝文志云穎達與李子雲王德韶等撰朱長才蘇德融隨德素王士雄趙𢎞智覆審長孫無忌李績等二十四人刋定唐史志傳記事多參差此為尤甚所撰記著人姓氏穎達往往不同云云今觀穎達自序所列撰校之人與藝文志合不知儒學傳何以訛誤至此是書大字略仿顔體注字筆畫亦復整嚴惜紙色稍差未能瑩潔闕補序三書集傳一函七冊宋蔡沈撰六卷宋鄒近仁音釋前沈序並尚書纂圖書傳序共一冊後附書序一篇宋史蔡沈字仲默建州建陽人元定次子少從朱子游朱子晚年欲著書傳未及為遂以屬沈洪範之數學者久失其傳元定獨心得之然未及論著曰成吾書者沈也沈受父師之託沈潛反復者數十年然後成書方年三十時即屏去舉子業一以聖賢為師𨼆居九峯當世名卿物色將薦用之沈不屑就鄒近仁宋史無傳考江西志近仁字季友饒州人為龍陽丞嘗叩道於楊簡一再語而頓覺性至孝或干以利介焉弗受人告之過斂衽以服所當為雖強禦不畏著有歸軒集此書與宋版纂圖互注毛詩周禮體式相同惟注字參差不齊未能如宋槧耳毗陵周良金藏本無考詩傳通釋一函四冊元劉瑾輯二十卷前載朱子詩集傳序詩序辨說又詩傳綱領並外綱領吉安府志載劉瑾安福人肆力治詩其說宗朱子而間出其所自得又考正諸國世次作者時世察其源流辨其音韻審詩樂之合窮刪定之由為詩傳通釋一書能闡發朱子之藴今按是書以朱子集傳為主而博引諸家之說分注於下已說則標以愚按二字其綱領首詩大序次經傳及宋儒論詩之言外綱領首諸國世次圖次作詩時世圖次源流章句音韻詩樂刪次並引用書目及諸儒姓氏諸篇與府志所言吻合顧炎武日知録云永樂中命儒臣纂修五經大全春秋則全襲元人汪克寬胡𫝊纂疏但改其中愚按二字為汪氏曰及添廬陵李氏等一二條而已詩經大全則全襲元人劉瑾詩傳通釋而改其中愚按二字為安成劉氏曰其三經後人皆不見舊書亦未必不因前人也昔日儒臣奉㫖編纂諸書頒餐錢給筆札書成之日賜金遷秩所費于國家者不知凡幾將謂此書既成可以章一代教學之功啓百世儒林之緒而僅取已成之書抄録一過上欺朝廷下誑士子唐宋之時有是事乎朱彞尊經義考云永樂中胡廣等攘其成書為大全今以大全較之輯注微冇增損小序則通釋附於每篇之後大全冠於全書之首並加以圖二十有三為稍異耳又引黃虞稷曰瑾字公瑾安成人按安福縣在漢時為安平安成二縣境元成宗元貞間嘗升為安福州安成蓋古邑名故瑾亦自署為安成虞稷苐沿而未考耳書中詩𫝊綱領首葉於劉瑾署名次行有建安劉氏日新堂校刋九字卷一末又有至正壬辰仲春日新堂刻梓木記考至正壬辰為元順帝十二年劉氏未詳其名想亦當時書賈也本朝劉體仁藏本有印記體仁字公㦷江南潁州人順治乙未進士官吏部考功郎著有蒲菴集餘印無考禮經㑹元一函四冊宋葉時撰四卷前元潘元明序時家𫝊六世孫廣居識葉時宋史無傳考咸淳臨安志及嘉靖浙江通志載時仁和人淳熙十一年甲科纍官至龍圖閣學士卒諡文康著有禮經㑹元竹野集又兩浙名賢録載時字秀發博學善屬文尤邃於周禮為學者所宗晚居嘉興悉與書首家𫝊吻合宋史藝文志及鼂公武陳振孫馬端臨諸人書目皆不載是書書中廣居識語稱滎陽公敦古尚治命鋟梓以不朽其傳云云則知此書在宋時並未刋行故不顯於世滎陽為潘氏郡望前有海陵潘元明序作於至正乙巳按乙巳為元順帝二十五年其結銜稱榮祿大夫江浙行省右丞兼同知行樞密院事考元史無元明𫝊明史太祖本紀載順帝二十六年十一月李文忠下餘杭潘原明降凌迪知萬姓統譜載潘原明泰州人初與張士誠俱起鹽徒為浙江行省平章守杭州李文忠師至錢塘原明全城歸降士誠由是勢孤兩書皆作原明與序中元明元字音同字異苐結銜相符其時亦合且泰州自南唐以前皆稱海陵郡元明之為泰州人信而有徴其即一人無疑成化杭州府志載廣居字居仲仁和人天資超邁才力絶人為古文詩詞援筆立就仕至浙江儒學副提舉所著有自得齊集書首有大中丞印無考闕補卷四五十一之五十三儀禮圖一函八冊宋楊復撰十七卷後附儀禮旁通圖一卷前載朱子乞修三禮奏札復自序陳普序朱彞尊經義考載是書引明曽棨曰楊復因朱子之意取儀禮十七篇悉為之圖制度名物粲然畢備以圖考書如指諸掌西山真德秀稱為千古不刋之典焉又引桂萼曰儀禮經朱子考證已定楊復圖尤為明便其文雖屬難讀然因圖以指經因經以求義斯了然矣凌迪知萬姓統譜載復長溪人受業朱子與黃幹相友善著祭禮十四卷儀禮圖十四帙又有家禮雜說附注二說書首復自序稱復曩從先師朱文公讀儀禮求其解而不可得則擬為圖以象之今所圖者則高堂生十七篇之書也釐為家鄉邦國王朝諸禮則因先師經傳通解之義例也附儀禮旁通圗於其後則制度名物之總要也云云序作于紹定戊子按戊子為宋理宗紹定元年後有陳普序未詳其人刋刻體式亦仿宋版而紙質黝厚非宋製也附釋音春秋左傳注疏六函冊六十晉杜預注唐孔頴達疏陸德明音義共六十卷前穎達春秋正義序崇文總目春秋正義唐國子祭酒孔穎達撰此書名曰附釋音春秋左傳注疏蓋仿宋版監本附音春秋公穀二書之例然元時監本已不逮於宋而此乃屬坊刻宜其又遜一籌矣闕補卷五十七二十三卷五十八十八之二十七卷六十二十八二十九春秋諸國統記一函六冊元齊履謙撰六卷前元吳澄序履謙自序後齊思恭跋元史齊履謙字伯恆父義善算術履謙生六嵗從父至京師七嵗讀書一過即能記憶年十一盡曉推步之法十三從師聞聖賢之學自是以窮理為務非洙泗伊洛之書不讀至元間授星歷教授大德中遷保章正仁宗即位嘉尚儒術擢國子監丞改授國子監司業與吳澄並命時號得人未幾以履謙僉太史院事至延祐元年復為國子司業後拜太史院使卒於官至順三年贈翰林學士資善大夫上護軍追封汝南郡公諡文懿吳澄字幼清撫州崇仁人舉進士不第以元明善薦除江西儒學副提舉繼以國子監丞遷司業英宗即位超授翰林學士進階大中大夫移疾歸年八十五卒贈江西行省左丞上護軍追封臨川郡公諡文正履謙此書成于延祐四年乃復為國子司業時所作其書始魯終吳合二十國而附録諸小國亡國於後澄曽與履謙同官深知其學因為之序朱彞尊經義考載是書有栁貫跋此本無之而有思恭跋又經義考中所無思恭元史無傳跋稱履謙曰大兄司成君則知為履謙之弟書中有禮部官書朱文長印與宋版通鑑紀事本末書中所鈐符合似亦明永樂間所採之本也琴川毛氏藏本周易尚書毛詩春秋禮記孝經論語孟子爾雅小爾雅附中庸大學重出各經序文傳注俱不載此書専刻經文無校刋人姓名亦不載鏤版年月易經後有識語云兹刻易文諸卦皆仿乾卦或疑之曰分經分傳以别篇卷分經合傳以便贊釋此古文今文各有所取兹不然者何也曰古文别而病其離今文便而病其碎此程朱𫝊義所以更張不一者也兹使羲文周孔之易别而不離便而不碎殆古人玩易之舊也漢儒分經合傳爻辭不可相屬傳贊亂其成韻矧象曰之綴疊僭妄不稽尤不若古文之可安也曰漢儒之僭妄何稽乎曰以乾卦也又學庸後識語云學庸本二戴類編之經二程揭出示要領也今刻古文一仍其舊而二篇重出便四書之尚也至善堂記按至善堂當是書賈坊名其専刻經文蓋取便於行篋所攜亦仍宋槧巾箱九經之意刋手印工雖非草草而欲如巾箱本之密行細字倍見精瑩者已出其下矣大學衍義四函冊二十宋真德秀撰四十三卷前德秀進表札子申狀并序宋史德秀字景元後更為景希建之浦城人登慶元五年進士第繼中博學宏詞科由太學正纍官至參知政事三乞祠祿進資政殿學士提舉萬夀觀兼侍讀卒諡文忠其自泉州入為户部尚書時以大學衍義進上嘉納之德秀申狀稱端平元年十月初二日進入次日後殿聚講論所進大學衍義一書有補治道旋於十四日輪當進讀大學章句既畢忽䝉聖訓卿所進衍義便合就今日進讀德秀私謂前所進本已納禁中必須令講筵所别寫然後可以進讀遂以未辦為對聖訓云已在此矣即見內侍捧元進第一第二帙在前云云則理宗之重是書亦已至矣此本規仿宋槧摹印俱工實元版之最佳者惜紙質堅而未緻耳御題大學八條著為聖經而真西山衍義一書首剟聖賢性命之精旁采古今治亂之迹發揮經術燦若列眉誠孔氏之功臣也坊賈𫝊刋率多訛謬此書雕鋟精善尚屬元刻舊本每一披覽心目豁然藉是或得仰窺聖奧用臻治理則補禆寧有涯涘耶甲子小春下浣御識鈐寶三曰幾暇臨池曰稽古右文之璽曰讀書析理東宫書府印無考樂書六函六冊三十宋陳𤾉撰二百卷前宋楊萬里序次𤾉進表并序次趙挺之請寫録樂書札子准行詔㫖樂書目録正誤樓鑰序陳芾題辭後陳岐林子沖二跋陳振孫書録解題曰樂書二百卷祕書省正字三山陳𤾉撰建中靖國初進之為禮書陳祥道其兄也其書雅俗畢備博則博矣未免於蕪穢也考宋史陳𤾉字晉之福州人中紹聖制科授順昌軍節度推官徽宗初進迓衡集以勸導紹述得太學博士祕書省正字進鴻臚太常少卿禮部侍郎以顯謨閣待制提舉醴泉觀建中靖國元年趙挺之札子稱𤾉所者樂書卷帙既多無力繕寫臣欲乞依祥道例特賜筆吏畫工寫録圖畫進獻云云徽宗從之並以詔書褒𤾉有成書甚富衆論所稱差進厥官以為爾寵之語宋史挺之字正夫密州諸城人進士上第由登棣二州教授纍官至右僕射卒諡清憲樓鑰序云樂家之書未有此比而又苦其舛誤無所考證聞建昌陳史君刋此書與禮書並傳取而校正併為質之經傳尚三數百條㑹陳子芾為南豐宰因以寄之南豐欲别刋此編以補郡本之缺求書其後云云其序作於嘉泰二年所稱陳史君即作跋之陳岐岐跋作於慶元己未按己未為宋寧宗慶元五年至七年改元嘉泰是此書在徽宗時祇經寫録逮岐始為刻梓而芾又别刋之三年之中兩付剞劂矣此本字多俗體如禮作禮興作興之類雖係元翻宋刻而筆畫清朗紙墨俱佳固元刋之傑出者也宋史樓鑰字大防明州鄞縣人隆興元年試南宫有司偉其辭藝欲以冠多士策偶犯舊諱知貢舉洪遵奏得㫖以冠末等由溫州教授纍官至參知政事卒贈少師諡宣獻陳岐陳芾林子冲宋史俱無傳凌迪知萬姓統譜林子冲字通卿自號岫雲居士侯官人之奇從子學問德業有聲鄉里間士宗之者數百人淳熙中登進士第初為南豐簿時郡守陳岐欲修二陳禮樂書以子冲大儒之後延以特榻冲隨文釋義訂正頗多書中有禮部官書朱文長印似亦為明永樂間所採輯者御題宋陳𤾉樂書二百卷與其兄祥道所著禮書並𫝊於世其間網羅放失參考古今損益之故犂然具備而女樂一篇尤足垂千古炯戒楊萬里序中特著明之意深逺矣幾暇間披有資君德夫豈獨雕鋟精好輝映東壁耶乾隆甲子秋分後二日御題鈐寶二曰稽古右文之璽曰乾隆宸翰說文解字一函六冊漢許慎撰宋徐鉉校定三十卷前標目一卷第十五卷上載慎原序次說文解字總部十五卷下載許慎之子許冲進表次徐鉉等進校定說文表又新修宇義并鉉等進校定說文解字表敕校定說文解字牒文馬端臨文獻通考引鼂公武曰漢太尉祭酒汝南許慎叔重纂李陽氷刋定徐鉉再是正之又增加其闕字陳振孫曰凡十四篇并序目一篇各分上下卷凡五百四十部九千三百五十三文重一千一百六十三雍熙中右散騎常侍徐鉉奉詔校定以唐李陽氷排斥許氏為臆說末有新定字義三條其音切則以唐孫愐韻為定考宋史徐鉉字鼎臣揚州廣陵人十嵗能屬文與韓熙載齊名初仕吳繼仕南唐逮宋由太子率更令歷官右散騎常侍遷左常侍精小學好李斯小篆臻其妙𨽻書亦工嘗受詔與句中正葛湍王惟恭等同校說文今書中鉉進表後結銜四人與史傳合葛湍王惟恭宋史無傳句中正字坦然益州華陽人孟昶時授崇文館校書郎復舉進士及第為曹潞二州録事參軍精於字學古文篆𨽻行草無不工太平興國二年獻八體書授著作佐郎直史館歷官屯田郎中書後雍熙三年敕新校定說文解字牒文稱其書宜付史館仍令國子監雕為印版依九經書例許人納紙墨價錢收贖兼委徐鉉等㸃檢書寫雕造無令差錯致誤後人云云按宋時監本刻印尤精此書雖仿其式而版之長短無定紙之質理亦粗以牒所稱何如鄭重不當有此其為元時翻刻無疑大明正德十二年四月初八日收頤齊徐獻忠記大明萬厯六年八月望日收瑞龍龔從先記以上俱六冊末右識語二朱彞尊明詩綜小傳徐獻忠字伯臣松江華亭人嘉靖乙酉舉人知奉化縣及卒友人私諡曰貞憲先生有長谷集龔從先未詳其人元柯九思盛懋明莫如忠俱經收藏有印記徐顯稗史集傳柯九思字敬仲台州仙居人遇文宗於潛邸及即位置奎章閣特授學士院鑒書博士凡內府所藏法書名畫咸命鑑定鄒衡嘉興志補盛懋字子昭臨安人僑寓嘉興善畫明史莫如忠字子良嘉靖十七年進士纍官浙江布政使善草書詩文有體要餘印無考大廣益㑹玉篇一函冊十二梁顧野王撰唐孫強增三十卷前有大中祥符六年都大提舉玉篇所牒及字數野王序啓各一首玉篇廣韻指南一卷此書較宋版大廣益㑹玉篇尺寸加贏紙色墨光遜其古潔篇目字數兩書相同而此多玉篇廣韻指南一卷按隋陸法言撰廣韻五卷宋陳彭年等重修之其書與玉篇不相涉馬端臨文獻通考載玉篇三十卷像文玉篇二十卷玉篇疑解三十卷重修玉篇三卷未見有於玉篇之下綴以廣韻二字者則此乃強為牽合非復宋槧之舊明矣元趙孟俯藏本有水晶宫道人印孟俯以湖州四面皆水自號水晶宫道人解縉春雨集云趙文敏公早嵗喜畫梅印以水晶宫圖書浙中有瑪瑙寺或戲以為對遂不用又有鮮于樞仲溫吳寬二泉米萬鍾王鐸錢謙益諸印考陶宗儀書史㑹要鮮于樞字伯機號困學民漁陽人官至太常寺典簿高啓南宫生𫝊宋克字仲溫吳人自號南宫生明史邵寶字國賢無錫人學者稱為二泉先生成化二十年進士歷官南京禮部尚書卒贈太子太保諡文莊孫承澤畿輔人物志米萬鍾字仲詔其先關中人徙京師萬厯乙未進士仕至太僕寺少卿著篆𨽻考訛二卷王鐸字覺斯河南孟津人明天啓二年進士本朝官禮部尚書吳寬錢謙益見前餘印無考闕補卷二十三十六書正訛一函五冊元周伯琦撰五卷前琦自序後元吳當序元史周伯琦字伯溫饒州人幼從父應極游宦京師入國學為上舍生䕃授將仕郎南海縣主簿洊擢翰林修撰日被顧問眷遇益隆歷官浙西肅政廉訪使江南行臺監察御史尋假參知政事招諭張士誠士誠降拜資政大夫江浙行省左丞後歸鄱陽卒伯琦博學工文章而尤以篆𨽻真草擅名當時嘗著六書正訛說文字原二書其序稱許慎氏為說文解字學者有所依據李陽氷附新義以廣其㫖徐鉉增翻切以明其音鉉弟鍇撰通釋以衍其義雖或辨其舛戾而猶淆以俗體張有次復古編鄭樵作六書略戴侗述六書故莫不原於許氏然張失之拘鄭過於奇戴病於雜間嘗托字書之常用而疑似者以聲類之參稽古法集而書之凡二千餘字名之曰六書正訛以刋傳寫之謬云云今觀書中篆法深合史籀準繩或即伯琦所自作刋手亦頗得用筆之妙乃元版中不可多得之本吳當字伯尚澄之孫用薦者為國子助教預修宋遼金三史除翰林修撰歷官中奉大夫江西行省參知政事陳友諒陷江西諸郡遣人辟之當不為屈隱居著書以終其身並見元史元版史部史記六函冊六十漢司馬遷撰宋裴駰集解唐司馬貞索隱張守節正義一百三十卷前駰集解序次貞史記索隱序補史記序張守節正義序論列諡法解陳振孫書録解題載史記一百三十卷漢太史夏陽司馬遷撰宋南中郎參軍河東裴駰集注張晏曰遷沒之後亡景武紀禮樂兵書漢興將相年表三王世家日者龜策靳蒯傅歙列傳元成之問禇先生補作武紀三王世家日者龜策傳顔師古曰本無兵書張說非也今按禇所補皆不足觀其餘六篇未知何人所補也禇名少孫裴駰即注三國志松之之子始徐廣作史記音義駰本之以成集解云云又載史記索隱三十卷唐宏文館學士河內司馬貞撰採托異聞釋文演注末二卷為述質為三皇本紀世號小司馬史記又載史記正義三十卷唐諸王侍讀張守節撰據此則索隱正義二書本各單行後人取而合之耳是書目録并以貞所補三皇本紀居卷一之首尤失其舊版係翻刻宋槧未為工整闕補卷五二十三三十卷九十二四六十卷九十七三二十史記六函册六十篇目同前此即前版而摹印在先較為清朗闕補集解序四卷六十七十六卷一百十八八史記六函四冊六十篇目同前缺集解序此書亦同前版內有安氏家藏印考常州志安國字民泰無錫人居積諸貨人棄我取贍宗黨惠鄉里乃至平海島濬白茅河皆有力焉父喪㑹葬者五千人嘗以活字銅版印吳中水利通志又目録後有表章經史之寶乃為木刻係别紙所印移黏於此此出書賈作僞之手不足登載闕補卷四二卷五三十五卷八三十之三十三卷十六三四五三十卷十八五十六七十一卷二十一十七卷三十五二卷九十二十八卷九十七九卷一百十二十六卷一百二十九四之八史記六函冊六十篇目同前缺索隱補史記正義三序此書目録後有大宋紹興五年王氏梅溪精舍鐫刻𨽻書木記乃割取别本以黏接者實與前三部同出一版錫山邵寶安國俱經收藏寶安國見前檇李郁氏無考史記六函冊六十篇目同前缺集解序此係宋印不全之本參入元刻以成完書雖所存者僅十之二三而宋槧面目猶未盡泯亦足為吉光片羽之珍也樂安沂水王應瑞二印無考闕補卷二十四五二十卷十一二卷二十二五卷四十四十二卷一百三一漢書八函冊八十漢班固撰唐顔師古注帝紀十二卷年表八卷志十卷列傳七十卷共一百卷前師古叙例目録後元孔文聲跋孔文聲跋云江東建康道肅政廉訪司以十七史書艱得善本從太平路學官之請遍牒九路令本路以西漢書率先俾諸路咸取而式之置局于尊經閣致工於武林三復對讀者耆儒姚和中輩十有五人重校修補者學正蔡泰亨版用二千七百七十五面工費具載學計兹不重出始大德乙巳仲夏六日終是嵗十有二月草四日太平路儒學教授曲阜孔又聲謹書跋後列承務郎太平路總管府判官劉遵督工江東建康道肅政廉訪副使伯都提調元史伯都今改正白巴圖幼頴異能不以家世自矜長嗜書史大德五年擢江東廉訪副使纍官至江南行臺御史大夫孔文聲劉遵蔡泰亨姚中和俱無考按元史百官志世祖至元二十八年改按察司曰肅政廉訪司後於每道置廉訪使二員副使二員今跋中所稱廉訪司未載其名不知誰氏又云遍牒九路元史地理志載江東建康道所𨽻者為寧國徽州饒州集慶太平池州信州廣德八路鉛山一州是鉛山無路之名而所云九路者豈以州為路亦可通稱耶其跋作於大德乙巳係元成宗大德九年考成宗本紀大德九年五月改各道肅政廉訪司為祥刑觀察使十月仍復舊名此書成於十二月稱廉訪司與本紀合當時以百卷之書仲夏開雕逮臘月而即蕆事計工不為不速獨惜其摹印草草較宋刋則逺甚矣唐太宗御撰帝紀十卷志二十卷列傳七十卷載記三十卷共一百三十卷後載唐處士何超音義楊齊宣音義序鼂公武郡齊讀書志曰晉書一百三十卷唐房喬等撰喬以宣武紀陸機王羲之傳論上所自為故曰制㫖又總稱御撰焉馬端臨文獻通考引夾漈鄭氏曰古者修書出於一人之手成於一家之學班馬之徒是也至唐始用衆手晉隋二書是矣然亦隨其學術所長者而授之如李淳風于志寧之徒則授之以志顔師古孔穎達之徒則授之以紀傳以顔孔博通今古于李明天文地理圖籍之學所以晉隋二志獨為詳明也此書版式尺寸與前所載史記相類其字畫紙墨亦同皆一時摹仿宋槧之本古史二函冊十二宋蘇轍撰本紀七卷世家十六卷列傳三十七卷共六十卷前自序後自志朱子古史餘論曰近世之言史者惟此書為近理其序言古帝王為善不為不善之意非近世論者所能及而論史遷以為淺近而不學疏略而輕信亦中其病又云蘇氏之學大抵橫邪曲直惟其意之所欲少公資稟靜厚故此書於一時正見頗明若長公之志林不逮逺矣陳振孫書録解題曰其書因馬遷之舊上觀詩書下考春秋及秦漢雜録為本紀世家列傳蓋漢世古文經未出戰國諸子各自著書或增損故事以自伸其說遷一切信之甚者或采世俗相傳之語以易古文舊說故為此史以正之云云馬端臨文獻通考載是書後有雁湖李氏跋今此本無之其非宋槧無疑卷七後别行刋左迪功郎衢州司戶參軍沈大廉同校勘卷十六後别行刋右修職郎衢州録事參軍蔡宙校勘兼監鏤版宙無考兩浙名賢録載沈大廉字元簡瑞安人宋建炎進士歷遷樞密院計議官紹興更化拜監察御史遇事敢言無所顧望給事中周葵中書舍人凌景夏相繼罷斥大廉俱力言之不報自以不得其言求外補時論翕然重之闕補卷十八二十九之三十九卷二十十八卷二十一三卷三十六三卷三十七一卷四十四卷四十一二四卷四十九十卷五十九六卷六十三之五資治通鑑二十八函冊二百八十宋司馬光撰二百九十四卷胡三省音注前三省序後光進表神宗奬諭詔書并尚書省奉㫖下杭州鏤版札子校定刋進諸臣銜名又附三省釋文辨誤十二卷并跋鼂公武郡齊讀書志曰司馬溫公自謂精力盡於此書神宗賜名資治通鑑御製序以冠其首云云今此書不載神宗序三省序稱史漢自服䖍應劭至三劉注解多矣章懷注范史裴松之注陳夀史雖間有音釋其實廣異聞補未備以示博悉疏其所以然若釋文之舛謬悉改而正之著辨誤十二卷云云是三省此序係専為音注而作故釋文别有跋也通鑑後列光進表并詔書札子及諸銜名蓋存杭州初刻之舊其釋文辨誤之作以史照本公休本費氏龍爪通鑑皆訛謬相傳公休本刻于海陵亦非公休所作不可不辨故名之曰辨誤考台州府志三省字身之寧海人寶祐間進士終朝奉郎因資治通鑑音義釋文各本乖異刋正為廣注九十七卷著論十卷以薦參賈似道軍言輒不用歸而遇亂失前書復購他本為之注始以考異及所著者散入通鑑各文之下别注辨誤十二卷又有行素稿一百卷按宋史賈似道以德祐元年乙亥免官今書中三省之序作於乙酉年蓋元世祖至元二十二年其跋作于丁亥則二十四年也祕閣之印無考闕補序文三卷十二六四十一十卷十四二十卷十五十卷五十三二十四卷六十四五六卷六十七十二二十一二十二卷六十八三十三卷七十一三卷七十二十七十八卷七十六十九卷八十五九卷一百二二十四卷一百二十五四之十八卷一百四十九十九卷一百七十六十八卷一百八十二卷一百八十四二十二卷一百九十二十八卷二百八三十一卷二百十十五十六卷二百十四十五十八卷二百十八二十五卷二百二十一三十三三十四卷二百二十二二十一二十二卷二百三十一一卷二百四十四二十四卷二百四十八五卷二百五十八十一十二卷二百六十五九卷二百七十四五卷二百八十二十七二十八卷二百八十三二十五卷二百九十三十四卷二百九十四三十二資治通鑑二十函十冊一百六篇目同前有元王磐序此書即前版而字畫清朗紙質亦較明淨蓋摹印稍先也書首多王磐一序考元史王磐字文炳廣平永年人至大四年擢經義進士第纍官翰林學士遷太常少卿以年老屢乞骸骨進資德大夫致仕年九十二卒贈瑞貞雅亮佐治功臣太傅開府儀同三司追封洛國公諡文忠其序稱朝廷於京師創立興文署署置令丞并校理四員厚給祿廩召集良工剡刻諸經子史版本流布天下以資治通鑑為起端之首可為識時事之緩急而審適用之先務云云按元史載世祖至元二十七年正月立興文署掌經籍版磐序所言與史吻合則知此書乃元時官刻本也武陵顧從德藏本從德見前闕補卷二百二十九二十五二七卷二百四十二二十七二十八卷二百四十六十二卷二百八十一三十七資治通鑑綱目三函冊十八宋朱子撰五十九卷元王幼學撰集覽前載朱子及幼學序例各一篇朱子資治通鑑綱目宋時廬陵刋本已載前矣此為幼學作集覽既成刻梓以行於世者序例後有嵗在上章敦牂孟夏魏氏仁實書堂新刋分書木記魏仁實應是當時書賈姓字幼學序稱編始於大德己亥迄於延祐戊午積二十年七易稿而編甫成以其薈萃叢集頗可省覽因題之曰通鑑綱目集覽云云是幼學之作是書用心良苦考安慶府志幼學字行卿望江人博覽經史宗程朱之學至元間躬耕慈湖之坂與學者講道不輟時稱為慈湖先生明厲文暉藏本凌迪知萬姓統譜載文暉名升無錫人性狷介與人不苟合以嵗貢入胄監授浙江青田知縣持公秉廉孜孜愛民去二十年邑人猶懷慕其德立生祠祀之本朝泰興季氏亦經收藏資治通鑑綱目六函九冊五十宋朱子撰五十九卷前自序是書綱目並列係照宋廬陵本刋梓然版之尺寸較縮字畫紙墨亦逺不相及此宋槧所為可寶也明顧仁效藏本考王鏊震澤集有陽山草堂記云顧仁效結廬陽山之下棄去舉子業獨好吟咏兼工繪事坐對陽山拄頰搜句日不厭或起作山水人物悠然自得人無知者本朝泰興季氏亦經收藏餘印無考闕補卷四之卷七全卷五十九三十四三十五資治通鑑綱目六函冊六十篇目同前此書與第一部同版而墨色少差橅印在其後也施愈收藏印記無考通鑑總類四函冊四十宋沈樞撰二十卷前樓鑰序安吉州志沈樞字持要舉進士調彭澤丞用葉義問薦賜對首論君子小人之辨高宗嘉之除監察御史坐不附楊邦彥獲譴端州尋起溫州終太子詹事諡憲敏樓鑰序稱故詹事光祿沈憲敏公取司馬公所著各以事類編之為二百七十一門首曰治世曰知人終曰辨士曰烈婦公之季子欲鋟版以廣其傳俾鑰序之鑰晚出試郡永嘉實守蕭規以自免於戾荷公忘年定交又與公之子游為書卷首云云按宋史樓鑰傳於孝宗淳熙間出知溫州以樞起官時考之正不相逺其序作於寧宗嘉定元年距官永嘉之日已二十餘載是在樞既殁之後也明文徴明文伯仁王寵藏本有玉蘭堂五峯樵客王履吉諸印皆見前本朝季振宜亦經收藏其用宋本印蓋因樓鑰序中有公之季子守潮陽欲鋟版以廣其傳之語然書之字體結搆與宋槧本不同且印工墨色亦缺精朗其為優絀固不能自掩耳餘印俱無考闕補卷一五十一卷三四十四十七史詳節十二函冊九十六宋吕祖謙撰二百七十三卷宋史藝文志載吕祖謙大事記二十七卷宋通鑑節五卷通鑑節要二十四卷又祖謙傳大事記之外載讀詩記考定古周易書說閫範官針辨志録歐陽公本末諸書皆不及十七史詳節宋鼂氏陳氏馬氏書目亦均不録惟明焦竑經籍志有吕祖謙十七史詳節二百八十三卷較此本又多十卷今觀書中標題或稱東萊先生增入或稱東萊校正而兩漢書及新唐書則標為諸儒校正體不畫一是此書即為東萊所作亦屬未完之本其版仿宋巾箱本式而刻印草草似是書賈所為故前後俱無序跋不知焦竑何所據也明周伯器藏本考嘉興府志伯器名鼎嘉善人正統中官沐陽典史有桐村疑舫齊土苴集餘印無考闕補史記卷八九卷九六八西漢書卷二十十二十四卷二十一十三十五卷二十三十六卷二十五十九十七史纂古今通要一函六冊前集十七卷元胡一桂撰子昌祖校正音注後集三卷元董鼎撰前集載元汪良臣序一桂自序並歷代帝王國都疆理統系傳授三圖一桂見前此書始三皇終五代未載宋金之事董鼎因續纂以成之其大㫖皆本朱子綱目而間採先儒論斷附以已意考江西志董鼎字季亨饒州德興人自幼力學受業於黃幹得其端緒嘗著書傳纂疏以行于世汪良臣無考其序後結銜為承務郎江南行臺監察御史明張南伯藏本南伯吳人金賚畫史㑹要南伯工墨梅唐國史補一函一冊唐李肇撰分上中下三卷前肇自序鼂公武郡齊讀書志曰唐李肇撰國史補起開元止長慶間事初劉餗記元魏迄唐開元事名曰國朝傳記故肇續之考崇文總目於肇國史補外又載林恩補國史六卷高若拙後史補三卷而鼂氏讀書志中皆不載是當時所重者惟肇所補之書此本密行小字製甚工整雖墨光稍遜而刋手印工咸出上選目録後有董氏萬卷堂本篆書木記較元槧他書木記獨精此書賈中不苟於刻梓者御題是書採托開元至長慶故事以補國史之遺凡三百有六節軼事方言頗資觀覽其間采取各條亦間有載入正史者是序文所云慮正史之或闕非盡闕也其字跡刻畫精能當推為元本之冠乾隆御識鈐寶二曰幾暇臨池曰稽古右文之璽錢謙益藏本有牧翁䝉叟如來真子天子門生二印唐杜佑撰二百卷前唐李翰序佑自序鼂公武郡齊讀書志曰唐宰相杜佑撰先是劉秩采經史自黃帝迄天寶末制度沿革倣周禮六官法為政典三十五篇佑以為未盡因廣之參以新禮為二百篇德宗時上之考唐書杜佑字君卿京兆萬年人以䕃補濟南參軍事纍官至同中書門下平章事拜司徒封岐國公卒贈太傅諡曰安簡李翰趙州贊皇人擢進士第調衛尉張巡死節媢其功者以為降賊肅宗未及知翰傳巡功狀表上之帝由是感悟纍遷翰官至左補闕翰林學士以病免此書係仿宋刋亦頗得其形似而紙質墨香則遜矣收藏諸印無考內京口某氏收藏一印嵗久紙蝕並闕其姓闕補卷三十三九卷四十一十四卷五十三九卷五十四七卷九十三七卷一百四十二九卷一百四十六八卷一百六十九卷一百七十二三卷一百九十一二卷一百九十四六卷一百九十八六通志二十函二百冊宋鄭樵撰二百卷前樵自序元吳繹序並進書疏馬端臨文獻通考云按此書刋本元無卷數止是逐略分為一二耳中興四朝藝文志别史類載通志二百卷其後叙述云中興初鄭樵采歷代史及他書自三皇迄隋為書曰通志倣遷固為記傳而改表為譜志為略則其為書似是節抄刪正歷代之正史如髙峻之小史蘇轍之古史而非此二十略之書也但二十略序文後言於紀傳即其舊文從而損益制誥書疏置之别録唐書五代史本朝大臣所修非微臣敢議故紀傳及隋若禮樂刑政務存因革故引而至唐云則亦略言其作書之意豈彼二百卷者自為一書亦名之曰通志而於此序附言其意耶或併二十略共為一書耶云云今以歷代刋本通志考之係併二十略為一書共成二百卷並非别有所謂通志者端臨所見刋本蓋僅有二十略耳是書吳繹序作於元英宗至治二年繹元史無傳其結銜為福州路總管考江西志吳繹字思可信都人泰定間曽守吉州序稱是集梓於三山郡庠北方學者猶未之見乃募僚屬捐已俸摹印五十部散之江北諸郡云云疏後别行載至治三年九月印造則知此本亦非吳繹所刋當屬元初開雕於閩中者也闕補卷五上二十一四十七卷五下三十二卷六下二十七卷七六十四卷十上七十九卷十五下三十九卷六十三三十八卷六十五二十六卷六十七五十一五十七卷六十八三十三三十四卷六十九五十二卷七十七七十四卷八十一三十六卷八十二十三卷八十三三十一十三十二九二卷八十五八十一八十二卷八十八四十三卷九十二二四卷一百三十六卷一百三六十一卷一百五三十三四十二卷一百七七十一七十二卷一八五十六四九卷一百十九四三十三二三十五九四十五十六十七十五七十六卷一百十一下一百二卷一百十五五十九卷一百十八十三二四十一四十卷一百二十七六十四卷一百三十三四十八卷一百三十四二十三卷一百三十五十三卷一百三十八五十四卷一百四十五十一卷一百四十六十八六五十卷一百四十七九三六十卷一百五十一七十五卷一百五十三八卷一百五十五十二卷一百五十六二十三二十四卷一百五十七七十五卷一百六十二十六卷一百六十五十七卷一百七十三二卷一百七十七三十五卷一百八十三六十六卷一百八十七三十九卷一百九十二五十二卷一百九十五三十通志三十二函冊三百二十篇目同前前樵自序此書即前版而闕吳繹之序與疏或是書賈去之以僞充宋槧也闕補目録一百十一卷六上八十三八十四卷七七十四卷十上六卷十下六十五六十六卷十八三十一三十二卷二十三十六卷四十三十二卷四十二三十九卷六十七五十一五十七卷六十八三十三三十四卷七十二二十三二十四卷七十九十五卷九十三八十一八十二卷一百七七十一七十二卷一百八五十六三五三十四卷一百十九十十三三三十四七十六七十五卷一百十五下五十五卷一百十八八十三二九十五一百十卷一百二十九七十卷一百三十三四十九卷一百四十六三十一三十二卷一百四十七六十三卷一百五十一卷一百五十六二十三十四二卷一百六十二三十三三十四卷一百八十六四十八卷一百八十七八十卷一百九十五三十卷一百九十六九十六通志十二函十冊一百二篇目同前前樵自序元吳繹序此書有繹序而闕其疏字畫較前二部清朗印工差善闕補吳繹序一目録一百十一卷十九一之八卷二十五十卷五十四二十六卷七十三七十卷八十三十四卷九十一二十六卷一百十四三十二卷一百十五上四十七之五十三卷一百二十五三十五三十六卷一百二十九九十卷一百四十七六十三卷一百六十八十三卷一百九十一四卷一百九十三四十一卷一百九十五六十一宋名臣言行録十函冊六十前集十卷後集十四卷宋朱子撰李衡校正前朱子自序李居安序續集八卷别集十三卷别集下十三卷外録十七卷宋李幼武撰趙崇硂序外録前有道統𫝊授圖并程頤司馬光尹焞楊時李侗朱子張栻吕祖謙諸像陳振孫書録解題載八朝名臣言行録二十四卷稱朱子以近代文集及傳記載本朝名臣言行撮取其要輯為此書前五朝五十五人後三朝四十二人云云按前集始趙普終蘇洵自太祖以至英宗固為五朝矣而後集始韓琦終陳師道由仁宗以至徽宗亦五朝合兩集而名為八朝則可如専指後集為三朝則不可也故李幼武於後集亦標五朝而其所纂續集别集外録則標皇朝以别之幼武此書宋人諸書目中皆不採入惟明焦竑經籍志載朱子宋名臣言行録七十五卷與是書卷數相符即係幼武合輯之本竑不標五朝而統之以宋是矣然以七十五卷盡屬於朱子又何其漫不加考耶幼武所纂續集别集及别集下皆載名臣而外録則専為道學統宗而設考宋史宗室世系表崇硂為太宗長子漢王元佐九世孫序稱外孫李士英頃以八朝名臣言行録鋟梓又於中興四朝諸名臣搜閲行事集為全編云云士英乃幼武字而宋史無幼武𫝊其爵里俱不可考序朱子名臣言行録之李居安江西志載為廬陵人登寶慶二年丙戌進士其校正之李衡宋史載為江都人字彥平登進士第由吳江主簿歷官祕閣修撰致仕定居崑山結茅别墅杖屨徜徉聚書萬卷號曰樂菴幼武編輯既成曽自刻梓而此本字畫不勻紙墨粗黝係元時翻刻非宋槧也明焦竑藏本有弱侯印見前餘印無考闕補後集卷十三十四十一十卷十四一六三别集卷七一别集下卷一一外録卷十二二十六二十七五朝名臣言行録一函二冊前集十卷後集十四卷宋朱子撰李衡校正前朱子自序李居安序此朱子所輯前後集單行之本振孫所指即為是書獨惜非宋槧耳闕補後集卷四六自警編二函十冊宋趙善璙撰不分卷前善璙自序歙縣志趙善璙字德純宗室趙不俄兄不佊之子登嘉定進士第嘗謂縉紳不明大法九章無以斷疑未幾中法科除大理評事後通判廣德軍有政聲召為尚書郎著自警編行世善璙序作於寧宗嘉定十七年其書皆輯宋名臣言行分類紀之首以事君終言操守序稱越三年而後成編亦深於克治者矣書中字體規仿顔栁刻工未始不善而墨黯紙粗決非宋本徐元明俞立初收藏二印無考闕補序文一首冊七山海經一函四冊十八卷前漢劉秀進書表晉郭璞序鼂公武郡齊讀書志曰劉秀表言禹别九州而益等類物善惡著此書皆聖賢之遺事古文明著者也大父嘗考之於書有曰長沙零陵雁門皆郡縣名又自載禹鯀似後人因其名參益之陳振孫書録解題曰漢侍中奉車都尉臣秀所校祕書秀即劉歆也世傳禹益所作其事見吳越春秋恢誕不典司馬遷曰言九州山川尚書近之矣至禹本紀山海經所書怪物余不敢言之也可謂名言然古今相傳既久始以冠地理書之録此本字仿歐體用筆整嚴刻手雖未能盡得其妙而摹印清朗在元刻中洵為善本御題山海經一書流傳最古而近世無善本是本筆法刻書清峭當為元版之佳者明吳郡黃氏省曽曽合刋水經山經為上下集其字跡仿佛相同蓋以是刻為藍本也乾隆御識鈐寶二曰稽古右文之璽曰乾隆宸翰本朝檇李曹溶藏本考嘉興府志曹溶字潔躬號秋嶽秀水人崇禎丁丑進士官御史本朝順治間歷副都御史户部侍郎出為廣東布政使左遷山西陽和道杜元夫印無考闕補卷一七博古圖四函冊二十宋徽宗御撰三十卷陳振孫書録解題曰宣和殿所藏古器物圖其形象而記其名物録其款識品有總說以舉其凡而物物考訂則其目詳焉此書係仿宣和舊刻前後序跋俱無惟每卷首行標題冠以至大重修四字按至大為元武宗年號書中字體圖式規模略具而不能工整非元刻之佳本也達觀樓收藏印無考闕補卷一四十二卷二十三卷六四卷七五十六三四三十六卷十二三十二卷十九九卷二十八一二卷二十九二十三卷三十六十二十四二五博古圖四函冊三十篇目同前此書與前版同紙色較潔而質之勻緻亦過之闕補卷十六二十九卷二十三三十六卷二十五十五卷二十九十四博古圖六函冊三十篇目同前此書規仿舊刻縮其方幅前後無序跋而每卷首行標以博古圖録考正則必有其人因取是刻他本校之前有遂州鄭朴序卷一總說後有朴題跋稱宣和博古圖録一書舊刻卷帙頗大雖庋置無妨而囊攜稱苦豫始改冊減圖凡摹式花紋款識銘籀則不敢遺舊刻錙黍也至若名物之稍乖器目之不協字釋之或訛剝泐之或缺具參核元本多方訂正或可以祕蔡帳而內巾箱乎云云此本卷一總說後尚有别紙接補之痕可知為後人割去第朴序自紀年月為宣和五年十月朔而序首乃云粵稽趙宋時維宣和且中多詆毁徽宗之語考徽宗本紀以宣和七年傳位欽宗豈有以當時臣民敢肆然詆毁其君而並付之剞劂者况其序若作於宣和又何以粵稽時維作追述之語乎歷考宋元以來正史并各載記之書皆無所謂鄭朴者似是朴有此書刻之者欲僞充宋本妄於序中題以宣和年月而獲此本者閲序中所言亦知朴非宣和時人又割去以為僞充之地耳朴無可考姑附於元版博古圖後以俟參訂元趙孟俯鮮于樞明都穆吳寬文嘉俱經收藏孟俯樞寬俱見前考蘇州府志都穆字元敬吳縣人𢎞治己未進士歷禮部主客郎中加太僕少卿七嵗能詩及長泛濫羣籍奉使至秦中搜訪金石遺文作金薤琳琅録文嘉字休承徴明次子以貢為湖州廣文善書畫餘印無考闕補卷十二卷二十一欽定天祿琳琅書目卷五

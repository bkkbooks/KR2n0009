  text: 欽定四庫全書欽定天祿琳琅書目卷四
  hash: sha256:b042de2e412475dfa70f98b74cb7fd2f7cceee3560d30dff6068900151e43460
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2n0009_WYG_004-1a, image: WYG0675/WYG0675-0409a.png}
body:
  text: 影宋鈔經部周易輯聞一函六册宋趙汝梅撰六卷前汝梅自序考鏤版書籍始於周顯德間或據栁玭之言以為唐已有之而刋行大備要自宋始其時監中官刻與士大夫家孰付梓者校讎鐫鏤講究日精宇內流傳罔不珍祕及時代既更漸至散佚明之琴川毛晉藏書富有所貯宋本最多其有世所罕見而藏諸他氏不能購得者則選善手以佳紙墨影鈔之與刋本無異名曰影宋鈔於是一時好事家皆爭仿效以資鑒賞而宋槧之無存者賴以傳之不朽是書汝梅自敘稱先君子於易凡六稿汝梅得於口授者居多因輯所聞於篇云云考宋史汝梅父名善湘濮安懿王五世孫慶元二年舉進士纍官至觀文殿學士所著有周易約説或問指要補過諸書汝梅其季子也御題廣大無不備夫惟易道然輯聞傳汴水述學衍先天觀彼多合聖切豫斯體乾影鈔猶識宋逺矣緬韋編乾隆甲午仲冬御筆鈐寶二曰得象外意曰乾隆宸翰復齋易説一函二册宋趙彥肅撰六卷前載彥肅行實後宋喻仲可許興裔二跋彥肅字子欽宋孝宗乾道間進士仕至寧海郡節度推官朱彞尊經義考載朱子語曰子欽易説為説太精取義太密或傷簡易之趣書後彥肅門人喻仲可跋云公卒後二十有六年郡太守許公取是書刋焉又許興裔跋云余假守嚴陵屬喻君校勘刋置公之祠堂與志學者共之跋後紀年為嘉定辛巳按辛巳係宋寧宗嘉定十四年仲可興裔俱無考當時校刋既成其版入祠堂中或流傳不廣世罕其書幸有影鈔而善本亦可長存矣童溪易傳二函册十二宋王宗傳撰三十卷前宗傳自序宋林焞序此書與前兩部字體相似行欵亦同當屬一家影鈔之書故紙墨皆極精良足供寶玩宗傳焞宋史俱無傳按朱彝尊經義考載董真卿曰宗傳字景孟臨安人太學上舍又載閩書宗傳寧德人教授韶州彝尊按云林焞亦寧德人淳熙八年與宗傳同舉進士焞序稱與童溪生同方學同學同及辛丑第則宗傳為寧德人無疑鄱陽董氏以為臨安人誤矣爰附録之以資考證三禮圖二函八册宋聶崇義集注二十卷前宋竇儼序後宋陳伯廣跋崇文總目三禮圖二十卷聶崇義於周顯德中參定郊廟器玉因博采先儒三禮舊圖凡得六本考正是否繢素而申釋之每篇自敘其凡參以近世沿革之説建隆二年五月丙寅表上之竇儼為序詔太子詹事尹拙集儒學三五人更同參議拙多所駁正崇義復引經以釋之其駁義及答義各四卷率列於注釋詔頒行之又畫於國子監講堂之壁考宋史崇義河南洛陽人少舉三禮善禮學通經旨漢乾祐中纍官至國子禮記博士周顯德中國子司業兼太常博士世宗詔崇義參定郊廟祭玉又詔翰林學士竇儼統領之崇義因取三禮圖再加考正建隆三年四月表上之儼為序太祖覽而嘉之五月賜崇義紫袍犀帶銀器繒帛以奬之云云與崇文總目所載略符惟崇文總目稱建隆二年五月上書鼂公武郡齋讀書志亦稱皇朝建隆二年而史載三年正與儼序合别本有崇義自序略云舊圖十卷形制闕漏文字省略不知所自臣崇義先於顯德三年冬奉命差定郊廟器玉因敢刪改至大宋建隆二年四月辛丑第敘既訖則知崇義書成於建隆二年至三年始行奏進耳宋史又載詔太子詹事尹拙等參議多所駁正崇義復引經以釋之悉以下工部尚書竇儀俾之裁定儀奏崇義研求師説耽味禮經較於舊圖良有新意尹拙爰承制旨能整所聞尹拙駁議及聶崇義答義各四卷臣再加詳閲隨而裁置率用增損列於注釋共分為十五卷以聞詔頒行之亦與崇文總目所載相合惟列於注釋之語乃竇儀編次兩家之説别為一書與三禮圖無涉耳書後有永嘉陳伯廣跋稱三禮圖始熊君子復得蜀本欲以刻于學而豫至因屬豫刻之後題淳熙乙未閏月三日乙未為宋孝宗淳熙二年浙江通志載伯廣登紹興三十年庚辰進士通判明州其所稱熊子復按文獻通考熊克字子復建安人官起居郎以王丞相季海薦驟用王時在樞府趙溫叔當國莫知其所從來頗疑其由徑沮之上意向之不能回也此書圖畫人物器具用筆工細乃精於繪事者所作知影鈔時殊費經營矣論語集説一函五册宋蔡節撰十卷前載節進書表並集説例宋薑文龍序考浙江通志載蔡節永嘉人於宋理宗時厯知湖州明州衢州諸軍薑文龍麗水人登理宗淳祐元年辛丑進士是書於淳祐五年經進節表後結銜為朝散郎試太府卿兼樞密副都承旨薑文龍序作於淳祐六年云刋是書於湖頖自署為文學掾皆省志所未載影鈔字畫通體勻整其摹薑序行書學黃庭堅筆法尤得神理張狀元孟子傳一函八册宋張九成撰二十九卷考宋史藝文志載九成孟子拾遺一卷語録十四卷而不及此書馬端臨文獻通考亦未載按本傳九成字子韶錢塘人髙宗紹興二年上將䇿進士詔考官直言者置髙等九成對策稱旨擢置首選授鎮東軍簽判纍官至宗正少卿權禮部侍郎兼侍講兼權刑部侍郎坐傾附趙鼎落職秦檜復令司諫詹大方論其謗訕朝政謫居南安軍在南安十四年每執書就明倚立庭磚歲久雙趺隱然檜死起知溫州旋丏祠歸數月卒理宗寶慶初特贈太師封崇國公諡文忠此書標為張狀元孟子傳次行所列之銜係追贈爵秩則是寶慶後校刋之本卷帙終于告子而闕盡心全篇按宋史藝文志載張氏孟子傳三十六卷趙希辨郡齋讀書附志作孟子解三十六卷亦即是書此本蓋佚其七卷耳明焦竑國史經籍志載九成孟子解僅十四卷是前明內府所藏并佚其大半此雖未為全書而已為竑所未見且影鈔字法紙墨皆極精良其所得有二十九卷亦可謂是書之幸矣琴川毛氏鈔本闕補卷四二卷八六卷十七之九卷十六七新集古文四聲韻一函五册宋夏竦撰五卷前竦進書序並古文所出書傳鼂公武郡齋讀書志曰古文四聲五卷夏竦撰博採古文竒字分四聲編次以便撿尋考宋史夏竦字子喬江州德安人以父承皓死難録竦為潤州丹陽縣主簿繼舉賢良方正擢光祿寺丞仁宗寶元間以户部尚書拜奉寧軍節度使知永興軍繼兼陜西經略安撫招討進宣徽南院使與陳執中論兵事不合徙屯鄜州請解兵柄改判河中府徙蔡州慶厯三年召為樞密使諫官御史交章論奏詔徙知亳州改授吏部尚書歲中加資政殿學士明年拜同中書門下平章事又明年召入為宰相諫官御史復言不可遂改樞密使封英國公翰林學士張方平論竦姦邪宜出之罷知河南府未幾加兼侍中徙武寧軍節度使進鄭國公以病歸卒諡文莊書中竦進書序稱慶厯四年二月結銜為吏部尚書知亳州軍州事證之史傳適相符合史又謂竦以文學起家有名一時朝廷大典䇿纍以屬之多識古文學竒字至夜以指畫膚是竦於大小篆功力獨深此本影鈔楷法皆本歐陽篆文從者如懸衡者如編頗得蔡雍書勢之妙洵可寶也宋張時舉弟子職等五書一函一册宋張時舉輯首周管子弟子職次漢班昭女誡次宋吕大鈞吕氏鄉約鄉儀宋司馬光居家雜儀凡五篇宋陳振孫書録解題曰弟子職等五書一卷漳州教授張時舉撰時舉宋史無傳其里居不可考按此五篇中吕氏鄉約書末稱汲郡吕大忠白後附載吕大鈞手札三通有朱子識語云此篇舊傳吕公進伯所作今乃載於其弟和叔文集又有問答諸書如此知其為和叔所定不疑篇末著進伯名意以其族黨之長而推之使主斯約耳又鄉儀後亦有朱子識語云此篇舊題蘇氏鄉儀意其為蘇昞季明博士兄弟所作今按吕叔和文集乃季明所序而此篇在焉然則乃吕氏書也因去篇題二字而記其實如此考宋史大忠字進伯京兆藍田人登第厯官寶文閣直學士知渭州忤章惇曽布徙知同州降待制致仕其弟大鈞字和叔中乙科厯官宣義郎鄜延轉運司從事蘇昞字季明武功人元祐中太常博士此書字法歐體工整清徑影鈔能得其神洵為佳本琴川毛氏鈔本影宋鈔史部集補後漢書年表一函四册宋熊方撰十卷前方進書序表狀三篇明盧廷選南昌府志熊方字廣居豐城人靖康鄉舉貢上庠參澧州軍事雅善書髙宗內禪大書堯舜二字表進有旨付祕閣除本路帥幕此書序表卷首結銜右迪功郎前權澧州司户參軍與志所載吻合書中雖未紀進御年月當亦在髙宗之時後漢書無年表得方輯之以補范曄劉昭之闕亦藝林盛事第宋史藝文志及馬端臨文獻通考皆不載是書觀方進狀中有昨嘗投進未蒙指揮之語豈當時經進再三而終無明詔許可耶宜其此書刋行流傳絶鮮是不能不有賴於影鈔矣續資治通鑑長編十函册五十宋李燾撰一百八卷前燾進書表馬端臨文獻通考載燾撰續通鑑長編其奏進凡四次宋孝宗隆興元年燾知榮州時所進者起建隆迄開寶為十有七卷乾道四年官禮部侍郎時所進者起建隆迄治平為一百八卷淳熙元年知瀘州時所進者輯治平之後至中興以前六十年事年為一卷合前所進一百八卷為一百六十八卷又於卷中字數之繁略再均分之總為二百八十卷淳熙九年燾知遂寧府時又上言臣纍次進所為續資治通鑑長編今重别寫進共九百八十卷計六百四册其修撰事總為目一十卷又緣一百六十八年之事分散為九百八十卷其間文字繁多本末頗難立見略存梗槩庶易檢尋今創為建隆至靖康舉要六十八卷并卷總目共五卷以上四種通計一千六十三卷六百八十七册投進者云云是續資治通鑑長編以九百八十卷者為全本其舉要之六十八卷則自别為一書此本為一百八卷蓋燾第二次所進之書也考宋史李燾字仁甫眉州丹稜人紹興八年擢進士第纍官至敷文閣學士提舉佑神觀兼侍講年七十卒諡文簡纍贈太師溫國公生平恥讀王氏書獨博極載籍搜羅百氏慨然以史自任本朝典故尤悉力研核上嘗謂長編一書無愧司馬遷其殁也復謂宇文價曰朕曽許燾大書續資治通鑑長編七字且用神宗賜司馬光故事為序冠篇不謂其止此是孝宗之心許長編亦已至矣獨惜其卷帙浩繁購藏匪易不惟九百八十卷者世所罕存即此一百八卷之本亦復希有影鈔以傳誠深於好古者矣泰興季振宜鈔本闕補卷十三六九域志一函十册宋王存曽肇李德芻同撰十卷前王存等進書狀鼂公武郡齋讀書志曰皇朝王存被旨刪定總二十三路京府四次府十州二百四十二軍三十七監四縣一千一百三十五陳振孫書録解題曰存與曽肇李德芻等共刪定名元豐九域志書首王存等進書狀稱本朝九域圖自天禧以後歷年兹多事有因革乃詔臣肇臣德芻撰次於祕閣而臣存實董其事綴輯大體略仿前書舊名圖而無繪事乃請改曰志云云按天禧為宋真宗年號狀後雖無紀年而振孫謂名為元豐九域志元豐為神宗年號距天禧時已六十餘載故狀中有厯年兹多之語也考宋史德芻無傳存字正仲潤州丹陽人登慶厯六年進士第纍官至資政殿學士厯知揚州大名府杭州提舉崇禧觀遷右正議大夫致仕肇字子開建昌南豐人舉進士纍官龍圖閣學士提舉中太乙宫出知揚定等州終濮州團練副使是書影鈔紙墨精潔字畫整嚴固非率爾操觚者琴川毛氏鈔本清波雜志一函二册宋周輝撰十二卷前宋張貴謨序後宋章斯中張欣陳晦楊寅張巖龔頤正徐似道七跋考兩浙名賢録周輝字昭禮淮海人紹熙間居錢塘清波門之南嗜學工文藏書萬卷隱居不仕當世名公卿多折節下之而簡亢自髙未嘗報謝撰清波雜志十二卷是書張貴謨序作於紹熙癸丑按癸丑為宋光宗紹熙四年書後章斯中張欣陳晦三跋皆是年作其楊寅張巖二跋作於寧宗慶元二年龔頤正徐似道二跋作於慶元三年考宋史張巖字肖翁揚州人登乾道五年進士第纍官至知樞密院事督視江淮軍馬繼以銀青光祿大夫致仕餘俱無傳浙江通志載張貴謨遂昌人乾道二年丙戌進士官至朝議大夫長興縣志載陳晦字自明中童子科又中博學宏詞科仕至刑部侍郎兼中書舍人有文集三十卷凌迪知萬姓統譜載龔頤正楚人寧宗嘉泰元年以學問該博賜同進士出身官至祕書丞徐似道字淵子天台人少負才名為吳江尉受知范成大官至祕書監少監斯中欣寅無考似道跋最後作有余來中都聞周處士清波志急祈借傳録云云是當時此書已徵紙貴今得影鈔真堪什襲矣御題逸史犁然志紹熙久無傳本此稱竒唐鈎晉迹隔一間明影宋刋非兩岐世道人心斯繫矣南遷北伐早卑之清波門外西湖水洗盡當年諛墓辭乾隆甲午冬御筆鈐寶二曰所寶惟賢曰乾隆御筆影宋鈔子部孔子家語一函三册魏王肅注十卷前肅序漢書藝文志載家語二十七卷顔師古曰非今所有家語也唐書藝文志載王肅注家語則為十卷宋陳振孫書録解題亦云家語十卷孔子二十二世孫猛所傳魏散騎常侍王肅為之注肅闢鄭學猛嘗受學於肅肅從猛得此書與肅所論多合從而證之遂行於世明何孟春補注家語前載漢博士孔衍上言臣祖故臨淮太守安國撰次孔子家語既畢會值巫蠱事起遂廢不行近世小儒以曲禮不足而乃取孔子家語雜亂者及子思孟軻荀卿之書以禆益之總名曰禮記今見其在禮記者則便除家語之本篇是謂滅其原而存其末也不亦難乎云云孟春序曰如孔衍言則壁藏之餘實孔安國為之而王肅序未始及焉不知何謂班史所志大都劉向校録已定之書肅之所注非安國之所撰次及向之所校者明矣肅之注愚不獲見而見其序今世相傳家語殆非肅本非師古所謂今之所有者司馬貞與師古乃同代人貞作史記索隱引及家語今本或有或無有亦不同愚有以知其非肅之全書矣謹即他書有明著家語而今本缺略者以補綴之分四十四篇為八卷存之私孰以俟博雅君子或得肅舊本而是正焉是豈獨春之幸哉按春序作於明武宗正德二年其時欲求宋刋舊本已不可得今以是書考之係為十卷與唐書所載陳振孫所言俱相吻合且較之孟春刋本篇中或有多十之三四并十之六七者則為肅舊本無疑影鈔之為功詎淺鮮哉御題天祿青藜信也非何於家語却相違祖傳孫辨名因正明影宋刋世已稀多漏鮮全斯乃萃鈎元提要志焉希愀然敬對君為政一語興邦凛敕幾乾隆甲午仲秋月御筆鈐乾隆雙璽彭城錢孫保鈔本孫保無考新儀象法要一函一册宋蘇頌撰三卷前頌進書狀陳振孫書録解題載蘇頌於哲宗元祐三年新造渾天成記其法要而圖其形象進之考宋史蘇頌字子容丹陽人第進士厯官吏部侍郎元祐初遷吏部尚書七年拜右僕射兼中書門下侍郎紹聖四年以太子少師致仕稱其總吏部時請别製渾儀以吏部令史韓公亷曉算術奏用之授以古法為臺三層上設渾儀中設渾象下設司晨貫以一機激水轉輪不假人力時至刻臨測司晨出告星辰躔度所次占候則驗不差晷刻書夜晦明皆可推見云云今以頌進狀年月并狀後結銜與史傳較之皆合書中為圖六十有一畫極工細字亦精整可寶也御題梁代渾儀已制之失傳蘇頌乃重為有經有緯述前驗具説具圖期後垂亦曰用心究鉤股即看影槧悉毫釐大成圓象精錙黍皇祖鴻貽萬世規乾隆乙未孟春上浣御筆鈐乾隆雙璽虞山錢遵王述古堂藏書每葉邊闌外左方按遵王名曽常熟人考古圖一函六册宋吕大臨撰十卷後大臨自記又附續考古圖五卷考古圖釋文一卷鼂公武郡齋讀書志曰皇朝吕大臨與叔裒諸家所藏三代秦漢尊彞鼎敦之屬繪之於幅而辨論形制文字馬端臨文獻通考引陳振孫曰考古圖十卷吕大臨作於元祐七年所紀自御府之外凡三十六家所藏古器物皆圖而録之考宋史大臨字與叔學於程頤與謝良佐遊酢楊時在程門號四先生通六經尤邃於禮元祐中為太學博士遷祕書省正字范祖禹薦之未及用而卒大臨記稱余於士大夫之家所閲多矣每得傳摹圖寫寖盈卷軸尚病欵識未能深考暇日論次成書云云是大臨所撰之書止於十卷鼂公武陳振孫所見皆此本也今書後有續考古圖五卷釋文一卷不載纂人姓氏宋史藝文志及玉海文獻通考諸書亦未之及書中往往引考古圖以為證稱之曰吕與叔則非大臨自為續纂之書明矣其體例皆仿前書所收古器頗多亦好古之士卷一首列玉尺云周尺漢尺晉尺皆同宋尺則為宋人所撰無疑影鈔繪圖雖取工細而用筆圎健迥殊俗手其摹古器文字亦不失篆籀遺意錢遵王述古堂藏書每葉邊闌外左方按曽撰讀書敏求志載此書稱北宋鏤版豫得之梁溪顧修逺洵縹囊中異物後為季滄葦借去屢索不還耿耿挂胸臆者數年滄葦殁此書歸之徐健菴豫復從健菴借來躬自摹寫其圖象命良工繪畫不失毫髮楮墨更精於槧本閲之沾沾自喜云云據此則是書正為曽所手抄宜其精妙絶倫矣金壺記一函二册宋僧適之撰上中下三卷馬端臨文獻通考載金壺記僧適之集書家故事以二字為題而注所出於其下凡三百餘條適之始末無考書後稱浮提之國獻神通善書二人乍老乍少隱形則出影聞聲則藏形出肘間金壺四寸上有五龍之檢封以青泥壺中有墨汁如淳漆灑地及石皆成篆𨽻科斗之字記造化人倫之始佐老子撰道德經垂十萬言寫以玉牒編以金繩貯以玉函晝夜精勤形勞神倦及金壺墨盡二人刳心瀝血以代墨焉遞鑽腦骨取髓代為膏燭及髓血皆竭探懷中玉管中有丹藥之屑以塗其身骨乃如故老子曰更除其繁紊存五千言及至經成工畢二人亦不知所往係録晉隴西王嘉拾遺記中語以紀金壺二字所從出也影鈔紙白如雪墨色不尚濃厚取其勻淨幾與刋本摹印無異琴川毛氏鈔本影宋鈔集部離騷草木疏一函二册宋吳仁傑撰四卷後仁傑自記宋方燦跋宋史藝文志及鼂公武陳振孫馬端臨諸人所纂書目皆不載是書惟明焦竑經籍志有吳仁傑離騷草木蟲魚疏二卷今觀是書標題為草木疏而書中亦不及蟲魚且仁傑後記稱離騷以薌草為忠正蕕菖為小人蓀芙蓉以下凡四十有四種猶青史氏忠義獨行之有全傳也薋菉葹之類十一種傳著卷末猶佞幸姦臣傳也云云是仁傑之疏草木正以沅湘香草騷之寄托故作此以逆靈均之意耳焦竑所載祇二卷此為四卷亦不相符錢曽讀書敏求記載此書亦為草木疏其稱草木蟲魚疏者乃甬東屠本畯所撰則知焦竑所載並未加考也仁傑宋史無傳按朱彞尊曝書亭集有吳氏兩漢刋誤補遺跋稱仁傑字斗南别號蠧隱居士本昆山人其稱河南者舉郡望而然登淳熙進士厯官國子學録今書中於結銜下亦署河南其銜為國子録俱與彞尊所言相符惟書末結銜稱免解進士蘄州學正充羅田縣縣學講書吳仁傑校正意仁傑是書既成刋行之日乃在羅田也方燦亦稱河南人其始末無考影鈔字畫結體在歐栁之間非工書者不能得此御題疏傳草木異劉王特重離騷草五章豈為春園問桃李獨存古道弔沅湘辨精魚魯篇篇核義寓興觀字字芳雖是羅田版亡矣步兵從可識中郎乙未春月御筆鈐乾隆雙璽虞山席鑑鈔本鑑無考王摩詰文集一函四册唐王維著十卷前維弟縉進書表代宗答詔唐書王維字摩詰太原祁人九歲知屬辭與弟縉齊名開元初擢進士厯官給事中安祿山反維為賊得以藥下利陽瘖祿山素知其才迫為給事中維賦詩悼痛賊平下獄或以詩聞行在時縉位已顯請削官贖兄罪肅宗亦自憐之下遷太子中允久之遷中庶子三遷尚書右丞上元初卒至寶應中代宗語縉曰朕嘗於諸王座間聞維樂章今傳幾何遣中人王承華往取縉裒集數十百篇上之今書中縉上文集表稱中使王承華奉宣進上令臣進亡兄故尚書右丞維文章云云與史傳吻合代宗答詔有抗行周雅長揖楚詞之語蓋亦深重其才矣縉字夏卿舉草澤文辭清麗科上第纍官至黃門侍郎同中書門下平章事以招納財賄獲罪論死上憫其耄貶括州刺史久之遷太子賓客分司東都建中二年卒年八十二此書前後無序未審為宋代何時刋本自元明以來刻維集者甚多今得此影鈔以留宋槧面目亦超出於諸本之上矣琴川毛氏鈔本劉賓客外集一函二册唐劉禹錫著十卷唐書劉禹錫字夢得自言系出中山世為儒擢進士第登博學宏詞科厯官太子右庶子憲宗時貶連州刺史未至斥朗州司馬久之召還宰相欲任南省郎以作詩譏忿出為播州刺史裴度居相位薦為禮部郎中集賢直學士度罷出為蘇州刺史徙汝同二州遷太子賓客分司東都會昌時加檢校禮部尚書陳振孫書録解題曰禹錫集本四十卷逸其十卷常山宋次道裒集其遺文得詩四百七篇雜文二十二篇為外集然未必皆十卷所逸也是書雖無次道序跋而卷數篇目相同乃即振孫所指之本影鈔分行布白結搆清朗與王維集同出一手琴川毛氏鈔本盤洲文集四函四册二十宋洪適著八十卷後附行狀碑銘并拾遺共一册馬端臨文獻通考引陳振孫曰盤洲集八十卷丞相文惠公鄱陽洪適景伯撰皓之長子方奉使時文惠甫十三歲後與其弟遵同中髙宗紹興十二年壬戌宏博科本名造後改焉又三年乙丑弟邁繼之世號三洪其自淮東總領入為太常正卿一年而入右府又半年而拜相然在位僅三閲月為林安宅所攻而去嘗一帥越間居十六年而終是本影鈔集八十卷皆係全本惟目録載有序跋俱闕其拾遺文四篇今僅存其二想當時刋本流傳甚少所影者本有遺佚耳行狀後署名稱壻奉議郎幹辦行在諸軍審計司許及之狀考宋史及之字深甫溫州永嘉人第進士知袁州分宜縣以部使者薦除諸軍審計纍官至吏部尚書諂事韓托胄二年不遷見托胄流涕不覺膝屈未幾同知樞密院事當時有由竇尚書屈膝執政之語傳以為笑嘉定二年拜參知政事進知樞密院事兼參政托胄誅降兩官泉州居住尋卒此狀為及之初仕時所作以後所為殊愧適東牀之選矣碑銘係周必大撰考必大字子充廬陵人第進士中博學宏詞科召試館職由國史院編修官屢遷至右丞相拜少保益國公為諫長何淡所劾又坐所舉官以賄敗改判隆興府寧宗二年復少傅卒贈太師諡文忠琴川毛氏鈔本書中有白堤錢聽默經眼一印無考闕補卷八一卷二十一五六卷三十二十欽定天祿琳琅書目卷四

body:
  text: 明版集部楚辭二函冊十二周屈平著附宋玉景差賈誼淮南王安東方朔嚴忌王襃劉向王逸擬騷諸篇共十七卷後漢王逸章句書首載史記屈平本傳次漢班固序次梁劉勰辨騷目録後附楚辭疑字直音補一卷按世傳楚辭最著者一為王逸章句一為晁无咎重編一為朱子楚辭集註朱子集註止八卷已見前宋版中矣其餘卷目分合互有異同考隋書經籍志楚辭十二卷注云後漢校書郎王逸注而唐書藝文志乃云王逸注楚辭十六卷已増多四卷矣其又稱十七卷者據晁公武讀書志言淮南王安始作離騷傳劉向典校經書分為十六卷東京班固賈逵各作離騷章句餘十五卷闕而不説至逸自以為南陽人與原同土悼傷之復作十六卷章句又續為九思取班固二序附之為十七篇夫十七篇即十七卷也宋時洪興祖作補註楚辭其卷目悉遵原本然觀晁氏所述王逸章句止十六卷其増多一卷者以逸續九思與班固二序合數之耳此本分十七卷而班序不入卷中又與宋時傳本不同矣其卷首之載史記本傳則始於晁无咎之重編无咎以東方朔嚴忌皆漢武帝廷臣淮南小山之辭不當先朔忌又以王逸為東漢人所作九思與劉向輩相闊且十七卷亦非舊録故删去一卷止存十六卷并於逸所著離騷其中有訓釋淺陋者悉為之刪汰而録司馬遷原𫝊冠之於首説詳讀書志中至於劉勰辨騷隋唐兩志俱未論述惟讀書志述洪興祖補註楚辭自序言辨騷非楚辭本書不當録云云則亦古本所有而曽經興祖刪汰此本葢復存其舊而亦不入卷數也其疑字直音補一巻宋人諸簿録中俱未見著其名當又出於興祖无咎之後此本雖無刋刻年月然以版式定之則為明代坊間所梓行者故其橅印亦復不能精善若以前宋版中集註一書較之其紙色墨香則相去逺甚矣江隂徐氏印未詳何人曹子建集一函四冊魏曹植著十卷考子建集見於隋志者稱三十卷見於唐志及書録解題者皆二十卷見於讀書志及宋史藝文志者則止十卷此本前後俱無序跋目録後有元豐五年萬玉堂刋木記亦分十卷與讀書志宋志同其書橅刻甚精印紙有金粟山印記古色可愛惟目録末葉卷一首葉紙色不同字體亦異當是先有宋本闕此二葉因為翻刻并以原書所闕重寫補刋或舊有序跋俱經私汰未可知也陶靖節集一函八冊晉陶潛著十卷前梁昭明太子蕭統序次陶集總論次統撰陶淵明傳此書亦不載刋刻年月卷十未於顔延之撰陶徵士誄揚休之序錄之外凡宋人刊刻陶集諸序皆附録於卷中則此本之非宋槧無可疑矣况其橅刻本不甚工也收蔵諸印無攷類箋唐王右丞集二函冊十二唐王維著詩集十卷文集四卷前明顧起經序次凡例次開局氏里次王集表敕次王集列傳次王氏世系并圖目録未載右丞詩畫評一卷後唐諸家同詠集一卷唐諸家贈題集一卷右丞年譜一卷外編一卷外編後有起經識語按此書凡例稱詩集舊本係六卷今析為十卷文四卷編置末冊其開局氏里後標嘉靖三十四年十二月望授鋟三十五年六月朔完局毎卷末俱記刋書之月并校閱諸姓氏可謂鄭重經營者矣版雖不能甚工而字畫清朗尚稱佳本考常州志顧起經字長濟無錫人以國子生謁選授廣東鹽課副提舉兼署市舶弟起綸輯明諸家詩名國雅為世所重分類補註李太白詩集二函冊十六唐李白著元楊齊賢集註蕭士斌補註二十五卷前元版中有是書目録末葉版心標至大辛亥三月刋此本版式似之而目録末葉版心則稱正統己巳二月印當即由前版翻出者其所載建安余氏勤有堂刋木記係仍元刻之舊然元刻尚有李陽氷樂史宋敏求曽鞏毛漸諸序此則全佚之矣子謙李春陽二印未詳其人分類補註李太白詩集一函六冊篇目同前附文集五卷共三十卷前唐李陽氷序次宋樂史别集序次唐李華李公墓誌次宋劉全白李公碣記次宋宋敏求曽鞏後序各一篇此本詩集首卷標題下先列楊齊賢蕭士贇名次標呉㑹郭雲鵬校刊而文集首卷則苐標雲鵬編次不列齊賢士贇葢以文集無兩家注故也按雲鵬自標呉㑹而吳中志乘不見其名書中但稱校刊編次前後俱不自為序跋以後歐陽文粹一書證之亦稱雲鵬校刊而序跋俱無則疑雲鵬者苐書肆中刻梓鬻市人耳特此本橅印精潔逺出前部之上當亦書林良賈也明王時敏蔵本印記見前集千家註杜工部詩集二函三冊二十唐杜甫著詩集二十卷附文集二卷前宋王洙王安石胡宗愈蔡夢弼四序後載甫墓誌本傳二篇前元版中有是書輾轉翻刻本記互異然標題俱稱集千家注分類杜工部集此則明人所梓行者刪去分類二字所收序文亦與元刊不一按後一部標題次行稱玉几山人校刊此本無之所空一行亦未别刊姓氏則知玉几山人者必為明人書賈欲偽作宋槧嫌其名而掩之固瞭然也集千家注杜工部詩集四函三冊二十篇目同前闕墓誌本傳此為前版初印之本字畫較為清朗紙質之潔膩亦逺勝之明米萬鍾蔵本按明史萬鍾字友石萬歴二十三年進士厯官江西按察使終太僕少卿餘印未詳杜工部全集一函六冊唐杜甫著六十六卷前明姚士麟序次杜集舊序八篇跋二篇次甫墓誌次韓愈題杜子美墳詩次舊唐書本傳次新唐書本傳次年譜次凡例後明劉鑒序此書為明人劉世教分體編校所著凡例係合李杜二集而言劉鑒序中亦述其伯父之言謂李源風杜源雅兩公之詩體従風雅出云云是鑒亦為李杜合編而作惟姚士麟一序止言杜詩不及李集或士麟别有序文載於李集之首而此則其分部單行之本而當時固為合刊也考海鹽縣圖經稱世教字少彛萬歴庚子舉北闈謁選授閩清令於詩好李杜嘗取舊集之編年者分體次之序以行世云云據圖經所言尤於此書體例隠然脗合劉鑒靖江人嘉靖三十年嵗貢官蜀府紀書見常州府志姚士麟爵里未詳闕補卷十二二卷二十三七陸宣公集一函十冊唐陸贄著二十二卷前唐權徳輿翰苑集序此書總標二十二卷而分制誥十巻奏草六卷中書奏議六卷與陳振孫所載翰苑集十卷牓子集十二卷者正相符合前元版書中僅録制誥此方是其全本以版式較之當屬明翻宋槧苐惜紙質黝厚橅印亦不能工耳王後山印記未詳何人韓柳全集一函六冊唐韓愈柳宗元著韓集二十卷外集一卷集傳一卷補遺一卷前宋朱子考異序次宋王伯大序次諸家姓氏次唐李漢序次汪季路書次凡例柳集二十卷别集一卷外集一卷附録一卷前宋陸之淵音義序次唐劉禹錫序次諸家姓氏宋人合刋韓柳集者有魏仲舉本前宋版書中已皆録之此本亦韓柳合刋以版式觀似亦従宋本橅出紙質墨光雖不相及而已得其形似矣治卿印記未知誰氏闕補韓集諸家姓氏全柳集卷四十五韓柳全集一函八册韓集四十卷外集十卷集傳一卷補遺一卷柳集三十六卷韓集李漢序柳集陸之淵序俱不載此本亦仿宋槧版式與前部約畧同而刻手印工又出其下至分卷各不相謀者葢縁唐宋人文集凡經後人校刋者毎有更定係以集部之書固不必如經史子篇目各沿奉為圭臬也泰興季氏蔵本印記見前昌黎先生集四函六冊三十唐韓愈著四十卷外集十卷遺文一卷前昌黎集叙説次凡例次集𫝊書中凡例集𫝊之後以及各卷中皆有原刋姓氏木記而盡為割去補以别紙無復存者葢此書橅刻極精書賈遂欲逞其作偽之計而校刋苦心之人其名轉不可得而𫝊矣懐永堂印未知誰氏所鈐柳文二函冊二十唐柳宗元著四十三卷别集二卷外集二卷附録一卷前唐劉禹錫序陳振孫書録解題所載柳集凡三種其稱禹錫編次者係四十五卷外集二卷并云今世所行本皆四十五卷又不附誌文非當時本也云云是宋時所刋柳集已非禹錫編次之舊此書卷數既不相符而卷一標題下漫署禹錫之名且係以别紙補入其字畫與全書迥殊安知前後不别有序跋而亦為坊間所私汰耶白氏長慶集四函二冊三十唐白居易著七十一卷前唐元稹序後載宋陶穀重修白樂天影堂記此書目録後并各卷末俱有錫山蘭雪堂華堅活字銅版印記考明時活版之書出於錫山安國家者流傳最廣華堅姓名不見郡邑志乗葢與安國同鄉里因效其以活版製書其書於一行之中分列兩行之字全部皆如小註遂致參錯不齊則其法雖精而其製尚未盡善也按宋史陶榖字秀實新平人本姓唐避晉祖諱改焉入宋仕為翰林承㫖累加刑部户部尚書贈右僕射御題儒雅曽聞白樂天漫將率易議前賢但従性地中流出月露風雲總道詮人咸謂香山之詩傷於易不知其易處正難及也偶讀其集題此甲子仲冬御筆鈐寳二曰稽古右文之璽曰乾隆御筆元氏長慶集一函冊十四唐元稹著六十卷前宋劉麟序後附稹集外詩一章文一篇按劉麟不見宋史爵里無可考序文之末標為建安人字應禮其序作於宣和甲辰自稱其父先經抄寫因閱手澤摹工刋行則麟殆首刋稹集之人歟此書版式實為明槧而猶存此序者葢沿其舊也明内府蔵本有内府圖書其王氏趙氏印未詳闕補巻十五六巻二十八三四元氏長慶集一函八冊篇目同前此即前版而紙墨之佳橅印之善逺出前部上矣明陸完文徵明蔵本完見前徵明有玉蘭堂印又有春草堂印考朱彛尊明詩綜小傳載朱茂曙字子蘅太傅國祚之孫有春草堂遺藳此印當其所鈐本朝泰興季氏亦經收蔵追昔游詩集一函三冊唐李紳著三卷晁公武讀書志中載追昔游詩集云開成戊午八月紳自為之序此本書首不載序文葢至明時從舊本橅刊其序已佚之矣李紳字公垂亳州人元和元年進士累官中書侍郎平章事其曰追昔游者叙生平厯官及遷謫所至述懐紀游之作也泰興縣季振宜滄葦氏珍蔵卷下右識語一作小行書絶無俗韻書首有明黄姬水印記係先為黄所蔵而後歸於季者也姬水見前餘印無考李義山集一函四冊唐李商隠著三卷陳振孫書録解題載李義山集八卷樊南甲乙集四十卷惟玉溪生集為三卷然云即前卷中賦及雜著且馬端臨文獻通考亦秖稱為二卷此本標李義山集専録其詩與振孫所載玉溪生集卷帙雖同其書各異則非宋人所刊無疑特橅刻清朗亦明槧之善本也歐陽文忠公集四函六冊二十宋歐陽修著居士集五十卷外集二十五卷易童子問三卷外制集三卷内制集八卷表奏書啓四六集七卷奏議集十八卷雜著迷十九卷集古錄跋尾十卷書簡十卷附録五卷共一百五十八卷前宋周必大序次蘇軾居士集序次修小像并宋李端叔晁悦之賛次宋胡柯撰年譜一卷并記前元版中有是書橅刻精妙實元本之最佳者其中特無歐陽修小像耳此本雖非草草剞劂然刻手印工俱逺不相逮矣李端叔名之儀滄州無棣人元豐中登第終朝請大夫自號姑溪老農晁悦之字以道清豐人元豐五年進士仕至徽猷閣待制自號景迂生俱見明一統志歐陽先生文粹二函冊十二宋歐陽修著文粹二十卷遺粹十卷前宋蘇軾序次宋史本傳次蘇轍撰神道碑次韓琦撰墓誌銘次蘇軾王安石祭文忠公文文粹後有宋陳亮序此與前分類補註李太白詩之第二部同為明人郭雲鵬所刋文粹遺粹卷末俱有呉㑹郭雲鵬選輯附梓木記陳亮序後亦有木記稱呉㑹郭雲鵬校勘刻於寳善堂按選輯校勘之人前後應有序跋乃僅刊木記為識則不過沿廖氏世綵余氏勤有之舊其為刻梓售書而非自行操選者明矣陳亮字同父永康人紹熙中進士第二授僉書建康府判官廰公事宋史有傳明檇李項氏錫山安氏蔵本有子京珍蔵安氏家蔵諸印又有庸菴印考姚江逸詩傳宋元僖字無逸洪武間召修元史事畢還山與桂彦良同徵主考福建有庸菴集十卷此印當其所鈐史樹駿印無考伊川擊壤集一函四冊宋邵雍著二十卷前明人希古序次雍自序後附集外詩十三章并宋邢恕明畢亨二序希古不載姓氏其序作於成化乙未稱披閱撃壤集愛其體物切實立意髙古乃重鋟梓云云夫曰重梓則先有刻本據而重梓焉耳畢亨序祇標庚子嵗作不題年號以序中之言考證諸書則為成化庚子後於乙未希古之序又五年矣按明時有兩畢亨皆成進士歴顯官一字嘉㑹山東新城人成化乙未進士歴官順天府丞終南京工部尚書見凌迪知萬姓統譜一為山東單縣人河南衞軍籍景泰甲戌登進士第歴官應天府尹進副都御史見江寧府志今亨序後結銜為副都御史序中又有尹應夭及回洛之語則是籍𨽻河南之畢亨無疑矣序稱於監察御史晉陽王濬家得撃壤集每欲夀梓而未暇及後尹應天始克刋行及今致政特取此版回洛適郡守桂林劉公尚文建先生安樂窩書院復訪先生集而梓行之遂以此版授焉云云其言復訪梓行者非即希古序中重鋟之謂乎希古當即劉尚文之名惜無可考邢恕字和叔河東人元祐初除御史後謫隨州宋史有傳王濬蒲州人宣徳丁未進士見太學題名碑司馬太師温國文正公傳家集二函十冊宋司馬光著八十卷前宋劉隨序陳氏書錄解題載傳家集稱一百卷馬氏文獻通考引晁公武之言不及卷數然云今光州有集本與陳氏語同則亦為一百卷可知且云劉嶠刻版上之并不言有隨序今此本僅八十卷已非宋槧之舊况隨序亦不詳刊刻源流則並非付梓而作也按宋史隨字仲豫開封考城人進士及第歴官工部郎中知應天府遷户部副使改天章閣待制沈榖似潘汝棟二印未詳其人老泉先生文集二函冊十二宋蘇洵著十四卷宋人諸書目所載蘇洵嘉祐集皆稱十五卷此本標題既不仍嘉祐之名而分卷僅止十四其版雖仿宋巾箱本式然字畫結體較大筆法亦不能工决非宋槧其前後無序跋者當為書賈割去無疑王執禮收蔵印記亦無考東坡全集四函六冊二十宋蘇軾著東坡集四十卷奏議十五卷應詔集十卷内制集十卷附樂語一卷外制集二卷後集二十卷續集十二卷共一百十卷前有序闕名次宋贈蘇軾太師敕次宋史本傳次年譜次蘇轍撰墓誌銘按序稱海虞程侯自刑部郎來守吉州得宋時曹訓所刻舊本及仁廟所刻未完新本重加校閱仍依舊本卷帙舊本無而新本有者則為續集并刻之葢公文全集初有杭蜀吉本及建安麻沙諸本以嵗既久木朽紙弊已不復全幸程侯傳刻於世使吾郡九邑之士得而觀之云云葢以重刻者為明人故稱曹訓為宋時作序者為吉人故稱吉州為吾郡也乃序後原署姓名為書賈割去補刋一行則云乾道九年閏正月望選徳殿書賜蘇嶠夫賜書但賜其書耳即以年月姓名標識卷中宜出手書不應刋印況曹訓之名見於西江志之名宦秩官二門謂訓字子序自章貢移知袁州雖所叙爵系不甚詳晰而其名俱列於紹熙各守之後葢後於乾道九年又十餘載序中明言據訓舊本重刋此書乃謂乾道時降賜刋在後而賜在先不亦舛謬之甚乎訓仕江右曽刻此書明之守吉者即於其地訪其舊本重為校梓亦事理之顯然者書賈無知妄作真不直一噱矣闕補本傳十六之二十内制集卷九十六卷十一後集卷十五十三續集卷一十卷七三十五卷十一十二三蘇先生文粹二函四冊二十宋蘇洵文十一卷蘇軾文三十二卷蘇轍文二十七卷墨黯紙疎係出明製書賈以其式似宋槧私汰序跋刻梓之人遂以不傳三蘇先生文粹三函四冊二十篇目同前此與前部同版並一時橅印之書南豐先生元豐類藁一函八冊宋曽鞏著五十卷附行状碑銘一卷前宋王震序按文獻通考秖載南豐類藁五十卷而王偁東都事畧則稱有外集十卷宋史本傳與韓維所作神道碑及今西江志所載又稱有續藁四十卷然近時流傳惟類藁為完書而續藁外集久經散佚又按陳氏書錄解題稱類藁為王震所序而年譜則朱子所輯今震序尚存卷首而失列年譜則非宋時原槧可知每卷標題次行有南豐後學邵亷校刊八字未詳邵亷為何人而版式紙質均係明製無可掩襲且書名類藁則必撰人已作始可編入卷數是書末卷行狀碑銘宜稱附錄而版心標為五十一卷則編次之失宜方家必不出此寧可託為宋槧耶按宋史王震字子發以父任試銓優等賜及第元豐官制行執筆入記上語面授尚書名司員外郎使自書除目舉朝榮之進起居舍人使行西邊還為中書舍人遷給事中權吏部尚書拜龍圖閣直學士知開封府後坐折獄滋蔓奪職知岳州收蔵諸印見前臨川先生文集二函十冊宋王安石著一百卷前宋黄次山序考馬端臨文獻通考載王介甫臨川集一百三十卷國朝查慎行作西江志又載王荆公集一百卷後集八十卷是書為卷止一百則非通考所稱之本矣西江志所稱一百卷疑即指是書而後集則别本單行耳黄次山爵里未詳惟自署為豫章人而序中稱是書為知州事詹大和甄老所校刊則知次山與安石為同郡而與大和則同時也按西江志稱詹大和於乾道間以直顯謨閣學士出知撫州則此書原刻於南渡孝宗之世而明時又復經翻刻者已非復大和剞劂之舊矣朱文公文集六函六冊三十宋朱子著一百卷按陳振孫書録解題載朱子文集一百卷紫陽年譜三卷王圻續文獻通考載文公文集一百五十卷莆田黄士殷編次此本卷數雖與陳氏所録相符然不載年譜其橅印亦不工係明時坊間刋售之本故前後俱無序跋也重鋟文公先生奏議一函五冊宋朱子著十五卷前明葉向髙序向髙序作於萬歴甲辰稱朱生崇沐既刻朱子語類而余為之序兹復裒奏議刻之仍屬余序云云崇沐為萬歴間庠生文公十三世孫即詳此書所刋同校諸人姓氏之末而每卷標題下首行又稱宗後學監察御史髙安朱吾弼編按崇沐有世次可考而吾弼但稱後學則崇沐非吾弼同里之人已可概見乃向髙序中止言崇沐而不及吾弼豈當時編校二人實共成其事而向髙者僅與崇沐相知而遂獨稱其名耶考明史朱吾弼字諧卿髙安人萬歴十七年進士累官南京太僕卿葉向髙見前象山先生全集一函十冊宋陸九淵著三十六卷前有序闕名次宋袁燮楊簡二序書中所載袁燮楊簡二序係沿宋本之舊其第一序署名處已為書賈割去補以别紙遂闕其名然為明人所刋即此可見序中稱撫守李茂元將重刻象山文集而請予一言為序云云謂之重刻則非宋槧又顯然矣考太學題名碑李茂元凡兩見一為河南祥符人𢎞治乙丑進士一為河南歸徳州人正徳辛巳進士官撫守者未知為誰也鴻慶居士文集一函冊十二宋孫覿著十四卷前宋周必大序考陳振孫書録解題載鴻慶集四十二卷稱户部尚書晉陵孫覿撰按覿大觀三年進士政和四年詞科嘗提舉鴻慶宫故以名集又考馬端臨文獻通考及宋史藝文志所載鴻慶集並四十二卷此書獨十四卷者葢後人選定之本也按周必大序作於慶元五年稱公子興國太守崇以書謂必大曰先君文稿中更兵燼存者無㡬而閩蜀所刻復襍翟忠恵之文懼不足傳信今定為四十二卷其未備者方裒次為外集為我序之云云此本仍冠周序而改四十二卷為十四卷以符所刻之目則為刻是書者所妄改也按覿生平出處無足取明嘉靖間其鄉人將刻其遺集或曰覿得罪名教不得以文集流傳其事遂止世所傳者僅有抄本此書未知刻於何時審其雕鐫紙墨自屬嘉靖以前之本但非全書故其鄉人欲重刻之而事未果書賈以此本充宋槧撤去序跋遂無刋刻時代可稽耳莫廷韓蔵本餘印無考渭南文集一函八冊宋陸游著五十卷前宋史本傳後游子遹跋明毛晉識語毛晉識語稱馬氏通考載渭南集三十卷今不傳邇來呉中士大夫有抄而秘其本者亦頗無詮次紹興郡有刋本去入蜀記溷増詩九卷近得光禄華君活字印本渭南集五十卷乃嘉定中翁幼子遹編輯也但其版多謬多遺因嚴加讐訂并付剞劂云云按琴川毛氏嘗刋渭南全集此則其分出單行之本考宋史藝文志亦别稱渭南集五十卷卷帙與此正同則不必與全集並行方足以為完書所稱光禄華君者前白氏長慶集書中有蘭雪堂華堅活字銅版印記未知光禄即華堅否志乗中不載其人惜無所考然概稱光禄則凡為光禄之丞簿皆可以光禄稱之其人故無可詳焉漫堂劉先生文集一函十冊宋劉宰著二十二卷前宋趙葵序劉宰字平國金壇人紹聖元年進士官泰興令諡文清趙葵字南中衡山人官至右丞相兼樞宻使封魯國公贈太傅諡忠靖宋史俱有傳葵序作於嘉熙四年稱劉公自號漫堂病叟著述不可勝紀然皆散佚不存今姑就所見所聞者傳之於世云云是葵實始刋是書之人而此本紙色皆出渲染葢以新本而襲舊刋者矣鐔津文集一函四冊宋沙門契嵩著二十卷目録後載宋陳舜俞撰鐔津明教大師行業記末附契嵩與沙門倡和詩一卷序詩題讃一卷按陳舜俞記稱契嵩所著書自定祖圖而下謂之嘉祐集又有治平集凡百餘卷總六十有餘萬言其甥沙門法燈克奉蔵以信後世云云據此則契嵩所著述甚富此二十卷僅其十之一二但謂法燈奉蔵則未全行鏤版可知也今書未有洪武甲子天台松雨齋沙門原旭募重刋鐔津集疏一篇又有永樂三年嘉興沙門宏宗書後一篇稱松雨製疏重刋既已化行開至二十餘版適疾作不克成其事兹以天全叡首座發堅固志繼其芳猷云云則此版為天全所雕始末具見又有後序一篇稱天全叡公為東海慧眼宏辨禪師之弟子似亦沙門所作乃書賈於署名處割補别紙意在偽充宋槧而不知原旭之疏宏宗之序已題洪武永樂年號又安従掩飾乎考浙江通志契嵩字仲靈自號潛子藤州鐔津李氏受記莂於洞山聰公作原教論十餘萬言未㡬遊衡岳歸著禪宗定祖圖𫝊法正宗記書成游京師仁宗覽之嘉嘆付𫝊法院編次入蔵賜號明教韓琦歐陽修俱尊禮之後居錢塘佛日禪院應蔡公襄所請也陳舜俞字令舉嘉禾人慶歴六年進士歴都官員外郎謫監南康酒税宋史有傳闕補卷三十一十二卷十五八巻十八十五卷十九十弇州山人四部稿六函二冊六十明王世貞著一百七十四卷分賦詩文説四部前明汪道昆序後附世貞弟世懋書并世貞記觀世懋遺世貞書世貞自為記云敬美此書寄自豫章垂十年矣以其見飾之過秘不敢示人至於揚㩁藝文折衷上下往往有寸心千古意安可以嫌終秘之且聞在藝圃擷餘中行之閩矣乃為梓拙稿之後據此則此書為世貞所自刋也當時橅刻本不能工今世所行者皆出一版而此本猶屬明時所印較為清朗世貞世懋汪道昆並見前代囊子集二函冊十六明賀逢聖著詩類六卷文類十卷此書前後俱無序跋而雕刻精良紙色墨香絶類宋槧葢明末文人刻集之最工者按明史逢聖字克繇江夏人萬歴四十四年廷試第二授翰林編修天啟間為洗馬忤魏忠賢削籍崇禎時復官進秩禮部尚書太子太保文淵閣大學士致政歸張獻忠陷武昌投墩子湖一家殉之福王時贈少傅諡文忠六家文選三函冊三十梁昭明太子蕭統撰六十卷唐李善吕延濟劉良張銑吕向李周翰註前蕭統序次李善上文選註表并國子監奉刋文選詔㫖次吕延祚進五臣集註文選表後明袁褧識語此書橅刻甚精校勘亦審實與宋槧同工序後標此集精加校正絶無舛誤見在廣都縣北門裴宅印賣又五十二卷末葉標毋昭裔貧時常借文選不得發憤曰異日若貴當版鏤之以遺學者後至宰相遂踐其言并註云出揮麈録此二條宋槧中本有之係存其舊其六十巻末葉有呉郡袁氏善本新雕𨽻書木記則袁褧所自標也褧識語云余家蔵書百年見購鬻宋刻本昭明文選有五臣六臣李善本巾箱白文大字小字殆數十種家有此本甚稱精善而注釋本以六家為優因命工翻雕匡廓字體未少改易始於嘉靖甲午成於己酉計十六載云云其四十四卷末葉標丁未六月初八日李宗信雕五十六卷末葉標戊申孟夏十三日李清雕李宗信李清疑皆當日剞劂髙手故自署其名而丁未為甲午後之十三年僅刻至四十四卷戊申又丁未後之一年僅刻至五十六卷且其成也經十六載則袁氏之擇工選藝以求毫髮無憾之意亦概可見矣按蘇州府志袁褧字尚文呉縣諸生循例入太學善屬文尤長於詩繪花鳥有逸趣書法擬元章晚耕謝湖之上自號謝湖六家文選六函一冊六十篇目同前闕袁褧識語此即袁氏所刋之版而四十四卷末葉李宗信之名及五十六卷末葉李清之名俱被書賈割去故紙幅均屬接補袁褧識語亦經私汰而於六十卷末葉改刋河東裴氏考訂諸大家善本命工鍥於宋開慶辛酉季夏至咸淳甲戌仲春工畢并於末一行増刋把總鍥手曹仁其字畫既與前絶不相類版心墨線亦參差不齊且考訂訂字誤作金旁則偽飾之跡顯然畢露矣明楚府蔵本考明史諸王世表洪武三年太祖封庶子楨於楚是為昭王𫝊六世顯榕襲封以嘉靖二十四年遇害是為愍王至嘉靖三十年始續封愍王庶子英㷿為王是為恭王今考袁氏書刻成於嘉靖己酉為嘉靖二十八年正當楚國絶封之時則所鈐楚府圖書當出恭王以後也又有翰林學士文節世家一印考宋史楊萬里謚文節此宋人諡法之最著者其印或為明時楊氏所鈐餘印無考又有袁忠澈印記袁澈篆法譌作表字明屬書賈偽為不足錄入闕補卷二一卷三一之四卷四二之一卷六二十五二十六卷十八十四卷二十四八三三十一之十四卷二十八六十八八卷二十九十卷三十二五八十十十七二五卷五十二九六家文選六函一冊六十篇目同前闕袁熾識語此亦前版而書中所有宋刋明刋識語本紀悉經私汰補痕類然橅印亦不及前二部之工寳峯主人收藏印記未知誰氏六家文選十函一冊六十篇目同前闕袁褧識語此書惟存五十二卷後所載揮塵録一條其餘識語木記皆經割補而紙質特佳泰興季氏蔵本印記見前闕補目録三十一三十二卷三十三十七六家文選六函一册六十篇目同前闕袁褧識語此書亦存揮麈録一條而六十卷之末偽刋奉議郎充提舉茶鹽司幹辦公事臣朱奎奉聖㫖廣都縣鏤版起工於嘉定二年嵗次己已畢工於九年壬子臘月并標督工把總恵清亦係割去原紙别刋半葉粘接於後且嘉定九年係丙子而非壬子則其作偽益顯然矣明文徵明蔵本有烟條館印袁忠澈亦經收蔵印記見前又有世美堂印按朱彛尊明詩綜小傳載丁此吕字右武江西新建人萬歴丁丑進士歴官湖廣布政司參政著有世美堂集此印當即丁氏右武所鈐餘印俱無考又有景濓印考明史宋濓字景濓浦江人洪武間官至翰林學士承㫖兼太子賛善大夫是景濓乃明初人書中不應有其印記明係書賈偽作不足存也闕補表序目錄全六家文選六函一册六十篇目同前闕袁褧識語此書亦於卷六十之末葉改刊河東裴氏考訂云云訂字并作金旁與前第二部同其偽製葢出一人之手也明袁忠澈蔵本印記與前部同又有王偉印考明史王偉神宗顯皇后父也萬歴五年授都督尋封永年伯吕雄濟之二印見前華亭朱氏未詳其人六家文選六函一冊六十篇目同前闕袁褧識語此書於蕭統序後標紹聖三年丙子嵗蜡月十六日秘閣發刊又于吕延祚表後列曽布蔡卞等校正銜名卷六十後復標紹聖四年十月十五日太學博士主管文字陳瓘督鐫匠孫和二等工完皆係别刊半幅粘接而袁氏識語木記盡為割補紙質印工并出前後諸部之下明馮夢禎蔵本有馮開之印考浙江通志夢禎字開之秀水人萬厯丁丑進士累官南京國子監祭酒又有太子太保𫝊文穆公家蔵圖書考明史傅瀚字曰川新喻人天順八年進士累官禮部尚書贈太子太保諡文穆此印當其後人所鈐其曲阿孫氏真賞齋二印無考六家文選六函冊六十篇目同前闕袁褧識語此書亦將袁氏識語末記妄為割補其卷五十二末葉所有戊申孟夏十三日李宗信雕一行雖子橅印之時以别紙掩葢其上然十三兩字墨痕猶隠透行間依稀可辨乃版心上方後以熙寧四年刊五字别刻本記逐幅鈐印抑何其心勞日拙耶書中有呉寛印記考明史呉寛以正徳時卒于官其時袁氏此書尚未付梓安得經其收蔵明是書賈故取袁褧以前之人冀掩其作偽之計不足採入餘所鈐三印亦無攷六家文選六函一冊六十篇目同前闕李善吕延祚表袁褧識語此書惟存蕭統序後裴宅印賣一條其餘識語木記俱經私汰實亦呉郡袁氏新版也其於卷二十四後乃偽標嘉祐改元澄心堂刊八字而祐字誤作祜改字已旁譌作􅊂此作偽而益形其陋者收蔵諸印無考闕補卷四二十四卷十三十五卷十七二十五二十六卷十八十三十四卷二十七八卷二十四十一十二卷二十五十一十二二十三二十四卷二十七十六十七卷二十八十九二十卷二十九二十三卷四十一十三十七十四十八卷四十四三十九卷四十八十五十六卷五十十一十二六家文選六函二冊六十篇目同前闕袁褧識語此書於蕭統序末及卷六十後偽刋淳祐二年庚午嵗上蔡劉氏刋𨽻書木記字體杜撰漫無凖繩亦即用袁氏版竄易亂真者合計此書共成十部而作偽者居其九其間變易之計狡獪多端或假為汴京所傳或託之南渡之末雖由書賈謀利欺人亦足見袁氏此書橅印精良實為一時不易得之本今登冊府者至十部之多且袁氏所蔵宋槧原本已入前宋版書中七百餘年後先輝映猗歟盛矣南昌袁氏收蔵印記見前武陵華伯子印無考闕補卷五二十一巻八二十一巻十十一巻十八二十一四二十二二十巻二十四二十九三十巻二十八十六巻四十一十四卷四十三三十三巻五十四三六臣註文選六函冊六十篇目同前此亦明翻宋槧而别為一版橅刻頗佳其目録内於昭明五臣銜名之次割補一行似是明時刋梓者自署其名而書賈去之以售其作偽之術又於卷六十後刻河東裴氏考訂云云訂字亦作金旁且字畫紙墨判然各異不能掩也文選注二函冊十二明王象乾刪定十二卷前蕭統序次吕延祚進五臣集註文選表次李善上文選註表次文選姓氏此書版式將六臣之註或列之上方或列於行右其音釋則於下方列之不以註間本文亦取便於記誦者也王象乾字子廓山東新城人舉隆慶五年進士授聞喜知縣遷兵部主事歴郎中出為保定知府累官至兵部尚書加少師兼太子太師總督宣大山西軍務以衰病乞歸卒贈太師具見明史本傳象乾自擢宣府巡撫以後皆任邊疆重寄年八十三猶馳驅戎馬間此書標題下結銜為保定知府葢惟其時尚有餘閒游心翰墨也文選補遺二函十冊宋陳仁子輯四十巻前宋趙文序後宋譚紹烈識語書中每卷標題下稱茶陵陳仁子輯誦次行稱門人魯達臣纂類目録後有茶陵東山書院刋行木記仁子宋史無傳考凌迪知萬姓統譜載陳天福者茶陵人嵗凶發廩平糶貧不能糴者天福輒周之有道士丐米福與之一斗道士酬以百錢福弗受道士出題其壁有桂子蘭孫聨步武之句後子桂孫蘭孫果登第慕義樂施有父風遭宋季易姓不復禄仕營東山書院為終身計博學好古著述尤富輯文選補遺四十卷云云按所言東山書院既與木記相符而書之卷帙亦與此本適合則仁子為天福之子無疑苐未分晰此書為桂孫蘭孫兄弟中何人所作耳趙文序中稱仁子為同俌譚紹烈識語中又稱為古迂翁似仁子是其名而非其字或當隠居不仕之時自避原名而更為仁子也趙文字惟恭又字儀可廬陵人三貢於鄉仕南雄府教授出文丞相之門嘗従勤王於軍政多所㕘決晚請歸養所著有青山集見西江志魯達臣譚紹烈俱無考紹烈本仁子之甥亦受業其門為刋此書故系識語於後此本為明時翻刻橅印極清惟自十四卷至十七卷與前後紙色迥殊則従别本取出補入者闕補卷五五之七卷十三二古文苑二函十冊宋章樵重編二十一卷前樵自序考陳振孫書録解題稱是書不知何人集世傳孫洙巨源於佛寺經龕得之韓無咎類次為九巻刻之婺州云云此本則為二十一卷葢宋時先後原有二版考浙江志章樵字叔道昌化人嘉定元年進士嘗宰呉時代後於振孫故解題僅登韓刻按樵自序作於紹定壬辰序中稱學製呉門結銜為知平江府呉縣事皆與浙江志符惟志稱是書為二十卷按樵自序固有釐為二十卷之語又稱第二十一卷文多殘闕姑存卷末則志所稱葢不及末卷耳是本字畫頗清朗而橅印不工紙色亦出縇染又偽作金粟山印記總無以掩其為明翻宋槧之迹也書中有猗蘭堂及司馬氏收蔵各印不詳其人又有虞集伯生二印篆法庸劣顯係偽託不足採録闕補卷三三六朝詩彚二函冊十二明張謙輯王宗聖増一百十四卷前明金城序次詩人姓氏爵里明史藝文志載王宗聖増補六朝詩彚一百十四卷雖於標題之上加以増補二字然不及張謙之名此本標題下并列張謙王宗聖兼署姑蘇陸師道校正而金城序又稱鄮西張子雅意裒采積累成編賔湖王子復禆益之人凡五百有竒為卷百又十四命曰六朝詩彚因託五湖陸子為之校讐刻於蘇郡云云是此書之創始與續成者瞭然具見矣張謙字仲受慈谿人嘉靖壬辰進士歴官按察副使見朱彛尊明詩綜王宗聖義烏人嘉靖甲辰進士官僉事見浙江通志陸師道字子𫝊呉縣人嘉靖戊戌進士官尚寳少卿見蘇州府志金城始末無考其序後自署為濟南人號元白子此書字畫朗潔紙墨俱佳係初印本竇氏聨珠集一函一冊唐竇常竇牟竇羣竇庠竇鞏著五卷前載唐書竇羣本傳五人詩前各有小序後宋張昭識語并詩次宋和峴記峴弟􅀈署名又識語一篇姓氏闕考竇氏聨珠集宋時刻本原已盛行洪邁容齋隨筆及陳振孫書録解題俱詳其始末焉振孫謂唐褚蔵言所序竇氏兄弟五人詩各有小序此書小序具存而不署褚氏之名葢明人翻刻時偶佚之也又考陳氏書録解題作五卷而宋史藝文志止作一卷似有互異今觀書中五人之詩係各為一卷而不標五卷之名故宋史所載遂指為一巻書末識語題淳熙五年謂家蔵和峴所校五竇詩世少其本因刋諸公府以永其傳今識語署名處已為書賈割補不知何人所作窺其意特恐作於明人不得充宋槧遂為私汰而不知其本淳熙五年固宋人非明人也書首之載竇羣本傳以唐書此傳雖止為羣立而兄弟五人序中並見其畧因存之以考行第常字中行國子祭酒牟字貽周國子司業羣字州列容管經畧庠字胄卿婺州刺史鞏字友封武昌節度俱詳見本傳及小序考宋史張昭字潛夫本名昭逺避溪祖諱止稱昭世居濮州范縣仕漢至檢校禮部尚書入周封舒國公宋初拜吏部尚書進封鄭國公改封陳國公和峴字晦仁浚儀人晉宰相和疑子仕宋至主客郎中判太常寺兼禮儀既事峴弟㟸宋史無傳明檇李項氏藏本餘印無考唐文粹六函八冊四十宋姚鉉撰一百卷前鉉自序後宋施昌言序是書原刻前宋版中已載之而闕鉉自序此本版式字體極意追摹足稱精善然紙質不及無能襲取也收蔵二印無考闕補卷八十二一唐文粹四函冊四十篇目同前此書於四十五卷之末别行刋嘉靖甲申嵗太學生姑蘇徐焴文明刋於家塾其各卷標題之首俱冠以重校正三字其序並作大書雖似是别為一版然以通體之版式字畫較之與前部所刋者並無區别當是得其版者僅將其序文重刋又於各卷標題及四十五卷之末補刋標題以為新刻而實則仍其舊也徐焴始末亦無考收藏諸印未知誰氏闕補卷二六卷九七卷十五下三卷三十二一卷三十九一二卷四十三十卷四十七八卷六十七八卷七十四一卷七十九九卷八十二十卷九十三八卷九十九四唐文粹四函冊四十篇目同前此書卷四十五後徐焴自識一行為書賈割去補以别紙葢因其橅印較工遂欲藉以充宋槧耳唐文粹四函二冊三十篇目同前字朗墨瑩數部中以斯為最其徐焴所自識者亦遂見汰於書賈矣明焦竑蔵本有澹園印記鶴園未知誰氏萬首唐人絶句三函冊十五宋洪邁著五六言二十六卷七言七十五卷共一百一卷前邁序次劄子奏狀目録中有宋呉格汪綱識語考是書宋時舊本有一百巻一百一卷之不同其一百卷者為邁所自刋半刻於㑹稽半刻於鄱陽之本也一百一卷者為汪綱守越時所刋合會稽鄱陽之本而併刻之者也又有呉格重修之本則僅屬會稽初刻之一半也此書為一百一卷乃依汪綱本翻刻於明時者耳觀洪邁自序言今以所編合為百卷刻之蓬萊閣中序後又有自題云越府所刻七言至二十六卷五言至二十卷而奉祠歸鄱陽惟書不可以不成乃雇婺匠續之於容齋旬月而畢此百卷之名與刋刻之地言之鑿鑿無可疑者故陳振孫書録解題嘗為詳悉言之謂邁編七言七十五卷五言六言二十五卷巻各百首凡萬首上之振孫所言固指㑹稽鄱陽合刻之本也此書所載汪綱識語則謂唐人絶句一百一卷半刻㑹稽半刻鄱陽嘉定癸未新安汪綱守越遂搨鄱陽本併刻之使合而為一云云是綱已變稱一百卷者為一百一卷矣原其互異之故邁所自刋者五六言共二十五卷此本則以六言分出列為第二十六卷故増多一卷也乃書中又有呉格識語者以呉格亦為越守後於洪邁而先於汪綱曽取㑹稽所刻一半之版修補之而刻於鄱陽之一半不與焉故其識語但稱洪公守㑹稽嘗以此刻之郡齋後三十年格獲繼往躅命工修補以永其傳時為嘉定辛亥云云不言卷數亦不言鄱陽續刻之事以意考之則止㑹稽一半之版也苐所記嘉定辛亥似為翻刻時所誤按洪邁自序題為紹熙元年序後再題則為紹熙二年紹熙為光宗年號嘉定為寧宗年號考浙江通志職官表洪邁之守越在光宗朝呉格汪綱之守越皆在寧宗朝今以洪邁作序之年計之紹熙元年為庚戌其次年則為辛亥即邁歸鄱陽之年又三十年為寧宗之嘉定十四年嵗在辛巳並非辛亥則刋刻之誤不言可知至呉格識語明稱後三十年獲繼往躅其為辛巳又復顯然按辛巳後二年為癸未即汪綱作守之時使格之所修已為全版則相距不逺又奚必汪綱之合梓乎是此書原刻崖畧猶井然可考也考宋史汪綱字仲舉黟縣人官至户部侍郎又考凌迪知萬姓統譜呉格休寧人淳熙間登第歴官至樞宻都承㫖起居舍人洪邁見前闕補卷七十四十四十五萬首唐人絶句三函册十五篇目同前版式與前部相似而所載呉格汪綱識語分行各異通體字畫亦較清朗葢同為翻刻而此則選工特勝也收藏諸印未詳又有趙子昻氏印篆法不工顯然偽託不復採録闕補五言卷十五六七言卷八十五卷六十三十三卷七十四十三西山先生文章正宗四函七冊二十宋真徳秀撰二十四卷前正宗綱目一卷前宋版中載是書有徳秀自序此本無之且於標題之首稱西山先生其為明時所刻無疑而橅印亦不及前書矣文苑英華纂要一函四冊宋周必大著纂要八十四卷辨證十卷前明華燧序此書乃燧與其従孫子宣所刻爵里無考其序作於正徳元年稱周益公嘗取内架所貯正本集諸學士校正去其煩冗分類而成凡八十四卷復著辨證云云據此則必大原書當有序跋後以久而佚之序又稱近得印本於陳湖陸氏所云印本葢指宋槧也此書仿宋巾箱本式橅刻亦工而字畫結體過大不能如宋刻之作蠅頭書矣詩學大成二函十冊元林楨著三十卷前有元毛直方序林楨爵里不可考以作序之毛直方推之當亦為宋末元初之人按凌迪知萬姓統譜稱直方字靜可建安人宋咸淳中領鄉薦入元授徒講學士爭趨之有聊復軒藁二十餘卷并編詩集羣玉府三十巻及詩學大成行世據此則詩學大成一書竟似出於直方此迪知援据之誤意迪知當時偶見此書以其序有直方之名即以書為直方所纂觀其連舉三書一稱二十餘卷一稱三十卷而此書獨不言其卷數則疎畧顯然也其書本為世俗餖飣之學取便應酬而橅刻大方殊非草草觀其版式當即明時司禮監督刋之本歴代名臣奏議三十函十冊一百五明永樂間奉勅輯三百五十卷考明史藝文志載歴代名臣奏議三百五十卷註云永樂中黄淮等奉勅纂輯與此本卷數正同書中當有序文進表或經嵗久佚去其字畫不能清朗葢非初印本也諸儒箋解古文真寳一函四冊黄堅輯五卷前明神宗序後明孝宗跋又一跋不著姓氏黄堅不知為何時人觀孝宗跋語已有命工梓之之文神宗作序又稱舊本凡三百十有二篇今益三十五篇刻久漫漶因重授梓云云是明時内府此書固有二板矣其不著姓氏之跋則稱永陽黄堅氏所集古文真寳二十卷梓行已久率多湮蝕偶得善本命工重刋云云跋後題為𢎞治十五年青藜齋寓雲中有斐堂書觀此則内版之外復有二刻其刻於雲中者與孝宗朝内版同出一時皆為重梓而神宗所刋最居其後係合孝宗雲中兩刻而併校之故皆載其跋也至雲中之跋稱二十巻與此五巻之數不符葢由重刋時省倂之故苐書中註釋詞意淺陋似非名人所作詞致録二函冊十六明李天麟著十六卷前有序闕名李天麟山東濟南府武定州人登萬歴庚辰進士第見太學題名碑其書専輯駢體上自六朝下迄唐宋採其根葉並茂者合而録之不以富麗為工天麟曽有自刋之本其序作於萬歴丁亥備述選輯之㫖此本序稱祥宇李公則又别為一版而序後署名為書賈割去復従目録卷六中割取歐陽修方岳李良樞等名移補目録首葉標題下以此書為歐陽修所作不知書中所載南宋人文章甚多豈有修為纂輯之理今取天麟自刋本校之顛末具見又安従欺飾乎苐此書雕刻清朗橅印頗工亦不失為佳本龍筋鳳髓判一函二冊唐張鷟著二卷後附唐書列傳節文按此書載於文獻通考者稱為十卷今止二卷葢因書僅百題故後人翻刻遂為省併也晁公武讀書志謂鷟嘗八中制科此其書判陳振孫書録解題謂百題皆待選預備之具而洪邁容齋隨筆譏其蔽罪議法不能深切則此書崖畧概可見矣書末節録唐書乃張薦傳文以鷟為薦祖𫝊中兼叙其始末也山谷老人刀筆一函四冊宋黄庭堅著二十卷前山谷老人傳考晁公武陳振孫馬端臨諸書目止載黄魯直豫章集三十卷别集十四卷又别集一卷初無此書之名宋史藝文志於豫章集别集之外又載樂府二卷書尺十五卷亦未以刀筆名書則非宋槧可見此書前後當有選輯人序跋或由書賈欲充宋槧遂従而汰之耳明檇李項氏蔵本其衡齋印無考又有謝疊山趙孟頫二印係出偽作不足存滑耀編一函四冊明賈三近著不分卷前三近自序考明史賈三近字徳修嶧縣人隆慶戊辰進士選庶吉士累官兵部右侍郎其選輯是書以滑耀名者葢取荘子滑疑之耀聖人之所圖句也序作於萬歴庚辰自稱東鳩子題其文皆取意於亡是子虚之説以自況其風㫖當時橅刻此書雖非精善而字畫尚為清朗欽定天禄琳琅書目卷十

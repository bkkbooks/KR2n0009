body:
  text: 明版史部草一史八十函十册五百五明萬厯間奉敕刋史記漢司馬遷撰宋裴駰集解唐司馬貞索隱張守節正義一百三十卷前貞索隱前後二序補史記序駰集解序守節正義序論例諡法解漢書漢班固撰唐顔師古注一百卷前師古漢書序例宋余靖刋誤進表宋祁參校諸本目録劉之問識語後漢書宋范蔚宗撰唐章懷太子賢注一百三十卷內志三十卷梁劉昭注補前宋余靖序三國志晉陳夀撰宋裴松之注六十五卷晉書唐太宗御撰一百三十卷後附唐楊齊宣序並音義三卷宋書梁沈約撰一百卷南齊書梁蕭子顯撰五十九卷前宋曽鞏序梁書唐姚思廉撰五十六卷陳書唐姚思廉撰三十六卷前宋曽鞏序魏書齊魏收撰一百十四卷前宋劉攽等序北齊書隋李百藥撰五十卷周書唐令狐德棻等撰五十卷前宋梁燾等序南史唐李延夀撰八十卷北史唐李延夀撰一百卷隋書唐魏徴長孫無忌等撰八十五卷唐書宋歐陽修宋祁撰二百二十五卷前宋曽公亮等進書表後宋董衝唐書釋音二十五卷五代史宋歐陽修撰七十四卷前宋陳師錫序宋史元脫脫今改正曰托克托等撰四百九十六卷遼史元脫脫等撰一百十六卷前脫脫等進書表金史元脫脫等撰一百三十五卷前元阿魯圖今改正曰阿嚕圖進書表元史明宋濓王褘等撰二百十卷前明李善長等進書表明萬厯二十一年刻十三經既成隨於二十四年開雕此書閲十有一載至三十四年竣事版式與十三經同所列較刋重修之祭酒司業銜名亦倣前式史記四函四册二十漢司馬遷撰宋裴駰集解唐司馬貞補三皇本紀并索隱張守節正義一百三十卷前守節正義序貞索隱序補史記序裴駰集解序後貞索隱後序明仿宋刋略得形似而已明趙宦光藏本按姑蘇志宦光字凡夫太倉人卜居於寒山所著書多至數十種而尤専精字學創作草篆説文長箋是其所獨解也餘印無考史記六函册六十篇目同前此與前書同出一版前書目録後之第三行四行有割去重補之痕當是明人所記刻書年月書賈以其形似宋版故為割去此書目録後無史記目録終五字而有校對宣德郎祕書省正字張來𨽻書木記較前書所補之痕增寬一倍若果為原版所有前書何以割去即或割之而補痕寬窄何以不合按祕書省正字雖是宋代官名而張來者亦無可考其為書賈欲偽充宋槧别刋目録未葉增入木記彰彰然矣明興宗第四子衡王允熞藏本有衡王圖書餘印無考闕補傳七六傳五十二十四傳六十六傳六十三十九傳六十七八漢書六函册六十漢班固撰唐顔師古注一百卷前敘例一卷此書未知誰氏所刋字畫頗具顔體似係明初之本闕補傳二十八之傳三十六全傳七十二一二漢書五函册四十篇目同前仿宋本橅印紙質頗佳而字拙墨淡惜不能稱之武林高氏藏本印記見前餘印無考闕補傳三十三四傳五十九六後漢書六函册六十宋范蔚宗撰梁劉昭補志唐章懷太子賢注一百三十卷前宋余靖進刋誤表與漢書前一部同版紙墨亦復相等闕補紀四十三傳九三四傳二十一二後漢書八函四册五十篇目同前不載宋余靖表版式長短不齊其中亦有似宋刋者係書賈得不全舊版從而補成耳書中冇清虛玄妙之寶考明史世宗好修齋醮嘗命夏言充監禮使湛若水顧鼎臣充導引官鼎臣進步虛詞七章上嘉之自是詞臣多以青詞干進繼又以道士邵元節為禮部尚書加方士陶仲文少師則所謂清虛玄妙當為世宗之寶也陸氏春雨堂印無考闕補志十三四傳七十十二之十五晉書六函册六十唐太宗御撰一百三十卷載記前有太宗序各卷後附唐楊齊宣音義字畫不能圓徑係翻刻使然宋諱仍從缺筆亦沿原版之舊闕補志三志四全志十五二十六晉書十二函一百册篇目同前此亦從宋版翻出以刋行在先橅印較為清朗其目録後仍存淳熙丁未季春宏文館校刻一行蓋刻是書者竟欲作宋槧為賈利之資耳明蔣文藻藏本李目華六研齋筆記文藻與姚丹邱同隱大雲執師資之禮書畫皆步趨之頗臻其妙餘印無考三十四二十一傳五十四十七載記十四三十九晉書十函册一百篇目同前與第一部同版橅印稍後晉書十二函一百册篇目同前前有明人序序闕末葉失其名又太宗原序明人序稱舊版存南國子學宫久多脫誤邑人周文學若年氏見宋祕閣本欣然授之剞劂未成而卒丁進士孟嘉委産續成云云今以版式字畫較之與前第一部大略相似可知是書之版大半皆出翻刻但惜此序闕去末葉不知其名而他本欲求此失名之序復不可得總由書賈作偽割去者多也周若年丁孟嘉爵里俱未詳闕補志十五三十九志十九五傳六十六十傳九十九十七二載記十二十二載記十二五梁書一函十册唐姚思廉撰五十六卷此明南監本版心中有稱嘉靖八年補刋者亦有稱九年及十年者亦有不記刋刻之年者是其中本有舊版不盡為南監所梓行者矣收藏印記無考闕補傳四十九梁書二函册二十篇目同前與晉書版式相等其中間有字畫模糊者當是宋槧所遺殘版闕補紀一四十紀二十六四二十紀三十九八三十紀四二三九紀五八傳一五一七十傳五十傳六七十傳七三七傳八五三十傳九一二傳十七八傳十一一二傳十二四五七十傳十三六七傳十五七傳十六十二十五傳十七七八傳十八九傳二十八十九傳二十七十五四十六二十傳二十八十九傳二十九八三十傳三十四六傳三十三十三十四傳三十五一之四十一傳三十七一二傳三十八二四傳三十九一十十一二傳四十三之六傳四十一九傳四十二十十十一二三傳四十三十三十九十四傳四十四二十三二五二十二二十六傳四十八三十二之三十三三十八四十四十二傳四十九八傳五十二十五二六陳書二函册十六唐姚思廉撰三十六卷目録後有宋曽鞏序版心上方有割補處其字畫版式與梁書前一部同蓋去嘉靖某年刋補字樣圖作宋槧也書中有裴字并間主人二印鈐版心補紙之上明係書賈作偽以掩補痕者其裴字乃取裴菴印左方之字觀裴菴印與李葆貞慶東兩印每牽連並用篆法俱不工印色復相似皆出偽造無疑均不足録惟有沈率祖印篆刻頗精惜其人不可考又秀峯方文印考廬山志有開先寺本朝更名曰秀峯此書或經收藏也闕補紀一二紀四四傳十一四傳十三十三傳十四七傳十五五傳十八十三傳二十一十五傳二十七四陳書一函册十二篇目同前字畫糢糊係新舊參半之板與梁書後一部同闕補目録六紀一八紀二十四十紀三九十傳一五九七傳二七傳三五六傳五十一十傳六三傳十三十七傳十五四五五十傳十六三傳二十二四五傳二十五十七傳二十八十四十五傳二十九十三十四北齊書四函册二十隋李百藥撰五十卷版式亦與梁書後一部同兼屬一時橅印之本周書一函十册唐令狐德棻等撰五十卷目録後有宋梁燾等序版心上方亦間載嘉靖補刋之年其年分並與前梁書吻合周書一函十册篇目同前版心上方亦經割補其無補刋字樣之葉字畫反較清朗者橅印在先也宛陵太守藏本其子翰臣亦無考闕補紀八一傳二十四一傳二十八十八之二十舊唐書五函册二十石晉劉昫撰二百卷前明聞人銓文徵明楊循吉三序聞人銓序稱劉氏唐書鬱絶不傳酷志刋復苦無善本逮弭節姑蘇窮搜力索吳令朱子得列傳於光祿張氏長洲賀子得紀志於守溪公遺籍俱出宋時模板旬月之間二美璧合乃督同蘇庠嚴為校刻司訓沈子獨肩斯任效勤四載書幸成編匱直千金刻未竟業石江歐陽公聞而助以厚鎰午山馮子西郭陳子以逮郡邑諸長二成力輔以終事肇工於嘉靖乙未卒刻於嘉靖戊戌云云詮循吉明史俱無傳按朱彞尊明詩綜小序詮字邦正餘姚人嘉靖丙戌進士除寶應知縣擢山西道御史巡視兩關歷湖廣按察副使有芷蘭集今觀書中列銜稱督學畿南彞尊作小序時未經考及循吉字君謙吳縣人成化甲辰進士除禮部主事以病乞歸有松籌堂集徴明見前所云司訓沈子名桐嘉興人詮之門人也闕補紀十二二十三志二十十九志二十四十三傳一百十五三傳一百三十五上二傳一百五十下十五代史記一函五册宋歐陽修撰徐無黨注七十四卷前宋陳師錫序版之徑圍較諸史縮十之三蓋取便行篋所攜者南唐書一函八册宋馬令撰三十卷前令自序二篇馬令陽羡人具序作於崇寧乙酉按乙酉為宋徽宗崇寧四年陳振孫書録解題稱其書略備紀傳體而亦言徐鉉湯悅之疏略焉此書雖係坊間刻梓而字畫清朗紙墨精潔亦足為插架之珍也檇李項篤夀藏本有萬卷樓印篤夀見前餘印無考文公先生資治通鑑綱目六函册六十宋朱子編五十九卷前批抹綱目凡例次朱子綱目凡例次朱子序例王幼學集覽序例尹起莘發明序次朱子與趙師淵論綱目書附宋王柏識語此書仿宋槧式不能精善所採王幼學集覽尹起莘發明汪克寬考異皆分標於綱目每條之下其中亦間有載陳濟正誤者數人之名皆於每卷標題後按行分列并稱京兆劉寬裕刋行寬裕為何如人不可考按汪克寬陳濟皆明人而書首所載綱目凡例視各卷之版縮半寸餘似是從他本割取補入蓋凡例從宋王柏識語有鋟梓於涵古堂與同志共之之語書賈得是書不知克寬濟為明人欲借柏識語以充宋槧耳克寬字仲裕祁門人元舉於鄉不第遂隱居教授明初預修元史程敏政目為史局第一人見凌迪知萬姓統譜陳濟字伯載武進人成祖詔修永樂大典用大臣薦以布衣召為都總裁書成授右贊善明史有傳收藏印記無考資治通鑑綱目八函六册五十宋朱子編五十九卷前明憲宗序次綱目凡例目録次綱目凡例後附宋王幼學習覽五十九卷并序尹起莘發明五十九卷并序續綱目二十七卷並憲宗序續綱目凡例商輅萬安等進書表憲宗綱目序稱傳刻既久間有缺訛甚至書法與所著凡例提要或有不同是以後人疑焉有考異考證之作嘗求其故蓋凡例提要乃朱子親筆以授門人使據之以成書及書既成再加筆削則隨事立文時有小異而大體終不出乎勸懲之外所有書法與凡例小異無大關涉者悉仍其舊盡去考異考證不使並傳此重刋綱目之意也續綱目序稱宋元二代之史迄無定本雖有長編續編之作然概以朱子書法未能盡合乃申敕儒臣遵朱子成例編纂二史上接綱目共為一書此重編續綱目之意也其書刻印精良紙潔墨潤洵推明刻善本當時董其事者為商輅萬安考明史輅字宏載淳安人登正統十年進士及第除修撰歷官至吏部尚書進謹身殿大學士加少保卒贈太傅諡文毅安字循吉眉州人正統十三年進士改庶吉士授編修纍官至吏部尚書進華蓋殿大學士加少傅卒贈太師諡文康恩遇常優於輅而品節則逺不逮焉明內府藏本有廣運之寶表章經史之寶資治通鑑綱目八函四册五十篇目同前此坊間翻刻之本橅印之工次於前部資治通鑑綱目六函二册四十篇目同前闕王幼學集覽尹起莘發明考明王圻續文獻通考所載朱子資治通鑑綱目王幼學集覽尹起莘發明皆各為單行之書此本以正續綱目合裝則本文已成全帙雖無集覽發明正不得以闕佚棄之書中有項氏家藏汪氏象家二印篆文杜撰昧於古法又二印字畫糢糊不可辨識均出書賈偽造之手不足存也資治通鑑綱目六函二册四十篇目同前闕續通鑑綱目憲宗續綱目序有朱子通鑑綱目既命儒臣重加校定鋟梓頒行之語是續綱目未成帙時此書已傳宇內非始全而終闕也明矣明內府所鈐之寶與前第一部同又有道卿頓首印考明太學進士題名碑有吳道卿者山東平山衛人隆慶五年進士或即其人餘印無考資治通鑑綱目集説八函二册六十明扶安輯綱目五十九卷前編二卷首列朱子序例次朱子與趙師淵論綱目書次元汪克寬考異序徐昭文考證序宋王幼學集覽序明陳濟正誤序馮智舒質實序尹起莘發明序元揭徯斯書法序次歷代先儒姓氏次明晏宏識語次朱子綱目凡例綱目目録次明劉璣序劉璣序稱鎮守陜西束齋晏先生集胡三省音注吕東萊大事記少微通鑑大明一統志邱濟世史正綱諸家之説合而為一稿雖其師馬平扶先生自立然實託諸先生以成之也又稱馬平諱安字世寧卒年七十有二朝廷賜祠額昭義蔭其姪孫數人束齋名宏字約之云云考明史職官志有以文臣而稱鎮守者永樂時命尚書侍郎都御史少卿等官巡行天下初名巡撫亦名鎮守後定為巡撫或加提督或加贊理參贊並總督諸名不復稱鎮守惟內監為鎮守者始于洪熙遍于正統凡各省鎮無不有之至嘉靖八年後始革今按璣序作於嘉靖己丑正嘉靖八年其猶稱晏宏為鎮守則為宦官無疑矣而扶安之賜祠賜蔭亦明代內寺恩幸之常數也王道浚收藏諸印無考通鑑紀事本末四函四册二十宋袁樞編四十二卷前宋楊萬里趙與􅊸元陳良弼三序前宋版中是書有三部宋印者二元印者一寬行大字精妙出羣此本橅刻雖亦清朗然不免相形見絀矣厯代通鑑纂要四函册四十明𢎞治間奉敕輯九十二卷前明武宗序次李東陽等進書表及編纂儒臣銜名次凡例次引用書目次先儒姓氏武宗序作於正德二年稱孝宗好觀通鑑綱目苦其繁多特敕儒臣撮其要略賜名纂要昔在東宫預聞是舉乃𢎞治乙丑冬翰林以首帙備講讀又明年丁卯夏始克成編云云考明史武宗印位於𢎞治十八年五月明年丙寅改元正德又明年丁卯即正德二年所云𢎞治乙丑乃𢎞治十八年也是書之作蓋創始於𢎞治之末而藏事於正德二年者觀其紙墨精良當是橅印最初之本明內府藏本有廣運之寶表章經史之寶闕補卷五十二四十二歷代通鑑纂要六函册六十篇目同前此係通行之本橅印逺遜前部闕補卷八五六通鑑總類二函册十六宋沈樞撰二十卷前宋樓鑰序前元版中有是書以此較之橅刻則猶出其上也少微通鑑節要六函册三十宋江贄撰外紀節要四卷通鑑節要五十卷前明武宗序次歷代帝王傳授總圖後附資治通鑑節要續編三十卷考凌迪知萬姓統譜江贄字叔圭崇安人初遊上庠與龔深之以學易並著名隱居里中近臣薦其賢明不赴政和中太史奏少微星見賜號少微先生所著通鑑節要行於世其説與王圻續文獻通考所載略同武宗序稱偶檢少微通鑑悅之詳不至泛略不至疏一開卷間首尾具見前日纂要之修亦備採擇第嵗久字畫糢糊因命司禮監重刻之又附宋元節要續編於其後云云書中不著撰續編人姓氏前扶安通鑑綱目集説載歷代先儒姓氏內稱建陽劉剡字用章號仁齋著少微宋元二鑑是通鑑節要續編正為劉剡所作也明內府藏本有廣運之寶卷二十卷二十一少微通鑑節要五函册四十篇目同前此亦正德間初印本紙墨俱極光潔有廣運之寶闕補續編卷二十三四十六吳越春秋一函四册漢趙曄著元徐天祐音注十卷前天祐序趙曄字長君山隂人嘗從杜撫受韓詩所著有詩細歷神淵并此書見後漢書徐天祐字受之越州人見凌迪知萬姓統譜天祐序稱此書越嘗鋟梓嵗久不存汴梁劉侯治越重刻於學侯名世昌世大其字云云卷十後刋大德十年丙午三月音注越六月書成刻版十二月畢工又刋文林郎國子監書庫官徐天祐音注并列紹興路學官及提調學校官銜名考宋史職官志淳化後改國子監印書錢物所為國子監書庫官而元史百官志無國子書庫之名又考萬姓統譜稱天祐登進士第德祐二年以文林郎國庫書監召不赴云云按德祐為宋瀛國公年號則知天祐本宋末人入元不仕其結銜蓋於刻音注時追敘宋官耳此本目録後有萬歷丙戌之秋武林馮念祖重梓於卧龍山房木記考卧龍為越郡山名則又因元版而翻刻於越中者其橅印極精固翻版最佳之本也十六國春秋二函册十二後魏崔鴻撰一百卷前明朱國祚序并載北齊魏收撰崔鴻本傳朱國祚序稱此書不傳已久屠侍御之孫喬孫與諸友校讐其闕於是此書復完云云目録後列喬孫及同校姓氏十人末行稱萬歷三十七年蘭暉堂鏤版是此書為明代新刋非仿舊翻刻之本故字畫俱極清朗國祚字兆隆秀水人萬厯十一年進士第一歷官至武英殿大學士纍加少傅兼太子太傅卒贈太傅諡文恪立朝能持大體詳見明史本傳喬孫爵里未詳闕補卷八三四卷十三十二卷三十九一二卷四十四十五卷五十九一十二二三卷六十六九十卷七十二十五卷七十六十三之十六卷七十八十九二十卷八十一七八路史二函册十六宋羅泌撰泌子蘋注前紀九卷後紀十三卷餘論一卷國名記六卷歸愚子大衍數一卷國姓衍慶紀原一卷國名紀信一卷路史發揮六卷共三十八卷前泌自序餘論前有宋費輝序發揮後有宋曽大鼎序此書不載刋刻年月惟首卷標題下稱錢塘洪楩校刋洪楩未詳其人而橅印頗佳蓋亦深於嗜古者按乾隆元年有泌裔孫玉藻重刻是書書前載明金堡序文稱吳子伯持妙年好古有路史之役較訛訂訛斯已精矣云云考金堡仁和人登崇禎庚辰進士玉藻刻是書獨載其序者似所刋即從吳本摹出然版式字畫不及此本逺甚則知洪本逺在吳本之前惜玉藻未得而見之也泌字長源江西廬陵人貞觀政要一函五册唐吳兢撰元戈直集論十卷前明憲宗序次元吳澄序次郭思貞戈直二序次吳兢原序次集論諸儒姓氏憲宗序稱貞觀政要有元儒士臨川戈直復加考訂注釋附載諸儒論説以暢其義顧傳刻嵗久字多訛謬因命儒臣重訂刻梓云云是此書之凡有集論者皆為元後所刋此本係奉敕重梓紙墨亦精然較前金版之書則逺遜其古香古色矣明內府藏本有廣運之寶貞觀政要一函五册篇目同前此書橅印在後乃坊間鬻市之本闕補憲宗序三吳澄題辭郭思貞戈直二序全卷四十七四十八十二十三二十二五卷五三十九卷七三卷九二十五二十六帝學一函二册宋范祖禹編八卷前齊礪序前宋版已有是書卷帙並同本朝何焯藏本有印記焯字屺瞻長洲縣人翰林院編修贈侍讀學士厯代君鑒一函五册明代宗御撰五十卷前代宗序是書編輯漢唐以來諸君嘉言善行揭曰善可為法其惡可為戒者則附之末考明史藝文志惟載宣宗御製歷代臣鑒三十七卷而不及代宗此書蓋自英宗復辟之後代宗御製之書中外已鮮流傳且有明一代獨無代宗實録僅以事迹附見英宗實録中故史家遂無從紀載耳此本墨香紙質完好如新正不得不以少見珍矣明內府藏本有廣運之寶文獻通考二十函一百册宋馬端臨撰三百四十八卷前明世宗序次元至治二年訪文獻通考文移次元王夀延進書表次端臨自序明世宗序作於嘉靖三年以是書為有益于世特命司禮監重刻此本橅印極精所載王夀延進書表題延祐六年自稱宏文輔道粹德真人考延祐為元仁宗年號陶宗儀輟耕録載夀延字眉叟杭州人出家為道士受知晉邸後以宏文輔道粹德真人管領開元宫所云晉邸者考元史仁宗嘗出封懷州懷州即今懷慶本晉地也但進書宜在訪書之後而書中所載訪書文移反稱至治二年至治為英宗年號按英宗以延祐七年即位明年方改元至治則書中所刋必有差誤或至治係至大之訛訪書在武宗時未可知也明內府藏本有廣運之寶表章經史之寶文獻通考二十函一百册篇目同前此書橅印稍後墨色亦遜前本文獻通考二十函一百册篇目同前此書與第二部紙墨相埒闕補卷一百二十三三十三文獻通考二十函一百册篇目同前以上三部橅印並出一時皆坊間售本故無內府收藏之寶闕補卷一百五十二二卷三百三五六卷三百四二三文獻通考十四函册九十八篇目同前此亦前版而書賈將嘉靖靖字割去補書定字亦充宋槧且所鈐廣運之寶篆筆薾弱亦非明時內府原璽不足採録闕補卷二十三七之十卷七十二十七二十八卷一百五二十一卷一百八二十五二十六卷一百五十五十七十八卷一百五十六三十三三十七卷一百六十一三十一三十二卷一百六十六四十一四十二卷二百七十五卷二百十一二十一之二十八卷二百十八十五卷二百二十二十五十六卷二百二十四十九卷二百二十九十三十四卷二百三十三十一十二卷二百三十四三十一三十二卷二百五十一十一十二卷二百五十六二十一二十二卷二百六十一二十二之二十四卷二百六十五三十三之三十六卷二百六十八十九二十卷二百七十六三十三三十四卷二百八十一二十一二十二卷二百八十三十七之二十五卷三百三十三十四卷三百四二十一二十二卷三百六二十三二十四卷三百九十四卷三百十二十九三十三三十四三十卷三百十二十三十四卷三百十五十一十二卷三百二十三九卷三百二十四二十九三十三十一卷三百三十四十九二十卷三百三十六二十七二十八大明會典二十函册七十四明萬厯間重修二百二十八卷前孝宗𢎞治十五年御製序次武宗正德四年御製序次神宗萬厯十五年御製序次𢎞治正德嘉靖萬厯四朝敕諭次纂輯諸書次開報文册衙門次𢎞治間凡例次嘉靖間續纂凡例次萬厯四年張居正吕調陽張四維等請敕禮部編輯事例送館札子次萬厯間重修凡例次萬厯十五年申時行許國王錫爵等進書表次重修諸臣銜名考大明會典一書始修于𢎞治重訂於正德嘉靖時復加參補增入𢎞治十六年以後事例至萬厯間又增入嘉靖二十八年以後條例校刋成書故明史藝文志稱為萬厯中重修大明會典第此書自孝宗迄神宗四朝俱經纂輯而世宗獨無御製序文按書中所載萬厯四年諭旨謂世宗申命儒臣重加校輯比及進覽訖未頒行似於聖心猶有未當據此則世宗時僅以稿本進覽並未刋行故不為製序非有闕佚也張居正字叔大江陵人嘉靖丁未進士隆慶初以禮部侍郎入內閣萬厯中纍加太師吏部尚書中極殿大學士諡文忠張四維字子維蒲州人嘉靖癸丑進士隆慶時歷官吏部侍郎萬歷間以禮部尚書兼東閣大學士纍加至少師吏部尚書中極殿大學士贈太師諡文毅申時行字汝默吳縣人嘉靖壬戌進士第一纍官少師兼太子太師吏部尚書中極殿大學士諡文定許國字維楨歙縣人嘉靖乙丑進士纍官少傅吏部尚書建極殿大學士贈太保諡文穆王錫爵字元馭太倉人嘉靖壬戌進士纍官少保兼太子太保吏部尚書建極殿大學士贈太傅諡文肅俱見明史本傳吕調陽臨桂人嘉靖庚戌進士第二見太學題名碑大明集禮三函册三十明太祖御撰五十三卷前明世宗序考明史藝文志載大明集禮一書稱洪武中梁寅等纂修初係寫本嘉靖中詔禮部校刋今觀世宗御製序亦稱禮部請刻布中外俾人有所知見乃命內閣發祕藏令其刋布兹以訖工遂使廣行宣傳云云與史所言吻合是本版非初印紙亦不精蓋為書肆通行之本水經山海經三函四册二十水經漢桑欽撰魏酈道元注四十卷山海經晉郭璞撰十八卷山海經前載璞原序并劉歆目録序水經前有明黃省曽總序黃省曽序稱二經一主敘山而水歸詳綴一専紀水而山亦寓列山者水之根柢水者山之委枝云云蓋言二經所以合刋之故也省曽字勉之吳縣人嘉靖辛卯舉人嘗著五嶽山人集見朱彞尊明詩綜小傳此序作於嘉靖甲午即省曽發解後之三年書賈以其規仿宋槧因將嘉靖靖字割去填改定字於補紙之上謬稱宋刻此作偽之顯然者二書版式字畫並同惟山海經版心上方有前山書屋四字而水經無之或水經刋梓在先其時尚未有此書屋額名也朱卧菴收藏印記見前餘印無考闕補水經卷二十六古今遊名山記四函六册二十明何鏜撰十七卷前明黃佐吳炳王世貞王稚登四序次凡例次總録紀勝一卷總録名言一卷總録類考一卷後鏜自序蔡文範跋鏜自序作於嘉靖四十四年其書以前人所作名山遊記及自記所經遊者合為一編故以古今為稱鏜嘉靖丁未進士浙江處州衛軍籍順天府宛平縣人見太學題名碑明史王佐字才伯香山人正德中舉鄉試第一成進士改庶吉士嘉靖初授編修歷國子祭酒少詹事兼翰林學士贈禮部侍郎諡文恪吳炳宜興人萬厯末進士崇禎中官江西提學副使後從永明王至桂林以兵部侍郎兼東閣大學士死事衡州朱彞尊明詩綜小傳蔡文範字伯華瑞州新昌人隆慶戊辰進士歷官廣東布政司參議王世貞王稚登並見前泊如齋重修考古圖一函二册宋吕大臨輯十卷前大臨自序此書刋刻極精楷體仿二王書篆法亦古乃明版中傑出之本第考古圖别本均有元大德二年茶陵陳才子翼子兄弟二序才子序且云屬羅兄更翁臨本刻以傳世是自元以後所刋者方謂之重修書前應載其序而此本無之則書賈之所私汰也收藏諸印記無考寶古堂重修宣和博古圖三函册三十宋徽宗御撰三十卷明吳公宏重刋前明焦竑洪世俊蔣㿩三序按蔣㿩序作於嘉靖七年言屬掌鹽司黃君景星翻刻焦竑洪世俊二序作於萬厯三十一年俱言新安吳氏公宏重刻則此書當是公宏所刋緣其仿照蔣本故載暘原序也第竑序標題稱為考古博古二圖序且序中有以古王圖附焉之語今書則僅存博古其考古圖古玉圖二種蓋已佚矣考明史藝文志惟載程士莊博古圖録三十卷而蔣吳二家所刋均不著録則此書之流傳希少概可知也是本橅刻極精竑序作篆書係出歐陽序之手用筆深有古致考江寧府志歐陽序字惟禮江寧人能詩詞工篆籕仕福州府幕官蔣㿩山東樂安人正德辛巳進士洪世俊歙縣人萬厯乙未進士並見太學題名碑焦竑見前吳公宏無考餘菴珍藏印記未詳何人闕補卷五三十卷六三十二卷七五卷十五二一十卷十六十五卷十七四卷十八十八卷二十二四卷二十九二十九卷三十十五大事記二函册十八宋吕祖謙著大事記十二卷解題十二卷共二十四卷前祖謙自序後宋吳學識語考祖謙既作大事記十二卷又作解題十二卷通釋一卷見陳振孫書録解題馬端臨諸家著録皆合通釋為一書而是本佚而不刋知非宋槧之舊且宋時傳本亦非一板如宋史藝文志所載又作二十七卷非二十四亦非二十五也按祖謙自序作於淳熙七年吳學識語稱嘉定壬申鋟木相去已三十餘年則疑宋時初刻原合三書而吳學重刋不及通釋其源流固可考而知但此本又為明人翻刻故字畫益不能精整矣至書中所標校正諸人姓氏一無可考見觀其結銜有免解進士及府學直學學録武義縣主簿等名則皆祖謙同郡後學與吳學同為嘉定時人耳又吳學識語稱學掾東陽李大有書考大有字謙仲慶元二年進士官至太常博士見浙江志則吳學疑亦東陽人未可知也闕補大事記卷八四五卷九六七解題卷五十八卷九七十七卷十一二十九三十卷十二四十四七十六五十六秦漢印統二函八册明羅王常編吳元維顧晉亨同校八卷前明王稚登黃姬水二序按王稚登序作於萬厯乙亥黃姬水序作於隆慶辛未稚登之序後於姬水故所序始末轉從其略但言顧吳二君同撰斯編嘉名印統姬水序則稱東川御醫顧公博雅嗜古厥嗣汝由光祿汝修鴻臚汝和廷評暨光祿仲子天錫太學三世五君極搜窮購得古印章俾登諸册名曰秦漢印統以貽好事云云而羅王常之名二序俱不及之本書但刋鄣郡人餘無可考吳元維亦未詳其人考松江志稱顧定芳字世安上海人博綜典籍尤深於醫以夏文愍薦授太醫院御醫直至濟殿今黃序稱御醫顧公當即其人晉亨其别字也志又稱顧從禮字汝由上海人以夏文愍薦修承天大志特授翰林院典籍纍官光祿寺少卿顧從義字汝和嘉靖二十八年以善書應御試第一授中書舍人加大理評事顧九錫字天錫國子生萬厯中以薦授詹事府主簿所言官爵世系悉與黃序符合但遺汝修鴻臚一人以前宋版漢書中王世貞跋語并收藏印記證之則汝修當名從德也又考六館日鈔言嘉靖三十八年丁士美榜進士題名碑為中書舍人顧從禮書則汝由又歷官中書而後為光祿且素工於書者松江志又稱汝由楷書逼鍾尚書行草宗右軍父子徑尺大字仿顔平原云云據此則顧氏世工書學故於是書搜採宏富摹刻獨臻妙品羅氏所編特其藍本耳其書並以朱印古色瑩然迥殊俗本閲第一卷末行刋萬厯丙午春王正月望日新都吳氏樹滋堂繡梓距萬歷乙亥稚登作序之年又三十二載所稱樹滋堂是否即吳元維所居惜無可考然此書告竣實在天錫為詹事主簿之後嵗久功深概可見也闕補卷六二十四三十九讀史漫録一函四册明于慎行撰十四卷前明葉向高題辭謝肇浙黃體仁二序目録後有郭應寵識語二篇按郭應寵識語二篇其一識於萬厯己酉稱慎行為師又稱慎行子緯將圖剞劂屬之釐次訂訛彚為十四卷其一識於萬厯癸丑則言是編業已梓於閩建書林未經讐校兹公子中翰君圖并筆麈鋟之余深嘉其是舉遍搜遺稿復得讀史五十通補入始為完書云云是此書係重刋之本然橅刻不工紙墨俱劣又何説也慎行字無垢東阿人隆慶戊辰進士纍官吏部尚書東閣大學士贈太子太保諡文定葉向高字進卿福清人萬厯癸未進士纍官少師兼太子太師吏部尚書中極殿大學士贈太師諡文忠並見明史謝肇浙字在杭長樂人萬厯壬辰進士官至廣西左布政使見福建通志黃體仁松江人萬厯甲辰進士見太學題名碑收藏諸印記無考班馬字類一函五册宋婁機撰上下二卷前宋洪邁樓鑰二序後機自序二篇考陳振孫書録解題及馬端臨文獻通考宋史藝文志俱載是書篇目並同惟藝文志稱為字韻則史臣之誤也婁機字彥發嘉興人乾道間進士纍官參知政事贈金紫光祿大夫加贈特進見宋史本傳洪邁樓鑰俱見前此本明仿宋刋頗得其似選紙選墨皆不苟焉欽定天祿琳琅書目卷八
